            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: A page of teams
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminTeamListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
