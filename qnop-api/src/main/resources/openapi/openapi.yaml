          description: Case-insensitive search over user display names/usernames and team names.
          schema:
            type: string
            maxLength: 200
        - name: size
          in: query
          required: false
          description: Maximum number of principals to return.
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 50
            default: 20
      responses:
        '200':
          description: Matching enabled users and teams, sorted by display name.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrincipalListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /principals/teams/{teamId}/members:
    get:
      tags:
        - Principals
      summary: List a team's members (names only)
      description: |
        The users behind a team principal (issue #403): lets a participant
        list unfold a team to see who reviews behind it. Same deliberate
        Community visibility rule as the directory itself — available to every
        authenticated user, display names only.
      operationId: listTeamMembers
      security:
        - bearerAuth: []
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The team's members as USER principals, ordered by display name
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrincipalListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Unknown team (`TEAM_NOT_FOUND`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /documents/{documentId}:
    get:
      tags:
        - Documents
      summary: Get document metadata
      operationId: getDocument
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DocumentIdParam'
      responses:
        '200':
          description: The document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Unknown document, or the caller is not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags:
        - Documents
      summary: Update document metadata
      description: |
        Owner-only. Currently patches the optional review due date (issue #295):
        a supplied `dueAt` sets it, an explicit `null` clears it. Any value —
        including the past — is accepted on edit so the owner can correct a
        deadline after the fact.
      operationId: updateDocument
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DocumentIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentUpdateRequest'
      responses:
        '200':
          description: The updated document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '403':
          description: The caller is a participant but not the owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown document, or the caller is not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /documents/by-slug/{slug}:
    get:
      tags:
        - Documents
      summary: Resolve a document by its slug
      description: |
        Resolves a review by its optional human-readable slug (issue #411).
        Matching ignores case. Unknown slugs and slugs on documents the caller
        may not see both answer 404, so slugs are as non-enumerable as ids.
      operationId: getDocumentBySlug
      security:
        - bearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          description: The review slug (kebab-case, 3-64 characters).
          schema:
            type: string
            minLength: 3
            maxLength: 64
      responses:
        '200':
          description: The document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Unknown slug, or the caller is not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /documents/{documentId}/visit:
    post:
      tags:
        - Documents
      summary: Record a visit of this review
      description: |
        Stamps the caller's personal last-visit time (issue #307) and returns
        the PREVIOUS stamp — the client's baseline for the unseen markers.
        The session keeps comparing against the returned value, so content
        being read right now never flips to "seen" mid-session; the fresh
        stamp takes effect on the next visit. Absent on the first visit.
      operationId: recordVisit
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DocumentIdParam'
      responses:
        '200':
          description: The previous visit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VisitResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Unknown document, or the caller is not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /documents/{documentId}/versions:
    get:
      tags:
        - Documents
      summary: List a document's versions
      operationId: listDocumentVersions
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DocumentIdParam'
      responses:
        '200':
          description: All versions, oldest first
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentVersionListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Unknown document, or the caller is not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /documents/{documentId}/versions/{versionNumber}/rendered:
    get:
      tags:
        - Documents
      summary: Get the canonical rendered representation of a version
      description: |
        The server-extracted, format-agnostic representation (ADR-0032): one
        surface per page with intrinsic size and the ordered text spans, each
        carrying its character-offset range and a bounding box normalized to
        0..1 of the surface. Available once the async extraction has completed.
      operationId: getRenderedDocument
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DocumentIdParam'
        - $ref: '#/components/parameters/VersionNumberParam'
      responses:
        '200':
          description: The rendered representation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RenderedDocumentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Unknown document/version, or the caller is not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: >-
            Extraction has not completed (`EXTRACTION_PENDING`) or failed
            permanently (`EXTRACTION_FAILED`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /documents/{documentId}/annotations:
    parameters:
      - $ref: '#/components/parameters/DocumentIdParam'
    get:
      tags: [Annotations]
      summary: List a document's annotations
      description: |
        Every annotation on the document. When `version` is given, each item also
        carries its placement (anchor + status) on that version, or nulls when it
        has none there.
      operationId: listAnnotations
      security:
        - bearerAuth: []
      parameters:
        - name: version
          in: query
          required: false
          description: A 1-based version number to resolve each annotation's placement against.
          schema:
            type: integer
            minimum: 1
        - name: placementStatus
          in: query
          required: false
          description: >-
            Only annotations whose placement on `version` has this status — e.g.
            `ORPHANED` to review annotations re-anchoring could not relocate
            (issue #248). Requires `version`.
          schema:
            $ref: '#/components/schemas/PlacementStatus'
        - name: type
          in: query
          required: false
          description: Only annotations classified with this type (issue #392).
          schema:
            $ref: '#/components/schemas/AnnotationType'
      responses:
        '200':
          description: The annotations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnotationListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Unknown document, or the caller is not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Annotations]
      summary: Create an annotation on a version
      description: |
        Anchors a new annotation to a region (and, on a text surface, the quoted
        text) of the given version. The placement on that version is `PLACED`
        immediately — a human drew it; re-anchoring onto later versions is async
        (#248). An optional `comment` seeds the discussion thread.
      operationId: createAnnotation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnnotationCreateRequest'
      responses:
        '201':
          description: The created annotation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnotationView'
        '400':
          description: Validation failed (e.g. the region anchor is missing or out of 0..1)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Unknown document/version, or the caller is not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: >-
            The addressed version is not the latest (`VERSION_READ_ONLY`,
            issue #306) — annotations are created on the newest version only;
            older versions are a read-only record. Or the review is already
            FINALIZED or CANCELLED (`REVIEW_CLOSED`, issue #405) and accepts
            no new annotations.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /annotations/{annotationId}:
    parameters:
      - $ref: '#/components/parameters/AnnotationIdParam'
    get:
      tags: [Annotations]
      summary: Get an annotation
      operationId: getAnnotation
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The annotation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnotationView'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Unknown annotation, or the caller is not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags: [Annotations]
      summary: Reclassify an annotation
      description: |
        Replaces the annotation's optional classification (type + priority,
        issue #392) wholesale — an absent field clears that facet. Permitted
        for the document owner or the annotation's author while the annotation
        is still OPEN; a resolved annotation is immutable.
      operationId: classifyAnnotation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnnotationClassificationRequest'
      responses:
        '200':
          description: The reclassified annotation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnotationView'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: The caller is a participant but neither owner nor author
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown annotation, or the caller is not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: The annotation is already resolved (`ANNOTATION_ALREADY_RESOLVED`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /annotations/{annotationId}/resolve:
    parameters:
      - $ref: '#/components/parameters/AnnotationIdParam'
    post:
      tags: [Annotations]
      summary: Resolve an annotation (author only)
      description: |
        Closes the annotation, `OPEN → RESOLVED` (ADR-0011 as amended by issue
        #405) — allowed for the annotation's author alone: they raised the
        concern, only they know when it is settled. An optional closing note is
        appended to the thread as a regular comment. The open-annotation count
        re-derives the review state through the state-machine choke-point
        (resolving the last open annotation returns `CHANGES_REQUESTED` to
        `IN_REVIEW`). Rejected with `409` if the annotation is already resolved.
      operationId: resolveAnnotation
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnnotationResolveRequest'
      responses:
        '200':
          description: The updated annotation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnotationView'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: The caller is not the annotation's author
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown annotation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: The annotation has already been resolved (`ANNOTATION_ALREADY_RESOLVED`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /annotations/{annotationId}/reopen:
    parameters:
      - $ref: '#/components/parameters/AnnotationIdParam'
    post:
      tags: [Annotations]
      summary: Reopen a resolved annotation (author only)
      description: |
        Reverses a resolution, `RESOLVED → OPEN` (issue #394) — allowed for the
        annotation's author alone, and only while the review is still running:
        a FINALIZED or CANCELLED review is a closed record (`REVIEW_CLOSED`,
        409). The thread stays intact and accepts comments again; the
        open-annotation count re-derives the review state (a reopened concern
        moves `IN_REVIEW` back to `CHANGES_REQUESTED`).
      operationId: reopenAnnotation
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The updated annotation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnotationView'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: The caller is not the annotation's author
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown annotation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: >-
            The annotation is not RESOLVED (`ANNOTATION_NOT_RESOLVED`), or the
            review is FINALIZED/CANCELLED (`REVIEW_CLOSED`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /annotations/{annotationId}/reactions/{emoji}:
    parameters:
      - $ref: '#/components/parameters/AnnotationIdParam'
      - $ref: '#/components/parameters/EmojiParam'
    put:
      tags: [Annotations]
      summary: Add the caller's emoji reaction to an annotation
      description: |
        Slack-style reaction (issue #410): adds the caller's `emoji` to the
        annotation; repeating the call is a no-op, so the PUT/DELETE pair is
        idempotent. A reaction is a lightweight signal, not a discussion
        contribution — RESOLVED annotations stay reactable; only a
        FINALIZED/CANCELLED review refuses (`REVIEW_CLOSED`, 409). One reaction
        per user per emoji; several different emojis per user are fine.
      operationId: reactToAnnotation
      security:
        - bearerAuth: []
      responses:
        '204':
          description: The reaction is present (added now or already there)
        '400':
          description: The path segment is not a plausible emoji
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Unknown annotation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: The review is FINALIZED/CANCELLED (`REVIEW_CLOSED`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Annotations]
      summary: Remove the caller's emoji reaction from an annotation
      description: |
        The inverse of `reactToAnnotation` (issue #410); removing an absent
        reaction is a no-op.
      operationId: unreactFromAnnotation
      security:
        - bearerAuth: []
      responses:
        '204':
          description: The reaction is absent (removed now or never there)
        '400':
          description: The path segment is not a plausible emoji
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Unknown annotation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: The review is FINALIZED/CANCELLED (`REVIEW_CLOSED`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /comments/{commentId}/reactions/{emoji}:
    parameters:
      - $ref: '#/components/parameters/CommentIdParam'
      - $ref: '#/components/parameters/EmojiParam'
    put:
      tags: [Annotations]
      summary: Add the caller's emoji reaction to a comment
      description: |
        Slack-style reaction on a thread message (issue #410); the same
        semantics as `reactToAnnotation`, keyed by the comment id.
      operationId: reactToComment
      security:
        - bearerAuth: []
      responses:
        '204':
          description: The reaction is present (added now or already there)
        '400':
          description: The path segment is not a plausible emoji
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Unknown comment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: The review is FINALIZED/CANCELLED (`REVIEW_CLOSED`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Annotations]
      summary: Remove the caller's emoji reaction from a comment
      description: |
        The inverse of `reactToComment` (issue #410); removing an absent
        reaction is a no-op.
      operationId: unreactFromComment
      security:
        - bearerAuth: []
      responses:
        '204':
          description: The reaction is absent (removed now or never there)
        '400':
          description: The path segment is not a plausible emoji
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Unknown comment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: The review is FINALIZED/CANCELLED (`REVIEW_CLOSED`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /annotations/{annotationId}/placements/{versionNumber}/confirm:
    parameters:
      - $ref: '#/components/parameters/AnnotationIdParam'
      - name: versionNumber
        in: path
        required: true
        schema:
          type: integer
    post:
      tags: [Annotations]
      summary: Confirm a MOVED placement after review (owner or author)
      description: |
        The human half of re-anchoring (ADR-0009, issue #326): a MOVED
        placement means the anchor was relocated with a change worth checking.
        Once the document owner or the annotation's author has verified the
        highlight on that version, confirming flips the placement back to
        PLACED, keeping the resolved anchor. Only MOVED placements confirm —
        anything else answers 409 (`PLACEMENT_NOT_MOVED`); orphans are handled
        by re-drawing or resolving instead.
      operationId: confirmPlacement
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The updated annotation with the confirmed placement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnotationView'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: The caller is neither the document owner nor the annotation's author
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown annotation, version, or no placement on that version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: The placement is not MOVED (`PLACEMENT_NOT_MOVED`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /annotations/{annotationId}/comments:
    parameters:
      - $ref: '#/components/parameters/AnnotationIdParam'
    get:
      tags: [Annotations]
      summary: List an annotation's comment thread
      operationId: listComments
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The thread, oldest first
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Unknown annotation, or the caller is not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Annotations]
      summary: Add a comment to an annotation
      description: |
        Appends to the discussion thread. A RESOLVED annotation's thread is a
        closed record (issue #403) and refuses further comments with `409`.
      operationId: addComment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentCreateRequest'
      responses:
        '201':
          description: The created comment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentView'
        '400':
          description: Validation failed (e.g. an empty body)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Unknown annotation, or the caller is not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: The annotation is RESOLVED (`ANNOTATION_ALREADY_RESOLVED`) — its thread is closed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /documents/{documentId}/diff:
    get:
      tags:
        - Documents
      summary: What changed between two versions
      description: |
        A word-granularity text diff over the two versions' extracted text layers
        (ADR-0034), with every change mapped back to the normalized boxes of the
        text runs it covers — so the change can be highlighted on the rendered
        original. Any pair is diffable (not only adjacent versions). Versions are
        immutable, so the result is computed on first request and served from a
        permanent cache afterwards. A version without a text layer (an image)
        contributes no changes; the client falls back to side-by-side.
      operationId: getVersionDiff
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DocumentIdParam'
        - name: from
          in: query
          required: true
          description: The 1-based number of the older (baseline) version.
          schema:
            type: integer
            minimum: 1
        - name: to
          in: query
          required: true
          description: The 1-based number of the newer version to compare against.
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: The located changes from `from` to `to`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionDiffResponse'
        '400':
          description: Invalid version pair (e.g. `from` equals `to`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Unknown document/version, or the caller is not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: >-
            Extraction has not completed for one of the versions
            (`EXTRACTION_PENDING`) or failed permanently (`EXTRACTION_FAILED`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT access token issued by the qnop auth subsystem (epic #7). Sent as
        `Authorization: Bearer <token>` on authenticated endpoints. The auth flow
        itself is introduced in a later issue; the scheme is declared here so the
        contract is complete from the first endpoint.
  parameters:
    DocumentIdParam:
      name: documentId
      in: path
      required: true
      description: The document's id.
      schema:
        type: string
        format: uuid
    VersionNumberParam:
      name: versionNumber
      in: path
      required: true
      description: The 1-based version number within the document.
      schema:
        type: integer
        minimum: 1
    OidcProviderIdParam:
      name: providerId
      in: path
      required: true
      description: The OIDC provider's id.
      schema:
        type: string
        format: uuid
    MailTemplateKeyParam:
      name: key
      in: path
      required: true
      description: The template storage key (e.g. `auth.password_reset`).
      schema:
        type: string
    UserIdParam:
      name: userId
      in: path
      required: true
      description: The user's id.
      schema:
        type: string
        format: uuid
    TeamIdParam:
      name: teamId
      in: path
      required: true
      description: The team's id.
      schema:
        type: string
        format: uuid
    CommentIdParam:
      name: commentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EmojiParam:
      name: emoji
      in: path
      required: true
      description: >-
        The reaction emoji, URL-encoded — stored and grouped verbatim, so ZWJ
        sequences and skin-tone variants are distinct reactions.
      schema:
        type: string
        minLength: 1
        maxLength: 32
    AnnotationIdParam:
      name: annotationId
      in: path
      required: true
      description: The annotation's id.
      schema:
        type: string
        format: uuid
    ParticipantIdParam:
      name: participantId
      in: path
      required: true
      description: The participant row's id.
      schema:
        type: string
        format: uuid
  responses:
    Unauthorized:
      description: Authentication is required (uniform error envelope, issue #45).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: The caller lacks permission for this resource (issue #45).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Rate limit exceeded; retry after the Retry-After header (issue #45).
      headers:
        Retry-After:
          description: Seconds to wait before retrying.
          schema:
            type: integer
            format: int32
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    WorkflowStatus:
      type: object
      description: |
        The workflow view of a document (issue #246, ADR-0011). `state` is an
        open string — the Community edition ships `DRAFT`, `IN_REVIEW`,
        `CHANGES_REQUESTED`, `FINALIZED` and `CANCELLED`, but an
        enterprise-extended state machine may add further states, so clients
        must tolerate unknown values.
      required:
        - state
        - allowedTransitions
      properties:
        state:
          type: string
          description: The current workflow state (Community values or an enterprise extension).
          example: IN_REVIEW
        allowedTransitions:
          type: array
          description: |
            Target states the owner may request explicitly from `state` (manual
            transition table only; guards are evaluated on the transition
            request, and the derived `IN_REVIEW ⇄ CHANGES_REQUESTED` pair is
            excluded, issue #405). Empty for terminal states and for states
            this edition does not manage.
          items:
            type: string
          example: [FINALIZED, CANCELLED]
    WorkflowTransitionRequest:
      type: object
      description: A request to move the review to `targetState` (issue #246, ADR-0011).
      required:
        - targetState
      properties:
        targetState:
          type: string
          minLength: 1
          maxLength: 32
          description: The requested target workflow state.
          example: FINALIZED
    Edition:
      type: string
      description: |
        The running qnop edition, determined by the classpath (ADR-0003): the
        presence of the commercial JARs. `COMMUNITY` is the AGPL build.
      enum:
        - COMMUNITY
        - ENTERPRISE
    SupportedFormat:
      type: string
      description: |
        A document format qnop can ingest and review. Each value maps to the MIME
        type accepted by the multipart upload endpoints, enforced by server-side
        magic-byte sniffing (the client-declared `Content-Type` is never trusted;
        an unrecognized file is rejected with `415`):

        - `PDF`  → `application/pdf` (magic `%PDF-`)
        - `DOCX` → `application/vnd.openxmlformats-officedocument.wordprocessingml.document`
        - `MD`   → `text/markdown`

        `PDF`, `DOCX` and `MD` are the Community-scope document formats; further
        formats are an Enterprise feature. A deployment reports the subset whose
        extractor currently ships in `ServerConfig.supportedFormats` — `PDF` today,
        with `DOCX` and Markdown to follow.
      enum:
        - PDF
        - DOCX
        - MD
    OidcProviderLoginInfo:
      type: object
      description: |
        Public login information for one enabled OIDC provider. Only non-sensitive
        fields appear here — never client secrets or issuer URIs.
      properties:
        id:
          type: string
          description: Stable provider id used to build the login URL.
        name:
          type: string
          description: Human-readable provider name rendered on the login button.
        loginUrl:
          type: string
          description: Relative URL the frontend redirects to in order to start login.
        iconKind:
          $ref: '#/components/schemas/OidcIconKind'
        accountPickerLoginUrl:
          type: string
          nullable: true
          description: |
            Relative login URL that forces the upstream account picker / re-auth
            screen (adds an allow-listed `prompt`). Null when the provider cannot
            honour it (e.g. GitHub), in which case the SPA renders a sign-out hint.
        accountSwitchHintUrl:
          type: string
          nullable: true
          description: |
            Absolute upstream sign-out URL the SPA links to as a fallback when the
            provider has no `prompt`-based account picker (today only GitHub). Null
            otherwise.
      required:
        - id
        - name
        - loginUrl
        - iconKind
    OidcIconKind:
      type: string
      description: |
        Which brand glyph the SPA renders on a provider's login button. Decoupled
        from `OidcProviderTypeDto` so the icon set can evolve independently.
      enum:
        - github
        - google
        - facebook
        - oidc
        - oauth2
    ServerConfigGeneral:
      type: object
      description: General, application-wide public configuration.
      properties:
        siteName:
          type: string
          description: |
            Operator-branded display name shown in the browser tab, top bar, and
            footer. DB-backed via application settings (issue #16); the frontend
            falls back to `qnop` when empty.
        defaultTimezone:
          type: string
          description: |
            Server default timezone (IANA id, e.g. `UTC`, `Europe/Berlin`) used as
            the display fallback for users without a personal preference.
      required:
        - siteName
        - defaultTimezone
    ServerConfigAuth:
      type: object
      description: |
        Public authentication configuration used by the login page to render the
        local form and any enabled OIDC provider buttons.
      properties:
        oidcProviders:
          type: array
          description: |
            OIDC providers currently enabled in the database. Empty when none is
            active. One "Login with <name>" button is rendered per entry (issue #21).
          items:
            $ref: '#/components/schemas/OidcProviderLoginInfo'
        selfRegistrationEnabled:
          type: boolean
          description: |
            Whether the operator has enabled public self-registration (issue #20).
            The backend enforces the gate independently; flipping this client-side
            cannot bypass the controller check.
      required:
        - oidcProviders
        - selfRegistrationEnabled
    ServerConfigUpload:
      type: object
      description: Upload-related public configuration.
      properties:
        maxDocumentSizeMb:
          type: integer
          format: int32
          description: |
            Maximum allowed document size in megabytes. Uploads exceeding this are
            rejected with HTTP 413. Operator-configurable.
      required:
        - maxDocumentSizeMb
    ServerConfigResponse:
      type: object
      description: |
        Public, non-sensitive server configuration. Intentionally small and
        stable — new top-level keys may be added, existing ones are not removed.
      properties:
        version:
          type: string
          description: |
            Server version string (e.g. "0.1.0-SNAPSHOT"). Sourced from build
            metadata at startup; "unknown" when build info is unavailable.
        edition:
          $ref: '#/components/schemas/Edition'
        general:
          $ref: '#/components/schemas/ServerConfigGeneral'
        auth:
          $ref: '#/components/schemas/ServerConfigAuth'
        upload:
          $ref: '#/components/schemas/ServerConfigUpload'
        supportedFormats:
          type: array
          description: |
            The document formats this deployment accepts for upload. Uploads go to
            the multipart `POST /documents` and `POST /documents/{documentId}/versions`
            endpoints (both `multipart/form-data`, deliberately outside this generated
            JSON contract — ADR-0021/0028); the ingest pipeline validates the file by
            magic-byte sniffing and rejects an unsupported type with `415`. Clients
            should offer only these formats. It reflects the subset whose extractor
            currently ships — `["PDF"]` today; the Community edition's `DOCX` and
            Markdown support extends it once their extractors land.
          items:
            $ref: '#/components/schemas/SupportedFormat'
        branding:
          $ref: '#/components/schemas/ServerConfigBranding'
      required:
        - version
        - edition
        - general
        - auth
        - upload
        - supportedFormats
    ServerConfigBranding:
      type: object
      description: |
        Effective branding logos. Each slot carries the URL to render and whether it
        is the operator's custom upload or the bundled factory default, so the UI can
        show and mark it without inferring from an image load.
      properties:
        logoLight:
          $ref: '#/components/schemas/ServerConfigBrandingSlot'
        logoDark:
          $ref: '#/components/schemas/ServerConfigBrandingSlot'
        logomark:
          $ref: '#/components/schemas/ServerConfigBrandingSlot'
      required:
        - logoLight
        - logoDark
        - logomark
    ServerConfigBrandingSlot:
      type: object
      description: One branding slot's effective asset.
      properties:
        source:
          type: string
          description: Whether the effective asset is the custom upload or the factory default.
          enum:
            - CUSTOM
            - DEFAULT
        url:
          type: string
          description: |
            Public URL of the effective asset, with a cache-busting `?v=` token (the
            asset's SHA-256) so it reloads when the upload changes.
      required:
        - source
        - url
    SettingValueType:
      type: string
      description: The declared type of an application setting value.
      enum:
        - STRING
        - INTEGER
        - BOOLEAN
        - ENUM
        - PASSWORD
    AdminSetting:
      type: object
      description: One application setting with its current (possibly masked) value.
      properties:
        key:
          type: string
          description: Stable dotted setting key (e.g. `smtp.host`).
        value:
          type: string
          description: Current value; sensitive values are masked as `***`.
        type:
          $ref: '#/components/schemas/SettingValueType'
        description:
          type: string
          description: Human-readable description of the setting.
        sensitive:
          type: boolean
          description: Whether the value is a secret (masked here, encrypted at rest).
        allowedValues:
          type: array
          items:
            type: string
          description: >-
            For `ENUM`-typed settings, the permitted values, in display order; the
            admin UI renders these as a dropdown. Empty for all other types.
      required:
        - key
        - type
        - description
        - sensitive
    AdminSettingsResponse:
      type: object
      description: The full set of global application settings.
      properties:
        settings:
          type: array
          items:
            $ref: '#/components/schemas/AdminSetting'
      required:
        - settings
    AdminSettingsUpdateRequest:
      type: object
      description: |
        Partial map of setting key to new raw value. Omitted keys are left
        unchanged; `***` for a sensitive key keeps the stored secret.
      properties:
        values:
          type: object
          additionalProperties:
            type: string
          description: Map of setting key to new value.
      required:
        - values
    LoginRequest:
      type: object
      description: Local-login credentials (issue #17).
      properties:
        usernameOrEmail:
          type: string
          description: The internal user's username or email address.
        password:
          type: string
          format: password
          description: The user's plaintext password (verified against the BCrypt hash).
      required:
        - usernameOrEmail
        - password
    ChangePasswordRequest:
      type: object
      description: Password-change payload for the authenticated user (issue #17).
      properties:
        currentPassword:
          type: string
          format: password
          description: The user's current password, re-verified before the change.
        newPassword:
          type: string
          format: password
          minLength: 8
          maxLength: 200
          description: The replacement password. Must meet the minimum-length policy.
      required:
        - currentPassword
        - newPassword
    TokenResponse:
      type: object
      description: |
        A freshly issued access token (issue #17). The refresh token is delivered
        out-of-band as an HttpOnly cookie and never appears in this body.
      properties:
        accessToken:
          type: string
          description: Signed JWT access token; send it in the Authorization header as a Bearer token.
        tokenType:
          type: string
          description: Always `Bearer`.
        expiresInSeconds:
          type: integer
          format: int64
          description: Access-token lifetime in seconds from issuance.
      required:
        - accessToken
        - tokenType
        - expiresInSeconds
    SendTestEmailRequest:
      type: object
      description: Request to send a test email.
      properties:
        recipient:
          type: string
          format: email
          description: Address the test message is sent to.
      required:
        - recipient
    SendStatus:
      type: string
      description: Outcome of a mail send attempt.
      enum:
        - SENT
        - SKIPPED
        - FAILED
    SendTestEmailResponse:
      type: object
      description: Outcome of a test-email send (never a transport-level error to the client).
      properties:
        status:
          $ref: '#/components/schemas/SendStatus'
        detail:
          type: string
          description: Human-readable detail (e.g. "SMTP is not configured").
      required:
        - status
        - detail
    MailTemplateSource:
      type: string
      description: Where the effective template content originates.
      enum:
        - DATABASE
        - DEFAULT
    MailTemplateResponse:
      type: object
      description: The effective content of one mail template, plus editor metadata.
      properties:
        key:
          type: string
          description: Stable template storage key (e.g. `auth.password_reset`).
        friendlyName:
          type: string
          description: Human-readable label for the template (e.g. `Password reset`).
        locale:
          type: string
        subject:
          type: string
        bodyPlain:
          type: string
        bodyHtml:
          type: string
          description: Optional HTML alternative; absent when the template is plain-text only.
        source:
          $ref: '#/components/schemas/MailTemplateSource'
        placeholders:
          type: array
          items:
            type: string
          description: >-
            The sorted, closed set of `{{placeholder}}` names this template
            accepts. The editor offers these as chips and rejects any other.
        defaultSubject:
          type: string
          description: The built-in catalog subject (for compare/reset in the editor).
        defaultBodyPlain:
          type: string
          description: The built-in catalog plain-text body.
        defaultBodyHtml:
          type: string
          description: The built-in catalog HTML body (branded chrome); absent if none.
        updatedAt:
          type: string
          format: date-time
          description: When a stored override was last saved; absent for built-in defaults.
        updatedBy:
          type: string
          description: Id of the admin who last saved the override; absent for built-in defaults.
        updatedByName:
          type: string
          description: >-
            Display name of the admin who last saved the override; absent for
            built-in defaults or a since-deleted user.
      required:
        - key
        - friendlyName
        - locale
        - subject
        - bodyPlain
        - source
        - placeholders
        - defaultSubject
        - defaultBodyPlain
    MailTemplateListResponse:
      type: object
      properties:
        templates:
          type: array
          items:
            $ref: '#/components/schemas/MailTemplateResponse'
      required:
        - templates
    UpdateMailTemplateRequest:
      type: object
      description: Create-or-update a per-locale template override.
      properties:
        locale:
          type: string
        subject:
          type: string
        bodyPlain:
          type: string
        bodyHtml:
          type: string
          description: Optional HTML alternative.
      required:
        - locale
        - subject
        - bodyPlain
    PreviewMailTemplateRequest:
      type: object
      description: Render a template without sending.
      properties:
        locale:
          type: string
          description: Locale to render; falls back to the default language when omitted.
        subject:
          type: string
          description: >-
            Draft subject to render instead of the stored version, for a live
            preview while editing. When both subject and bodyPlain are supplied
            the draft is rendered; otherwise the stored override or built-in
            default is used.
        bodyPlain:
          type: string
          description: >-
            Draft plain-text body to render instead of the stored version.
            Honoured only together with a draft subject.
        bodyHtml:
          type: string
          description: >-
            Optional draft HTML alternative. When omitted or blank the branded
            default chrome is rendered around the plain content.
        variables:
          type: object
          additionalProperties:
            type: string
          description: Template variables; representative sample data is used when omitted.
    MailTemplatePreviewResponse:
      type: object
      properties:
        subject:
          type: string
        bodyPlain:
          type: string
        bodyHtml:
          type: string
        sampleVars:
          type: object
          additionalProperties:
            type: string
          description: >-
            The effective variables used for this render — per-key demo values
            overlaid with any caller-supplied overrides — so the editor can
            prefill its sample-variable inputs.
      required:
        - subject
        - bodyPlain
        - sampleVars
    UserSettingItem:
      type: object
      description: One user setting with its current value.
      properties:
        key:
          type: string
          description: Stable setting key (e.g. `theme`).
        value:
          type: string
          description: Current value (registry default where the user has not set one).
        type:
          $ref: '#/components/schemas/SettingValueType'
        description:
          type: string
          description: Human-readable description of the setting.
      required:
        - key
        - type
        - description
    UserSettingsResponse:
      type: object
      description: The authenticated user's settings.
      properties:
        settings:
          type: array
          items:
            $ref: '#/components/schemas/UserSettingItem'
      required:
        - settings
    UserSettingsUpdateRequest:
      type: object
      description: Partial map of user setting key to new value.
      properties:
        values:
          type: object
          additionalProperties:
            type: string
          description: Map of setting key to new value.
      required:
        - values
    UserRole:
      type: string
      description: |
        A user's global system role — exactly one per user (issue #98). `ADMIN`
        administers the system; `MEMBER` is the standard user; `AUDITOR` has
        organisation-wide read access to the audit trail and compliance.
      enum:
        - ADMIN
        - MEMBER
        - AUDITOR
    UserSource:
      type: string
      description: |
        How the account authenticates: `INTERNAL` (local username + password) or
        `EXTERNAL` (provisioned from an OIDC/OAuth2 provider).
      enum:
        - INTERNAL
        - EXTERNAL
    PublicUserProfile:
      type: object
      description: The workspace-public slice of a user (issue #454).
      required:
        - id
        - displayName
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
        avatarUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    CurrentUserResponse:
      type: object
      description: The authenticated user's own profile.
      properties:
        id:
          type: string
          format: uuid
          description: The user's stable id.
        displayName:
          type: string
          description: Human-readable name shown in the UI.
        email:
          type: string
          description: The user's email address.
        role:
          $ref: '#/components/schemas/UserRole'
        source:
          $ref: '#/components/schemas/UserSource'
        avatarUrl:
          type: string
          nullable: true
          description: |
            URL of the user's profile picture (with a cache-busting `?v=` token),
            or null when none is set — the UI then renders the initials avatar.
      required:
        - id
        - displayName
        - email
        - role
        - source
    AdminUserSummary:
      type: object
      description: A user as shown in the admin user list.
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
          maxLength: 255
        email:
          type: string
        username:
          type: string
          nullable: true
          description: The local username; null for external (OIDC) accounts.
        role:
          $ref: '#/components/schemas/UserRole'
        source:
          $ref: '#/components/schemas/UserSource'
        enabled:
          type: boolean
        passwordChangeRequired:
          type: boolean
          description: Whether the user must change their password before normal use.
        providerName:
          type: string
          nullable: true
          description: The OIDC provider's name for external accounts; null otherwise.
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        avatarUrl:
          type: string
          nullable: true
          description: |
            URL of the user's profile picture (with a cache-busting `?v=` token),
            or null when none is set — the UI then renders the initials avatar.
      required:
        - id
        - displayName
        - email
        - role
        - source
        - enabled
        - passwordChangeRequired
        - createdAt
    AdminUserDetail:
      allOf:
        - $ref: '#/components/schemas/AdminUserSummary'
      description: Full detail for a single user (currently the same fields as the summary).
    AdminPasswordResetResponse:
      type: object
      description: Outcome of an admin-triggered password reset.
      properties:
        emailSent:
          type: boolean
          description: Whether the reset email was delivered.
        resetUrl:
          type: string
          nullable: true
          description: |
            The single-use reset link, returned only when the email could not be
            sent so the operator can deliver it out of band.
      required:
        - emailSent
    AdminGeneratedPasswordResponse:
      type: object
      description: |
        A freshly generated password, returned exactly once. It is never stored in
        clear text and cannot be retrieved again — the admin must hand it over now.
      properties:
        password:
          type: string
          description: The generated plaintext password, shown a single time.
      required:
        - password
    AdminUserListResponse:
      type: object
      description: A page of users for the admin list.
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AdminUserSummary'
        total:
          type: integer
          format: int64
          description: Total number of users matching the query.
        page:
          type: integer
          format: int32
          description: Zero-based page index.
        size:
          type: integer
          format: int32
          description: Page size.
