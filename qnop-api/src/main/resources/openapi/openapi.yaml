  /auth/register:
    post:
      tags:
        - AuthRegistration
      summary: Register a local account
      description: |
        Self-registration of a local user. Public; gated by the
        `auth.self_registration_enabled` setting. Anti-enumeration: the response is
        **uniform** whether or not the username/email already exists (no account is
        created or re-mailed for a duplicate); when registration is disabled the
        endpoint reports a **disguised 404** so its availability is not revealed.
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Uniform registration acknowledgement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Registration is not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /auth/verify-email:
    get:
      tags:
        - AuthRegistration
      summary: Verify a registered email address
      description: Consumes a single-use verification token and activates the account. Public.
      operationId: verifyEmail
      security: []
      parameters:
        - name: token
          in: query
          required: true
          description: The raw verification token from the emailed link.
          schema:
            type: string
      responses:
        '200':
          description: Verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyEmailResponse'
        '400':
          description: Unknown, expired, or already-used token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/forgot-password:
    post:
      tags:
        - AuthPasswordReset
      summary: Request a password-reset email
      description: |
        Starts the self-service reset flow. Public. Always returns **204** with
        constant-time behaviour regardless of whether the address maps to a local
        account, so it cannot be used to enumerate users.
      operationId: forgotPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '204':
          description: Request accepted (no content; outcome intentionally not disclosed)
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /auth/reset-password:
    post:
      tags:
        - AuthPasswordReset
      summary: Complete a password reset
      description: Consumes a single-use reset token and sets the new password. Public.
      operationId: resetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '204':
          description: Password updated
        '400':
          description: Unknown/expired/used token or invalid password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/login:
    post:
      tags:
        - Auth
      summary: Authenticate with username/email and password
      description: |
        Verifies local credentials and, on success, returns a short-lived access
        token in the body and sets the rotating refresh token as an HttpOnly
        `qnop_refresh` cookie. Public (no bearer required).
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated — access token in body, refresh token in cookie.
          headers:
            Set-Cookie:
              description: HttpOnly refresh-token cookie (`qnop_refresh`).
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Rotate the refresh token and issue a new access token
      description: |
        Rotates the presented `qnop_refresh` cookie (single-use; replay of a
        revoked token revokes the whole family) and returns a new access token,
        setting a fresh refresh cookie. CSRF-protected (double-submit token).
      operationId: refresh
      security: []
      parameters:
        - name: qnop_refresh
          in: cookie
          required: false
          description: The HttpOnly refresh-token cookie.
          schema:
            type: string
      responses:
        '200':
          description: Rotated — new access token in body, new refresh token in cookie.
          headers:
            Set-Cookie:
              description: Fresh HttpOnly refresh-token cookie (`qnop_refresh`).
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Missing, unknown, expired, or reused refresh token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /auth/logout:
    post:
      tags:
        - Auth
      summary: Log out — revoke the refresh-token family and clear the cookie
      description: |
        Revokes the refresh-token family behind the presented cookie and clears
        it. Idempotent. CSRF-protected (double-submit token).
      operationId: logout
      security: []
      parameters:
        - name: qnop_refresh
          in: cookie
          required: false
          description: The HttpOnly refresh-token cookie.
          schema:
            type: string
      responses:
        '204':
          description: Logged out (cookie cleared).
          headers:
            Set-Cookie:
              description: Clearing cookie for `qnop_refresh`.
              schema:
                type: string
  /auth/change-password:
    post:
      tags:
        - Auth
      summary: Change the authenticated user's password
      description: |
        Verifies the current password, stores the new one, and invalidates all
        existing tokens for the user (every active session must re-authenticate).
        Requires a valid access token.
      operationId: changePassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          description: Password changed; existing tokens invalidated.
        '400':
          description: New password does not meet policy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing/invalid access token or wrong current password.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: |
            The account authenticates via an external provider (OIDC) and has no local
            password to change (code `EXTERNAL_ACCOUNT`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /users/{userId}:
    get:
      tags:
        - Users
      summary: A user's workspace-public profile
      description: |
        The lean slice any signed-in user may see about a colleague (issue
        #454): display name, avatar and tenure — no email, role or source.
        Backs the profile links on dashboards and review surfaces.
      operationId: getUserProfile
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The user's public profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicUserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Unknown user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/me:
    get:
      tags:
        - Users
      summary: Get the current user's profile
      description: |
        Returns the authenticated user's identity, global role and account source.
        The SPA calls this right after login to render the shell and gate
        role-based UI. Requires a user (JWT) principal; non-user principals are
        rejected with 403.
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The current user's profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /users/me/settings:
    get:
      tags:
        - UserSettings
      summary: Get the current user's settings
      description: |
        Returns the authenticated user's settings with their values, types and
        descriptions (registry defaults where unset). Requires a user (JWT)
        principal; API-key principals are rejected.
      operationId: getCurrentUserSettings
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The current user's settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Principal is not a user (e.g. an API key)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags:
        - UserSettings
      summary: Update the current user's settings
      description: |
        Applies a partial set of changes (`key` to value) for the authenticated
        user and returns the full, updated settings.
      operationId: updateCurrentUserSettings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserSettingsUpdateRequest'
      responses:
        '200':
          description: Updated user settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsResponse'
        '400':
          description: Unknown key or type-invalid value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Principal is not a user (e.g. an API key)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /documents/{documentId}/workflow:
    parameters:
      - name: documentId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [ReviewWorkflow]
      summary: Current workflow state of a document
      description: |
        The document's persisted workflow state and the transitions that are
        structurally reachable from it (guards are not pre-evaluated — the
        authoritative check happens on the transition request itself). The
        transition list is empty for terminal states and for states this
        edition's state machine does not manage.
      operationId: getDocumentWorkflow
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The current workflow status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowStatus'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [ReviewWorkflow]
      summary: Request a workflow transition (owner-only)
      description: |
        Moves the review to `targetState` through the state-machine choke-point
        (ADR-0011). Rejected with `409` when the edge is not in the transition
        table, when it belongs to the derived `IN_REVIEW ⇄ CHANGES_REQUESTED`
        pair (issue #405 — that pair follows the open-annotation count and is
        never set by hand), when a guard vetoes it — finalization requires zero
        OPEN annotations and zero PENDING placements (re-anchoring complete) —
        or when the current or target state is not managed by this edition.
      operationId: transitionDocumentWorkflow
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowTransitionRequest'
      responses:
        '200':
          description: Transition applied; the new workflow status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowStatus'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: The caller is not the document owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Illegal transition or a guard vetoed it (e.g. the FINALIZED invariant)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /dashboard:
    get:
      tags: [Dashboard]
      summary: The caller's dashboard aggregates
      description: |
        The cross-review aggregates of the command-centre dashboard (issue
        #454): the latest replies by others in threads the caller started or
        joined, the recent activity of their reviews (from the audit trail),
        and the weekly resolved count. Everything per-review (state, progress,
        participants, due date) already travels on `GET /documents` — a client
        renders the whole dashboard from those two calls. Names honour
        per-review anonymity (issue #413); annotation activity of a
        PRIVATE-participation review is shown only to its owner.
      operationId: getDashboard
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The dashboard aggregates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /documents:
    get:
      tags:
        - Documents
      summary: List the caller's documents
      description: |
        Every document the caller owns or participates in — directly or through
        a team membership. Deliberately personal: admins see their own list
        here too and use the direct document endpoints for oversight.
      operationId: listDocuments
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: false
          description: Case-insensitive search over the title.
          schema:
            type: string
            maxLength: 200
        - name: sort
          in: query
          required: false
          description: |
            Sort as `field,direction`. Allowed fields: updatedAt, createdAt,
            title; direction asc|desc.
          schema:
            type: string
            default: updatedAt,desc
        - name: page
          in: query
          required: false
          description: Zero-based page index.
          schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          description: Page size.
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: A page of the caller's documents, with review progress.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /documents/{documentId}/participants:
    get:
      tags:
        - Documents
      summary: List review participants
      description: |
        The document's reviewers — users or teams (ADR-0011). The owner is
        structural on the document and never appears here.
      operationId: listParticipants
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DocumentIdParam'
      responses:
        '200':
          description: The participants, oldest first.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParticipantListResponse'
        '404':
          description: Unknown document, or the caller is not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
        - Documents
      summary: Add a review participant
      description: |
        Owner-only. Exactly one of `userId` or `teamId` — a participant is a
        user XOR a team. Adding the owner, a disabled principal, or an unknown
        principal is rejected with 400; adding a principal twice with 409.
      operationId: addParticipant
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DocumentIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParticipantCreateRequest'
      responses:
        '201':
          description: The participant was added.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParticipantView'
        '400':
          description: Not exactly one principal, unknown or disabled principal, or the owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: The caller is a participant but not the owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown document, or the caller is not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: The principal is already a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /documents/{documentId}/participants/{participantId}:
    delete:
      tags:
        - Documents
      summary: Remove a review participant
      description: Owner-only.
      operationId: removeParticipant
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DocumentIdParam'
        - $ref: '#/components/parameters/ParticipantIdParam'
      responses:
        '204':
          description: The participant was removed.
        '403':
          description: The caller is a participant but not the owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown document or participant, or the caller is not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /principals:
    get:
      tags:
        - Principals
      summary: Search assignable principals
      operationId: searchPrincipals
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
