# SPDX-License-Identifier: AGPL-3.0-only
#
# qnop REST API contract — single source of truth (ADR-0015, ADR-0021).
# qnop-api-model generates DTOs from the `components/schemas`; qnop-api-endpoint
# generates Spring MVC interfaces from the `paths`. URL versioning is /api/v1
# (realized by a controller path prefix in qnop-app, see ApiPathConfig).
openapi: 3.1.0
info:
  title: qnop API
  version: v1
  description: |
    **qnop** ("Qualified Notes on Papers") is an enterprise document-review system.
    This is the published, versioned REST contract consumed by the qnop frontend
    and by third-party integrators. It carries `/api/v1` URL versioning and a
    deprecation policy (ADR-0015).
  license:
    name: AGPL-3.0-only
    url: https://www.gnu.org/licenses/agpl-3.0.html
servers:
  - url: /api/v1
    description: Versioned API root
tags:
  - name: ServerConfig
    description: |
      Public, unauthenticated server configuration the frontend needs before a
      user is authenticated (edition flag, branding, enabled login providers,
      upload limits, supported document formats).
  - name: AdminSettings
    description: |
      Superadmin-only administration of the global application settings
      (issue #16). Sensitive values are masked as `***`.
  - name: Auth
    description: |
      Authentication: local username/email + password login, refresh-token
      rotation, logout, and password change (issue #17). Access tokens are
      short-lived JWTs sent as `Authorization: Bearer`; the rotating refresh
      token lives in an HttpOnly, SameSite=Strict cookie scoped to `/api/v1/auth`.
  - name: UserSettings
    description: |
      The authenticated user's own per-user settings (issue #22).
  - name: Users
    description: |
      The authenticated user's own profile — identity, global role and account
      source — used by the SPA to render the shell and gate role-based UI (#99).
  - name: AdminUsers
    description: |
      Admin-only user management (issue #104): list/search with pagination,
      create (set an initial password or send an invitation), edit display name,
      global role and enabled state, and trigger a password-setup/reset link.
      A self-lockout guard prevents an admin from disabling or demoting their own
      account or the last remaining admin.
paths:
  /config:
    get:
      tags:
        - ServerConfig
      summary: Get public server configuration
      description: |
        Returns non-sensitive, operator-configurable server settings the client
        needs before authentication — the running edition, branding, the enabled
        OIDC login providers, the upload size limit, and the supported document
        formats.

        This endpoint is **public** (no authentication). The response is
        intentionally small and stable: new top-level keys may be added, existing
        ones are never removed.
      operationId: getServerConfig
      security: []
      responses:
        '200':
          description: Current public server configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerConfigResponse'
              example:
                version: "0.1.0-SNAPSHOT"
                edition: COMMUNITY
                general:
                  siteName: qnop
                  defaultTimezone: UTC
                auth:
                  oidcProviders: []
                  selfRegistrationEnabled: false
                upload:
                  maxDocumentSizeMb: 50
                supportedFormats:
                  - PDF
                  - DOCX
                  - MD
  /admin/settings:
    get:
      tags:
        - AdminSettings
      summary: List application settings
      description: |
        Returns all global application settings with their current values
        (sensitive values masked as `***`), declared types, and descriptions.
        Superadmin only.
      operationId: getAdminSettings
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current application settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSettingsResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags:
        - AdminSettings
      summary: Update application settings
      description: |
        Applies a partial set of setting changes (`key` → raw value). Sending
        `***` for a sensitive key leaves the stored secret unchanged. Returns the
        full, updated settings. Superadmin only.
      operationId: updateAdminSettings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminSettingsUpdateRequest'
      responses:
        '200':
          description: Updated application settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSettingsResponse'
        '400':
          description: Unknown key or type-invalid value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/oidc-providers:
    get:
      tags:
        - AdminOidcProviders
      summary: List OIDC/OAuth2 providers
      operationId: listOidcProviders
      security:
        - bearerAuth: []
      responses:
        '200':
          description: All configured providers (client secrets never included)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OidcProviderListResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - AdminOidcProviders
      summary: Create an OIDC/OAuth2 provider
      description: Creates a disabled provider; the operator enables it after verifying the config.
      operationId: createOidcProvider
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OidcProviderCreateRequest'
      responses:
        '201':
          description: The created provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OidcProviderDto'
        '400':
          description: Invalid input or a blocked/invalid URI
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/oidc-providers/discover:
    post:
      tags:
        - AdminOidcProviders
      summary: Discover endpoints for an OIDC issuer
      description: |
        Probes an issuer URI's `.well-known/openid-configuration` and returns the
        discovered endpoints. The issuer URI passes the SSRF guard first. Returns
        a body with `success=false` (not a 5xx) when the issuer is not discoverable.
      operationId: discoverOidcEndpoints
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OidcDiscoveryRequest'
      responses:
        '200':
          description: Discovery outcome
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OidcDiscoveryResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/oidc-providers/{providerId}:
    get:
      tags:
        - AdminOidcProviders
      summary: Get an OIDC/OAuth2 provider
      operationId: getOidcProvider
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OidcProviderIdParam'
      responses:
        '200':
          description: The provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OidcProviderDto'
        '404':
          description: Unknown provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags:
        - AdminOidcProviders
      summary: Update an OIDC/OAuth2 provider
      description: Partial update; only provided fields change. A blank client secret keeps the stored one.
      operationId: updateOidcProvider
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OidcProviderIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OidcProviderUpdateRequest'
      responses:
        '200':
          description: The updated provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OidcProviderDto'
        '400':
          description: Invalid input or a blocked/invalid URI
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - AdminOidcProviders
      summary: Delete an OIDC/OAuth2 provider
      operationId: deleteOidcProvider
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OidcProviderIdParam'
      responses:
        '204':
          description: Provider deleted
        '404':
          description: Unknown provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/email/test:
    post:
      tags:
        - AdminEmail
      summary: Send a test email
      description: |
        Sends a fixed test message to the given recipient using the current SMTP
        settings, to verify mail delivery. Superadmin only. Never returns a 5xx
        for a delivery problem — the outcome is reported in the body `status`.
      operationId: sendTestEmail
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendTestEmailRequest'
      responses:
        '200':
          description: Send attempt completed (see `status` for the outcome)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendTestEmailResponse'
        '400':
          description: Invalid recipient
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/email/templates:
    get:
      tags:
        - AdminEmail
      summary: List mail templates
      description: |
        Returns the effective content of every known mail template at the
        configured default locale, marking whether each comes from a stored
        override (`DATABASE`) or the built-in default (`DEFAULT`). Superadmin only.
      operationId: listMailTemplates
      security:
        - bearerAuth: []
      responses:
        '200':
          description: All mail templates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MailTemplateListResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/email/templates/{key}:
    get:
      tags:
        - AdminEmail
      summary: Get a mail template
      operationId: getMailTemplate
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MailTemplateKeyParam'
      responses:
        '200':
          description: The effective template content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MailTemplateResponse'
        '404':
          description: Unknown template key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - AdminEmail
      summary: Create or update a mail template override
      operationId: updateMailTemplate
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MailTemplateKeyParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMailTemplateRequest'
      responses:
        '200':
          description: The saved template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MailTemplateResponse'
        '400':
          description: Invalid template content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown template key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - AdminEmail
      summary: Reset a mail template to its default
      description: Removes the stored override, reverting to the built-in default.
      operationId: resetMailTemplate
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MailTemplateKeyParam'
      responses:
        '204':
          description: Override removed (or none existed)
        '404':
          description: Unknown template key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/email/templates/{key}/preview:
    post:
      tags:
        - AdminEmail
      summary: Preview a mail template
      description: |
        Renders the template with the supplied variables (or representative sample
        data when none are given), without sending. Superadmin only.
      operationId: previewMailTemplate
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MailTemplateKeyParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreviewMailTemplateRequest'
      responses:
        '200':
          description: The rendered preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MailTemplatePreviewResponse'
        '400':
          description: Render error (e.g. a referenced variable is missing)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown template key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/users:
    get:
      tags:
        - AdminUsers
      summary: List and search users
      description: |
        Returns a page of users (internal and external), most-recent first.
        Optional `q` matches display name, email or username (case-insensitive);
        optional `role` filters by global role.
      operationId: listUsers
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: false
          description: Case-insensitive search over display name, email and username.
          schema:
            type: string
            maxLength: 200
        - name: role
          in: query
          required: false
          description: Filter by global role.
          schema:
            $ref: '#/components/schemas/UserRole'
        - name: page
          in: query
          required: false
          description: Zero-based page index.
          schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          description: Page size.
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: A page of users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags:
        - AdminUsers
      summary: Create or invite a user
      description: |
        Creates an internal account. If `initialPassword` is provided the account
        is enabled immediately and must change its password on first login. If it
        is omitted, the account is created without a password and an invitation
        link (set-your-password) is emailed to the address.
      operationId: createUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserCreateRequest'
      responses:
        '201':
          description: The created user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserDetail'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: A user with that username or email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/users/{userId}:
    get:
      tags:
        - AdminUsers
      summary: Get a user
      operationId: getUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '200':
          description: The user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserDetail'
        '404':
          description: Unknown user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    patch:
      tags:
        - AdminUsers
      summary: Update a user
      description: |
        Partial update of display name, global role and enabled state. The
        self-lockout guard rejects (409) an attempt to disable or demote your own
        account or the last remaining admin.
      operationId: updateUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserUpdateRequest'
      responses:
        '200':
          description: The updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserDetail'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Self-lockout or last-admin guard violated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/users/{userId}/password-reset:
    post:
      tags:
        - AdminUsers
      summary: Send a password-setup/reset link
      description: |
        Issues a password-reset token for the user and emails the set-your-password
        link. Works for any internal account (e.g. to (re)send an invitation or to
        help a locked-out user). External (OIDC) accounts have no local password and
        are rejected with 409.
      operationId: sendUserPasswordReset
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '202':
          description: The reset email has been queued
        '404':
          description: Unknown user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: The account has no local password (external/OIDC)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /auth/register:
    post:
      tags:
        - AuthRegistration
      summary: Register a local account
      description: |
        Self-registration of a local user. Public; gated by the
        `auth.self_registration_enabled` setting. Anti-enumeration: the response is
        **uniform** whether or not the username/email already exists (no account is
        created or re-mailed for a duplicate); when registration is disabled the
        endpoint reports a **disguised 404** so its availability is not revealed.
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Uniform registration acknowledgement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Registration is not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many registration attempts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/verify-email:
    get:
      tags:
        - AuthRegistration
      summary: Verify a registered email address
      description: Consumes a single-use verification token and activates the account. Public.
      operationId: verifyEmail
      security: []
      parameters:
        - name: token
          in: query
          required: true
          description: The raw verification token from the emailed link.
          schema:
            type: string
      responses:
        '200':
          description: Verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyEmailResponse'
        '400':
          description: Unknown, expired, or already-used token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/forgot-password:
    post:
      tags:
        - AuthPasswordReset
      summary: Request a password-reset email
      description: |
        Starts the self-service reset flow. Public. Always returns **204** with
        constant-time behaviour regardless of whether the address maps to a local
        account, so it cannot be used to enumerate users.
      operationId: forgotPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '204':
          description: Request accepted (no content; outcome intentionally not disclosed)
        '429':
          description: Too many reset requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/reset-password:
    post:
      tags:
        - AuthPasswordReset
      summary: Complete a password reset
      description: Consumes a single-use reset token and sets the new password. Public.
      operationId: resetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '204':
          description: Password updated
        '400':
          description: Unknown/expired/used token or invalid password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/login:
    post:
      tags:
        - Auth
      summary: Authenticate with username/email and password
      description: |
        Verifies local credentials and, on success, returns a short-lived access
        token in the body and sets the rotating refresh token as an HttpOnly
        `qnop_refresh` cookie. Public (no bearer required).
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated — access token in body, refresh token in cookie.
          headers:
            Set-Cookie:
              description: HttpOnly refresh-token cookie (`qnop_refresh`).
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Rotate the refresh token and issue a new access token
      description: |
        Rotates the presented `qnop_refresh` cookie (single-use; replay of a
        revoked token revokes the whole family) and returns a new access token,
        setting a fresh refresh cookie. CSRF-protected (double-submit token).
      operationId: refresh
      security: []
      parameters:
        - name: qnop_refresh
          in: cookie
          required: false
          description: The HttpOnly refresh-token cookie.
          schema:
            type: string
      responses:
        '200':
          description: Rotated — new access token in body, new refresh token in cookie.
          headers:
            Set-Cookie:
              description: Fresh HttpOnly refresh-token cookie (`qnop_refresh`).
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Missing, unknown, expired, or reused refresh token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/logout:
    post:
      tags:
        - Auth
      summary: Log out — revoke the refresh-token family and clear the cookie
      description: |
        Revokes the refresh-token family behind the presented cookie and clears
        it. Idempotent. CSRF-protected (double-submit token).
      operationId: logout
      security: []
      parameters:
        - name: qnop_refresh
          in: cookie
          required: false
          description: The HttpOnly refresh-token cookie.
          schema:
            type: string
      responses:
        '204':
          description: Logged out (cookie cleared).
          headers:
            Set-Cookie:
              description: Clearing cookie for `qnop_refresh`.
              schema:
                type: string
  /auth/change-password:
    post:
      tags:
        - Auth
      summary: Change the authenticated user's password
      description: |
        Verifies the current password, stores the new one, and invalidates all
        existing tokens for the user (every active session must re-authenticate).
        Requires a valid access token.
      operationId: changePassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          description: Password changed; existing tokens invalidated.
        '400':
          description: New password does not meet policy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing/invalid access token or wrong current password.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/me:
    get:
      tags:
        - Users
      summary: Get the current user's profile
      description: |
        Returns the authenticated user's identity, global role and account source.
        The SPA calls this right after login to render the shell and gate
        role-based UI. Requires a user (JWT) principal; non-user principals are
        rejected with 403.
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The current user's profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /users/me/settings:
    get:
      tags:
        - UserSettings
      summary: Get the current user's settings
      description: |
        Returns the authenticated user's settings with their values, types and
        descriptions (registry defaults where unset). Requires a user (JWT)
        principal; API-key principals are rejected.
      operationId: getCurrentUserSettings
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The current user's settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Principal is not a user (e.g. an API key)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags:
        - UserSettings
      summary: Update the current user's settings
      description: |
        Applies a partial set of changes (`key` to value) for the authenticated
        user and returns the full, updated settings.
      operationId: updateCurrentUserSettings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserSettingsUpdateRequest'
      responses:
        '200':
          description: Updated user settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsResponse'
        '400':
          description: Unknown key or type-invalid value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Principal is not a user (e.g. an API key)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT access token issued by the qnop auth subsystem (epic #7). Sent as
        `Authorization: Bearer <token>` on authenticated endpoints. The auth flow
        itself is introduced in a later issue; the scheme is declared here so the
        contract is complete from the first endpoint.
  parameters:
    OidcProviderIdParam:
      name: providerId
      in: path
      required: true
      description: The OIDC provider's id.
      schema:
        type: string
        format: uuid
    MailTemplateKeyParam:
      name: key
      in: path
      required: true
      description: The template storage key (e.g. `auth.password_reset`).
      schema:
        type: string
    UserIdParam:
      name: userId
      in: path
      required: true
      description: The user's id.
      schema:
        type: string
        format: uuid
  responses:
    Unauthorized:
      description: Authentication is required (uniform error envelope, issue #45).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: The caller lacks permission for this resource (issue #45).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Rate limit exceeded; retry after the Retry-After header (issue #45).
      headers:
        Retry-After:
          description: Seconds to wait before retrying.
          schema:
            type: integer
            format: int32
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    Edition:
      type: string
      description: |
        The running qnop edition, determined by the classpath (ADR-0003): the
        presence of the commercial JARs. `COMMUNITY` is the AGPL build.
      enum:
        - COMMUNITY
        - ENTERPRISE
    SupportedFormat:
      type: string
      description: A document format qnop can ingest and review.
      enum:
        - PDF
        - DOCX
        - MD
    OidcProviderLoginInfo:
      type: object
      description: |
        Public login information for one enabled OIDC provider. Only non-sensitive
        fields appear here — never client secrets or issuer URIs.
      properties:
        id:
          type: string
          description: Stable provider id used to build the login URL.
        name:
          type: string
          description: Human-readable provider name rendered on the login button.
        loginUrl:
          type: string
          description: Relative URL the frontend redirects to in order to start login.
      required:
        - id
        - name
        - loginUrl
    ServerConfigGeneral:
      type: object
      description: General, application-wide public configuration.
      properties:
        siteName:
          type: string
          description: |
            Operator-branded display name shown in the browser tab, top bar, and
            footer. DB-backed via application settings (issue #16); the frontend
            falls back to `qnop` when empty.
        defaultTimezone:
          type: string
          description: |
            Server default timezone (IANA id, e.g. `UTC`, `Europe/Berlin`) used as
            the display fallback for users without a personal preference.
      required:
        - siteName
        - defaultTimezone
    ServerConfigAuth:
      type: object
      description: |
        Public authentication configuration used by the login page to render the
        local form and any enabled OIDC provider buttons.
      properties:
        oidcProviders:
          type: array
          description: |
            OIDC providers currently enabled in the database. Empty when none is
            active. One "Login with <name>" button is rendered per entry (issue #21).
          items:
            $ref: '#/components/schemas/OidcProviderLoginInfo'
        selfRegistrationEnabled:
          type: boolean
          description: |
            Whether the operator has enabled public self-registration (issue #20).
            The backend enforces the gate independently; flipping this client-side
            cannot bypass the controller check.
      required:
        - oidcProviders
        - selfRegistrationEnabled
    ServerConfigUpload:
      type: object
      description: Upload-related public configuration.
      properties:
        maxDocumentSizeMb:
          type: integer
          format: int32
          description: |
            Maximum allowed document size in megabytes. Uploads exceeding this are
            rejected with HTTP 413. Operator-configurable.
      required:
        - maxDocumentSizeMb
    ServerConfigResponse:
      type: object
      description: |
        Public, non-sensitive server configuration. Intentionally small and
        stable — new top-level keys may be added, existing ones are not removed.
      properties:
        version:
          type: string
          description: |
            Server version string (e.g. "0.1.0-SNAPSHOT"). Sourced from build
            metadata at startup; "unknown" when build info is unavailable.
        edition:
          $ref: '#/components/schemas/Edition'
        general:
          $ref: '#/components/schemas/ServerConfigGeneral'
        auth:
          $ref: '#/components/schemas/ServerConfigAuth'
        upload:
          $ref: '#/components/schemas/ServerConfigUpload'
        supportedFormats:
          type: array
          description: Document formats this server can ingest and review.
          items:
            $ref: '#/components/schemas/SupportedFormat'
      required:
        - version
        - edition
        - general
        - auth
        - upload
        - supportedFormats
    SettingValueType:
      type: string
      description: The declared type of an application setting value.
      enum:
        - STRING
        - INTEGER
        - BOOLEAN
        - ENUM
        - PASSWORD
    AdminSetting:
      type: object
      description: One application setting with its current (possibly masked) value.
      properties:
        key:
          type: string
          description: Stable dotted setting key (e.g. `smtp.host`).
        value:
          type: string
          description: Current value; sensitive values are masked as `***`.
        type:
          $ref: '#/components/schemas/SettingValueType'
        description:
          type: string
          description: Human-readable description of the setting.
        sensitive:
          type: boolean
          description: Whether the value is a secret (masked here, encrypted at rest).
      required:
        - key
        - type
        - description
        - sensitive
    AdminSettingsResponse:
      type: object
      description: The full set of global application settings.
      properties:
        settings:
          type: array
          items:
            $ref: '#/components/schemas/AdminSetting'
      required:
        - settings
    AdminSettingsUpdateRequest:
      type: object
      description: |
        Partial map of setting key to new raw value. Omitted keys are left
        unchanged; `***` for a sensitive key keeps the stored secret.
      properties:
        values:
          type: object
          additionalProperties:
            type: string
          description: Map of setting key to new value.
      required:
        - values
    LoginRequest:
      type: object
      description: Local-login credentials (issue #17).
      properties:
        usernameOrEmail:
          type: string
          description: The internal user's username or email address.
        password:
          type: string
          format: password
          description: The user's plaintext password (verified against the BCrypt hash).
      required:
        - usernameOrEmail
        - password
    ChangePasswordRequest:
      type: object
      description: Password-change payload for the authenticated user (issue #17).
      properties:
        currentPassword:
          type: string
          format: password
          description: The user's current password, re-verified before the change.
        newPassword:
          type: string
          format: password
          minLength: 12
          description: The replacement password. Must meet the minimum-length policy.
      required:
        - currentPassword
        - newPassword
    TokenResponse:
      type: object
      description: |
        A freshly issued access token (issue #17). The refresh token is delivered
        out-of-band as an HttpOnly cookie and never appears in this body.
      properties:
        accessToken:
          type: string
          description: Signed JWT access token; send it in the Authorization header as a Bearer token.
        tokenType:
          type: string
          description: Always `Bearer`.
        expiresInSeconds:
          type: integer
          format: int64
          description: Access-token lifetime in seconds from issuance.
      required:
        - accessToken
        - tokenType
        - expiresInSeconds
    SendTestEmailRequest:
      type: object
      description: Request to send a test email.
      properties:
        recipient:
          type: string
          format: email
          description: Address the test message is sent to.
      required:
        - recipient
    SendStatus:
      type: string
      description: Outcome of a mail send attempt.
      enum:
        - SENT
        - SKIPPED
        - FAILED
    SendTestEmailResponse:
      type: object
      description: Outcome of a test-email send (never a transport-level error to the client).
      properties:
        status:
          $ref: '#/components/schemas/SendStatus'
        detail:
          type: string
          description: Human-readable detail (e.g. "SMTP is not configured").
      required:
        - status
        - detail
    MailTemplateSource:
      type: string
      description: Where the effective template content originates.
      enum:
        - DATABASE
        - DEFAULT
    MailTemplateResponse:
      type: object
      description: The effective content of one mail template.
      properties:
        key:
          type: string
          description: Stable template storage key (e.g. `auth.password_reset`).
        locale:
          type: string
        subject:
          type: string
        bodyPlain:
          type: string
        bodyHtml:
          type: string
          description: Optional HTML alternative; absent when the template is plain-text only.
        source:
          $ref: '#/components/schemas/MailTemplateSource'
        updatedAt:
          type: string
          format: date-time
          description: When a stored override was last saved; absent for built-in defaults.
        updatedBy:
          type: string
          description: Id of the admin who last saved the override; absent for built-in defaults.
      required:
        - key
        - locale
        - subject
        - bodyPlain
        - source
    MailTemplateListResponse:
      type: object
      properties:
        templates:
          type: array
          items:
            $ref: '#/components/schemas/MailTemplateResponse'
      required:
        - templates
    UpdateMailTemplateRequest:
      type: object
      description: Create-or-update a per-locale template override.
      properties:
        locale:
          type: string
        subject:
          type: string
        bodyPlain:
          type: string
        bodyHtml:
          type: string
          description: Optional HTML alternative.
      required:
        - locale
        - subject
        - bodyPlain
    PreviewMailTemplateRequest:
      type: object
      description: Render a template without sending.
      properties:
        locale:
          type: string
          description: Locale to render; falls back to the default language when omitted.
        variables:
          type: object
          additionalProperties:
            type: string
          description: Template variables; representative sample data is used when omitted.
    MailTemplatePreviewResponse:
      type: object
      properties:
        subject:
          type: string
        bodyPlain:
          type: string
        bodyHtml:
          type: string
      required:
        - subject
        - bodyPlain
    UserSettingItem:
      type: object
      description: One user setting with its current value.
      properties:
        key:
          type: string
          description: Stable setting key (e.g. `theme`).
        value:
          type: string
          description: Current value (registry default where the user has not set one).
        type:
          $ref: '#/components/schemas/SettingValueType'
        description:
          type: string
          description: Human-readable description of the setting.
      required:
        - key
        - type
        - description
    UserSettingsResponse:
      type: object
      description: The authenticated user's settings.
      properties:
        settings:
          type: array
          items:
            $ref: '#/components/schemas/UserSettingItem'
      required:
        - settings
    UserSettingsUpdateRequest:
      type: object
      description: Partial map of user setting key to new value.
      properties:
        values:
          type: object
          additionalProperties:
            type: string
          description: Map of setting key to new value.
      required:
        - values
    UserRole:
      type: string
      description: |
        A user's global system role — exactly one per user (issue #98). `ADMIN`
        administers the system; `MEMBER` is the standard user; `AUDITOR` has
        organisation-wide read access to the audit trail and compliance.
      enum:
        - ADMIN
        - MEMBER
        - AUDITOR
    UserSource:
      type: string
      description: |
        How the account authenticates: `INTERNAL` (local username + password) or
        `EXTERNAL` (provisioned from an OIDC/OAuth2 provider).
      enum:
        - INTERNAL
        - EXTERNAL
    CurrentUserResponse:
      type: object
      description: The authenticated user's own profile.
      properties:
        id:
          type: string
          format: uuid
          description: The user's stable id.
        displayName:
          type: string
          description: Human-readable name shown in the UI.
        email:
          type: string
          description: The user's email address.
        role:
          $ref: '#/components/schemas/UserRole'
        source:
          $ref: '#/components/schemas/UserSource'
      required:
        - id
        - displayName
        - email
        - role
        - source
    AdminUserSummary:
      type: object
      description: A user as shown in the admin user list.
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
        email:
          type: string
        username:
          type: string
          nullable: true
          description: The local username; null for external (OIDC) accounts.
        role:
          $ref: '#/components/schemas/UserRole'
        source:
          $ref: '#/components/schemas/UserSource'
        enabled:
          type: boolean
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - displayName
        - email
        - role
        - source
        - enabled
        - createdAt
    AdminUserDetail:
      allOf:
        - $ref: '#/components/schemas/AdminUserSummary'
      description: Full detail for a single user (currently the same fields as the summary).
    AdminUserListResponse:
      type: object
      description: A page of users for the admin list.
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AdminUserSummary'
        total:
          type: integer
          format: int64
          description: Total number of users matching the query.
        page:
          type: integer
          format: int32
          description: Zero-based page index.
        size:
          type: integer
          format: int32
          description: Page size.
      required:
        - items
        - total
        - page
        - size
    AdminUserCreateRequest:
      type: object
      description: |
        Create an internal user. Provide `initialPassword` to enable the account
        immediately (with a forced change on first login), or omit it to send an
        invitation link instead.
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 200
        username:
          type: string
          minLength: 3
          maxLength: 64
        email:
          type: string
          format: email
          maxLength: 320
        role:
          $ref: '#/components/schemas/UserRole'
        initialPassword:
          type: string
          minLength: 8
          maxLength: 200
          nullable: true
          description: Optional. When omitted, an invitation email is sent instead.
      required:
        - displayName
        - username
        - email
        - role
    AdminUserUpdateRequest:
      type: object
      description: Partial update; only provided fields change.
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 200
          nullable: true
        role:
          allOf:
            - $ref: '#/components/schemas/UserRole'
          nullable: true
        enabled:
          type: boolean
          nullable: true
    RegisterRequest:
      type: object
      description: Self-registration details for a new local account.
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 64
        email:
          type: string
          format: email
          maxLength: 320
        password:
          type: string
          minLength: 8
          maxLength: 200
        displayName:
          type: string
          maxLength: 255
      required:
        - username
        - email
        - password
    RegisterResponse:
      type: object
      description: Uniform, non-revealing acknowledgement of a registration request.
      properties:
        verificationRequired:
          type: boolean
          description: Whether the user must verify their email before logging in.
        message:
          type: string
      required:
        - verificationRequired
        - message
    VerifyEmailResponse:
      type: object
      properties:
        verified:
          type: boolean
        message:
          type: string
      required:
        - verified
        - message
    ForgotPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 320
      required:
        - email
    ResetPasswordRequest:
      type: object
      properties:
        token:
          type: string
        newPassword:
          type: string
          minLength: 8
          maxLength: 200
      required:
        - token
        - newPassword
    OidcProviderTypeDto:
      type: string
      description: Kind of external identity provider.
      enum:
        - OIDC
        - GITHUB
        - GOOGLE
        - FACEBOOK
        - OAUTH2
    OidcProviderDto:
      type: object
      description: A configured identity provider. The client secret is never returned.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        providerType:
          $ref: '#/components/schemas/OidcProviderTypeDto'
        enabled:
          type: boolean
        clientId:
          type: string
        hasClientSecret:
          type: boolean
          description: Whether a client secret is stored (the value itself is never exposed).
        issuerUri:
          type: string
        scope:
          type: string
        authorizationUri:
          type: string
        tokenUri:
          type: string
        userInfoUri:
          type: string
        jwkSetUri:
          type: string
        userNameAttribute:
          type: string
        emailAttribute:
          type: string
        displayNameAttribute:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - providerType
        - enabled
        - clientId
        - hasClientSecret
        - scope
        - createdAt
    OidcProviderListResponse:
      type: object
      properties:
        providers:
          type: array
          items:
            $ref: '#/components/schemas/OidcProviderDto'
      required:
        - providers
    OidcProviderCreateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        providerType:
          $ref: '#/components/schemas/OidcProviderTypeDto'
        clientId:
          type: string
          minLength: 1
          maxLength: 255
        clientSecret:
          type: string
          maxLength: 1024
        issuerUri:
          type: string
        scope:
          type: string
        authorizationUri:
          type: string
        tokenUri:
          type: string
        userInfoUri:
          type: string
        jwkSetUri:
          type: string
        userNameAttribute:
          type: string
        emailAttribute:
          type: string
        displayNameAttribute:
          type: string
      required:
        - name
        - providerType
        - clientId
        - clientSecret
    OidcProviderUpdateRequest:
      type: object
      description: Partial update; only provided fields change. A blank clientSecret keeps the stored one.
      properties:
        enabled:
          type: boolean
        name:
          type: string
          maxLength: 100
        clientId:
          type: string
          maxLength: 255
        clientSecret:
          type: string
          maxLength: 1024
