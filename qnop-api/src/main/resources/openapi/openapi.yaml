            application/json:
              schema:
                $ref: '#/components/schemas/AdminTeamDetail'
        '404':
          description: Unknown team
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    patch:
      tags:
