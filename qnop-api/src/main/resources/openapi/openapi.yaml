      summary: Get the current user's settings
      description: |
        Returns the authenticated user's settings with their values, types and
        descriptions (registry defaults where unset). Requires a user (JWT)
        principal; API-key principals are rejected.
      operationId: getCurrentUserSettings
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The current user's settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Principal is not a user (e.g. an API key)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags:
        - UserSettings
      summary: Update the current user's settings
      description: |
        Applies a partial set of changes (`key` to value) for the authenticated
        user and returns the full, updated settings.
      operationId: updateCurrentUserSettings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserSettingsUpdateRequest'
      responses:
        '200':
          description: Updated user settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsResponse'
        '400':
          description: Unknown key or type-invalid value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Principal is not a user (e.g. an API key)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /documents/{documentId}/workflow:
    parameters:
      - name: documentId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [ReviewWorkflow]
      summary: Current workflow state of a document
      description: |
        The document's persisted workflow state and the transitions that are
        structurally reachable from it (guards are not pre-evaluated — the
        authoritative check happens on the transition request itself). The
        transition list is empty for terminal states and for states this
        edition's state machine does not manage.
      operationId: getDocumentWorkflow
      responses:
        '200':
          description: The current workflow status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowStatus'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [ReviewWorkflow]
      summary: Request a workflow transition (owner-only)
      description: |
        Moves the review to `targetState` through the state-machine choke-point
        (ADR-0011). Rejected with `409` when the edge is not in the transition
        table, when a guard vetoes it — finalization requires zero OPEN
        annotations and zero PENDING placements (re-anchoring complete) — or
        when the current or target state is not managed by this edition.
      operationId: transitionDocumentWorkflow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowTransitionRequest'
      responses:
        '200':
          description: Transition applied; the new workflow status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowStatus'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: The caller is not the document owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Illegal transition or a guard vetoed it (e.g. the FINALIZED invariant)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /documents/{documentId}:
    get:
      tags:
        - Documents
      summary: Get document metadata
      operationId: getDocument
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DocumentIdParam'
      responses:
        '200':
          description: The document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '404':
          description: Unknown document, or the caller is not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /documents/{documentId}/versions:
    get:
      tags:
        - Documents
      summary: List a document's versions
      operationId: listDocumentVersions
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DocumentIdParam'
      responses:
        '200':
          description: All versions, oldest first
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentVersionListResponse'
        '404':
          description: Unknown document, or the caller is not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /documents/{documentId}/versions/{versionNumber}/rendered:
    get:
      tags:
        - Documents
      summary: Get the canonical rendered representation of a version
      description: |
        The server-extracted, format-agnostic representation (ADR-0032): one
        surface per page with intrinsic size and the ordered text spans, each
        carrying its character-offset range and a bounding box normalized to
        0..1 of the surface. Available once the async extraction has completed.
      operationId: getRenderedDocument
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DocumentIdParam'
        - $ref: '#/components/parameters/VersionNumberParam'
      responses:
        '200':
          description: The rendered representation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RenderedDocumentResponse'
        '404':
          description: Unknown document/version, or the caller is not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: >-
            Extraction has not completed (`EXTRACTION_PENDING`) or failed
            permanently (`EXTRACTION_FAILED`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /documents/{documentId}/annotations:
    parameters:
      - $ref: '#/components/parameters/DocumentIdParam'
    get:
      tags: [Annotations]
      summary: List a document's annotations
      description: |
        Every annotation on the document. When `version` is given, each item also
        carries its placement (anchor + status) on that version, or nulls when it
        has none there.
      operationId: listAnnotations
      security:
        - bearerAuth: []
      parameters:
        - name: version
          in: query
          required: false
          description: A 1-based version number to resolve each annotation's placement against.
          schema:
            type: integer
            minimum: 1
        - name: placementStatus
          in: query
          required: false
          description: >-
            Only annotations whose placement on `version` has this status — e.g.
            `ORPHANED` to review annotations re-anchoring could not relocate
            (issue #248). Requires `version`.
          schema:
            $ref: '#/components/schemas/PlacementStatus'
      responses:
        '200':
          description: The annotations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnotationListResponse'
        '404':
          description: Unknown document, or the caller is not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Annotations]
      summary: Create an annotation on a version
      description: |
        Anchors a new annotation to a region (and, on a text surface, the quoted
        text) of the given version. The placement on that version is `PLACED`
        immediately — a human drew it; re-anchoring onto later versions is async
        (#248). An optional `comment` seeds the discussion thread.
      operationId: createAnnotation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnnotationCreateRequest'
      responses:
        '201':
          description: The created annotation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnotationView'
        '400':
          description: Validation failed (e.g. the region anchor is missing or out of 0..1)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown document/version, or the caller is not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /annotations/{annotationId}:
    parameters:
      - $ref: '#/components/parameters/AnnotationIdParam'
    get:
      tags: [Annotations]
      summary: Get an annotation
      operationId: getAnnotation
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The annotation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnotationView'
        '404':
          description: Unknown annotation, or the caller is not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /annotations/{annotationId}/decision:
    parameters:
      - $ref: '#/components/parameters/AnnotationIdParam'
    post:
      tags: [Annotations]
      summary: Accept or reject an annotation (owner or author)
      description: |
        Applies the `OPEN → ACCEPTED | REJECTED` decision (ADR-0011). Allowed for
        the document owner or the annotation's author. Accepting drives the review
        workflow (`IN_REVIEW → CHANGES_REQUESTED`) through the state-machine
        choke-point. Rejected with `409` if the annotation is already decided.
      operationId: decideAnnotation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnnotationDecisionRequest'
      responses:
        '200':
          description: The updated annotation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnotationView'
        '403':
          description: The caller is neither the document owner nor the annotation's author
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown annotation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: The annotation has already been decided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /annotations/{annotationId}/comments:
    parameters:
      - $ref: '#/components/parameters/AnnotationIdParam'
    get:
      tags: [Annotations]
      summary: List an annotation's comment thread
      operationId: listComments
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The thread, oldest first
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentListResponse'
        '404':
          description: Unknown annotation, or the caller is not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Annotations]
      summary: Add a comment to an annotation
      operationId: addComment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentCreateRequest'
      responses:
        '201':
          description: The created comment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentView'
        '400':
          description: Validation failed (e.g. an empty body)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown annotation, or the caller is not a participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT access token issued by the qnop auth subsystem (epic #7). Sent as
        `Authorization: Bearer <token>` on authenticated endpoints. The auth flow
        itself is introduced in a later issue; the scheme is declared here so the
        contract is complete from the first endpoint.
  parameters:
    DocumentIdParam:
      name: documentId
      in: path
      required: true
      description: The document's id.
      schema:
        type: string
        format: uuid
    VersionNumberParam:
      name: versionNumber
      in: path
      required: true
      description: The 1-based version number within the document.
      schema:
        type: integer
        minimum: 1
    OidcProviderIdParam:
      name: providerId
      in: path
      required: true
      description: The OIDC provider's id.
      schema:
        type: string
        format: uuid
    MailTemplateKeyParam:
      name: key
      in: path
      required: true
      description: The template storage key (e.g. `auth.password_reset`).
      schema:
        type: string
    UserIdParam:
      name: userId
      in: path
      required: true
      description: The user's id.
      schema:
        type: string
        format: uuid
    TeamIdParam:
      name: teamId
      in: path
      required: true
      description: The team's id.
      schema:
        type: string
        format: uuid
    AnnotationIdParam:
      name: annotationId
      in: path
      required: true
      description: The annotation's id.
      schema:
        type: string
        format: uuid
  responses:
    Unauthorized:
      description: Authentication is required (uniform error envelope, issue #45).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: The caller lacks permission for this resource (issue #45).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Rate limit exceeded; retry after the Retry-After header (issue #45).
      headers:
        Retry-After:
          description: Seconds to wait before retrying.
          schema:
            type: integer
            format: int32
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    WorkflowStatus:
      type: object
      description: |
        The workflow view of a document (issue #246, ADR-0011). `state` is an
        open string — the Community edition ships `DRAFT`, `IN_REVIEW`,
        `CHANGES_REQUESTED`, `FINALIZED` and `CANCELLED`, but an
        enterprise-extended state machine may add further states, so clients
        must tolerate unknown values.
      required:
        - state
        - allowedTransitions
      properties:
        state:
          type: string
          description: The current workflow state (Community values or an enterprise extension).
          example: IN_REVIEW
        allowedTransitions:
          type: array
          description: |
            Target states structurally reachable from `state` (transition table
            only; guards are evaluated on the transition request). Empty for
            terminal states and for states this edition does not manage.
          items:
            type: string
          example: [CHANGES_REQUESTED, FINALIZED, CANCELLED]
    WorkflowTransitionRequest:
      type: object
      description: A request to move the review to `targetState` (issue #246, ADR-0011).
      required:
        - targetState
      properties:
        targetState:
          type: string
          minLength: 1
          maxLength: 32
          description: The requested target workflow state.
          example: FINALIZED
    Edition:
      type: string
      description: |
        The running qnop edition, determined by the classpath (ADR-0003): the
        presence of the commercial JARs. `COMMUNITY` is the AGPL build.
      enum:
        - COMMUNITY
        - ENTERPRISE
    SupportedFormat:
      type: string
      description: A document format qnop can ingest and review.
      enum:
        - PDF
        - DOCX
        - MD
    OidcProviderLoginInfo:
      type: object
      description: |
        Public login information for one enabled OIDC provider. Only non-sensitive
        fields appear here — never client secrets or issuer URIs.
      properties:
        id:
          type: string
          description: Stable provider id used to build the login URL.
        name:
          type: string
          description: Human-readable provider name rendered on the login button.
        loginUrl:
          type: string
          description: Relative URL the frontend redirects to in order to start login.
        iconKind:
          $ref: '#/components/schemas/OidcIconKind'
        accountPickerLoginUrl:
          type: string
          nullable: true
          description: |
            Relative login URL that forces the upstream account picker / re-auth
            screen (adds an allow-listed `prompt`). Null when the provider cannot
            honour it (e.g. GitHub), in which case the SPA renders a sign-out hint.
        accountSwitchHintUrl:
          type: string
          nullable: true
          description: |
            Absolute upstream sign-out URL the SPA links to as a fallback when the
            provider has no `prompt`-based account picker (today only GitHub). Null
            otherwise.
      required:
        - id
        - name
        - loginUrl
        - iconKind
    OidcIconKind:
      type: string
      description: |
        Which brand glyph the SPA renders on a provider's login button. Decoupled
        from `OidcProviderTypeDto` so the icon set can evolve independently.
      enum:
        - github
        - google
        - facebook
        - oidc
        - oauth2
    ServerConfigGeneral:
      type: object
      description: General, application-wide public configuration.
      properties:
        siteName:
          type: string
          description: |
            Operator-branded display name shown in the browser tab, top bar, and
            footer. DB-backed via application settings (issue #16); the frontend
            falls back to `qnop` when empty.
        defaultTimezone:
          type: string
          description: |
            Server default timezone (IANA id, e.g. `UTC`, `Europe/Berlin`) used as
            the display fallback for users without a personal preference.
      required:
        - siteName
        - defaultTimezone
    ServerConfigAuth:
      type: object
      description: |
        Public authentication configuration used by the login page to render the
        local form and any enabled OIDC provider buttons.
      properties:
        oidcProviders:
          type: array
          description: |
            OIDC providers currently enabled in the database. Empty when none is
            active. One "Login with <name>" button is rendered per entry (issue #21).
          items:
            $ref: '#/components/schemas/OidcProviderLoginInfo'
        selfRegistrationEnabled:
          type: boolean
          description: |
            Whether the operator has enabled public self-registration (issue #20).
            The backend enforces the gate independently; flipping this client-side
            cannot bypass the controller check.
      required:
        - oidcProviders
        - selfRegistrationEnabled
    ServerConfigUpload:
      type: object
      description: Upload-related public configuration.
      properties:
        maxDocumentSizeMb:
          type: integer
          format: int32
          description: |
            Maximum allowed document size in megabytes. Uploads exceeding this are
            rejected with HTTP 413. Operator-configurable.
      required:
        - maxDocumentSizeMb
    ServerConfigResponse:
      type: object
      description: |
        Public, non-sensitive server configuration. Intentionally small and
        stable — new top-level keys may be added, existing ones are not removed.
      properties:
        version:
          type: string
          description: |
            Server version string (e.g. "0.1.0-SNAPSHOT"). Sourced from build
            metadata at startup; "unknown" when build info is unavailable.
        edition:
          $ref: '#/components/schemas/Edition'
        general:
          $ref: '#/components/schemas/ServerConfigGeneral'
        auth:
          $ref: '#/components/schemas/ServerConfigAuth'
        upload:
          $ref: '#/components/schemas/ServerConfigUpload'
        supportedFormats:
          type: array
          description: Document formats this server can ingest and review.
          items:
            $ref: '#/components/schemas/SupportedFormat'
        branding:
          $ref: '#/components/schemas/ServerConfigBranding'
      required:
        - version
        - edition
        - general
        - auth
        - upload
        - supportedFormats
    ServerConfigBranding:
      type: object
      description: |
        Effective branding logos. Each slot carries the URL to render and whether it
        is the operator's custom upload or the bundled factory default, so the UI can
        show and mark it without inferring from an image load.
      properties:
        logoLight:
          $ref: '#/components/schemas/ServerConfigBrandingSlot'
        logoDark:
          $ref: '#/components/schemas/ServerConfigBrandingSlot'
        logomark:
          $ref: '#/components/schemas/ServerConfigBrandingSlot'
      required:
        - logoLight
        - logoDark
        - logomark
    ServerConfigBrandingSlot:
      type: object
      description: One branding slot's effective asset.
      properties:
        source:
          type: string
          description: Whether the effective asset is the custom upload or the factory default.
          enum:
            - CUSTOM
            - DEFAULT
        url:
          type: string
          description: |
            Public URL of the effective asset, with a cache-busting `?v=` token (the
            asset's SHA-256) so it reloads when the upload changes.
      required:
        - source
        - url
    SettingValueType:
      type: string
      description: The declared type of an application setting value.
      enum:
        - STRING
        - INTEGER
        - BOOLEAN
        - ENUM
        - PASSWORD
    AdminSetting:
      type: object
      description: One application setting with its current (possibly masked) value.
      properties:
        key:
          type: string
          description: Stable dotted setting key (e.g. `smtp.host`).
        value:
          type: string
          description: Current value; sensitive values are masked as `***`.
        type:
          $ref: '#/components/schemas/SettingValueType'
        description:
          type: string
          description: Human-readable description of the setting.
        sensitive:
          type: boolean
          description: Whether the value is a secret (masked here, encrypted at rest).
        allowedValues:
          type: array
          items:
            type: string
          description: >-
            For `ENUM`-typed settings, the permitted values, in display order; the
            admin UI renders these as a dropdown. Empty for all other types.
      required:
        - key
        - type
        - description
        - sensitive
    AdminSettingsResponse:
      type: object
      description: The full set of global application settings.
      properties:
        settings:
          type: array
          items:
            $ref: '#/components/schemas/AdminSetting'
      required:
        - settings
    AdminSettingsUpdateRequest:
      type: object
      description: |
        Partial map of setting key to new raw value. Omitted keys are left
        unchanged; `***` for a sensitive key keeps the stored secret.
      properties:
        values:
          type: object
          additionalProperties:
            type: string
          description: Map of setting key to new value.
      required:
        - values
    LoginRequest:
      type: object
      description: Local-login credentials (issue #17).
      properties:
        usernameOrEmail:
          type: string
          description: The internal user's username or email address.
        password:
          type: string
          format: password
          description: The user's plaintext password (verified against the BCrypt hash).
      required:
        - usernameOrEmail
        - password
    ChangePasswordRequest:
      type: object
      description: Password-change payload for the authenticated user (issue #17).
      properties:
        currentPassword:
          type: string
          format: password
          description: The user's current password, re-verified before the change.
        newPassword:
          type: string
          format: password
          minLength: 8
          maxLength: 200
          description: The replacement password. Must meet the minimum-length policy.
      required:
        - currentPassword
        - newPassword
    TokenResponse:
      type: object
      description: |
        A freshly issued access token (issue #17). The refresh token is delivered
        out-of-band as an HttpOnly cookie and never appears in this body.
      properties:
        accessToken:
          type: string
          description: Signed JWT access token; send it in the Authorization header as a Bearer token.
        tokenType:
          type: string
          description: Always `Bearer`.
        expiresInSeconds:
          type: integer
          format: int64
          description: Access-token lifetime in seconds from issuance.
      required:
        - accessToken
        - tokenType
        - expiresInSeconds
    SendTestEmailRequest:
      type: object
      description: Request to send a test email.
      properties:
        recipient:
          type: string
          format: email
          description: Address the test message is sent to.
      required:
        - recipient
    SendStatus:
      type: string
      description: Outcome of a mail send attempt.
      enum:
        - SENT
        - SKIPPED
        - FAILED
    SendTestEmailResponse:
      type: object
      description: Outcome of a test-email send (never a transport-level error to the client).
      properties:
        status:
          $ref: '#/components/schemas/SendStatus'
        detail:
          type: string
          description: Human-readable detail (e.g. "SMTP is not configured").
      required:
        - status
        - detail
    MailTemplateSource:
      type: string
      description: Where the effective template content originates.
      enum:
        - DATABASE
        - DEFAULT
    MailTemplateResponse:
      type: object
      description: The effective content of one mail template, plus editor metadata.
      properties:
        key:
          type: string
          description: Stable template storage key (e.g. `auth.password_reset`).
        friendlyName:
          type: string
          description: Human-readable label for the template (e.g. `Password reset`).
        locale:
          type: string
        subject:
          type: string
        bodyPlain:
          type: string
        bodyHtml:
          type: string
          description: Optional HTML alternative; absent when the template is plain-text only.
        source:
          $ref: '#/components/schemas/MailTemplateSource'
        placeholders:
          type: array
          items:
            type: string
          description: >-
            The sorted, closed set of `{{placeholder}}` names this template
            accepts. The editor offers these as chips and rejects any other.
        defaultSubject:
          type: string
          description: The built-in catalog subject (for compare/reset in the editor).
        defaultBodyPlain:
          type: string
          description: The built-in catalog plain-text body.
        defaultBodyHtml:
          type: string
          description: The built-in catalog HTML body (branded chrome); absent if none.
        updatedAt:
          type: string
          format: date-time
          description: When a stored override was last saved; absent for built-in defaults.
        updatedBy:
          type: string
          description: Id of the admin who last saved the override; absent for built-in defaults.
        updatedByName:
          type: string
          description: >-
            Display name of the admin who last saved the override; absent for
            built-in defaults or a since-deleted user.
      required:
        - key
        - friendlyName
        - locale
        - subject
        - bodyPlain
        - source
        - placeholders
        - defaultSubject
        - defaultBodyPlain
    MailTemplateListResponse:
      type: object
      properties:
        templates:
          type: array
          items:
            $ref: '#/components/schemas/MailTemplateResponse'
      required:
        - templates
    UpdateMailTemplateRequest:
      type: object
      description: Create-or-update a per-locale template override.
      properties:
        locale:
          type: string
        subject:
          type: string
        bodyPlain:
          type: string
        bodyHtml:
          type: string
          description: Optional HTML alternative.
      required:
        - locale
        - subject
        - bodyPlain
    PreviewMailTemplateRequest:
      type: object
      description: Render a template without sending.
      properties:
        locale:
          type: string
          description: Locale to render; falls back to the default language when omitted.
        subject:
          type: string
          description: >-
            Draft subject to render instead of the stored version, for a live
            preview while editing. When both subject and bodyPlain are supplied
            the draft is rendered; otherwise the stored override or built-in
            default is used.
        bodyPlain:
          type: string
          description: >-
            Draft plain-text body to render instead of the stored version.
            Honoured only together with a draft subject.
        bodyHtml:
          type: string
          description: >-
            Optional draft HTML alternative. When omitted or blank the branded
            default chrome is rendered around the plain content.
        variables:
          type: object
          additionalProperties:
            type: string
          description: Template variables; representative sample data is used when omitted.
    MailTemplatePreviewResponse:
      type: object
      properties:
        subject:
          type: string
        bodyPlain:
          type: string
        bodyHtml:
          type: string
        sampleVars:
          type: object
          additionalProperties:
            type: string
          description: >-
            The effective variables used for this render — per-key demo values
            overlaid with any caller-supplied overrides — so the editor can
            prefill its sample-variable inputs.
      required:
        - subject
        - bodyPlain
        - sampleVars
    UserSettingItem:
      type: object
      description: One user setting with its current value.
      properties:
        key:
          type: string
          description: Stable setting key (e.g. `theme`).
        value:
          type: string
          description: Current value (registry default where the user has not set one).
        type:
          $ref: '#/components/schemas/SettingValueType'
        description:
          type: string
          description: Human-readable description of the setting.
      required:
        - key
        - type
        - description
    UserSettingsResponse:
      type: object
      description: The authenticated user's settings.
      properties:
        settings:
          type: array
          items:
            $ref: '#/components/schemas/UserSettingItem'
      required:
        - settings
    UserSettingsUpdateRequest:
      type: object
      description: Partial map of user setting key to new value.
      properties:
        values:
          type: object
          additionalProperties:
            type: string
          description: Map of setting key to new value.
      required:
        - values
    UserRole:
      type: string
      description: |
        A user's global system role — exactly one per user (issue #98). `ADMIN`
        administers the system; `MEMBER` is the standard user; `AUDITOR` has
        organisation-wide read access to the audit trail and compliance.
      enum:
        - ADMIN
        - MEMBER
        - AUDITOR
    UserSource:
      type: string
      description: |
        How the account authenticates: `INTERNAL` (local username + password) or
        `EXTERNAL` (provisioned from an OIDC/OAuth2 provider).
      enum:
        - INTERNAL
        - EXTERNAL
    CurrentUserResponse:
      type: object
      description: The authenticated user's own profile.
      properties:
        id:
          type: string
          format: uuid
          description: The user's stable id.
        displayName:
          type: string
          description: Human-readable name shown in the UI.
        email:
          type: string
          description: The user's email address.
        role:
          $ref: '#/components/schemas/UserRole'
        source:
          $ref: '#/components/schemas/UserSource'
        avatarUrl:
          type: string
          nullable: true
          description: |
            URL of the user's profile picture (with a cache-busting `?v=` token),
            or null when none is set — the UI then renders the initials avatar.
      required:
        - id
        - displayName
        - email
        - role
        - source
    AdminUserSummary:
      type: object
      description: A user as shown in the admin user list.
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
          maxLength: 255
        email:
          type: string
        username:
          type: string
          nullable: true
          description: The local username; null for external (OIDC) accounts.
        role:
          $ref: '#/components/schemas/UserRole'
        source:
          $ref: '#/components/schemas/UserSource'
        enabled:
          type: boolean
        passwordChangeRequired:
          type: boolean
          description: Whether the user must change their password before normal use.
        providerName:
          type: string
          nullable: true
          description: The OIDC provider's name for external accounts; null otherwise.
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        avatarUrl:
          type: string
          nullable: true
          description: |
            URL of the user's profile picture (with a cache-busting `?v=` token),
            or null when none is set — the UI then renders the initials avatar.
      required:
        - id
        - displayName
        - email
        - role
        - source
        - enabled
        - passwordChangeRequired
        - createdAt
    AdminUserDetail:
      allOf:
        - $ref: '#/components/schemas/AdminUserSummary'
      description: Full detail for a single user (currently the same fields as the summary).
    AdminPasswordResetResponse:
      type: object
      description: Outcome of an admin-triggered password reset.
      properties:
        emailSent:
          type: boolean
          description: Whether the reset email was delivered.
        resetUrl:
          type: string
          nullable: true
          description: |
            The single-use reset link, returned only when the email could not be
            sent so the operator can deliver it out of band.
      required:
        - emailSent
    AdminGeneratedPasswordResponse:
      type: object
      description: |
        A freshly generated password, returned exactly once. It is never stored in
        clear text and cannot be retrieved again — the admin must hand it over now.
      properties:
        password:
          type: string
          description: The generated plaintext password, shown a single time.
      required:
        - password
    AdminUserListResponse:
      type: object
      description: A page of users for the admin list.
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AdminUserSummary'
        total:
          type: integer
          format: int64
          description: Total number of users matching the query.
        page:
          type: integer
          format: int32
          description: Zero-based page index.
        size:
          type: integer
          format: int32
          description: Page size.
      required:
        - items
        - total
        - page
        - size
    AdminUserCreateRequest:
      type: object
      description: |
        Create an internal user. Provide `initialPassword` to enable the account
        immediately (with a forced change on first login), or omit it to send an
        invitation link instead.
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 255
        username:
          type: string
          minLength: 3
          maxLength: 64
        email:
          type: string
          format: email
          maxLength: 320
        role:
          $ref: '#/components/schemas/UserRole'
        initialPassword:
          type: string
          minLength: 8
          maxLength: 200
          nullable: true
          description: Optional. When omitted, an invitation email is sent instead.
      required:
        - displayName
        - username
        - email
        - role
    AdminUserUpdateRequest:
      type: object
      description: Partial update; only provided fields change.
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 255
          nullable: true
        role:
          allOf:
            - $ref: '#/components/schemas/UserRole'
          nullable: true
        enabled:
          type: boolean
          nullable: true
    TeamRole:
      type: string
      description: |
        A user's role within a team (issue #105) — distinct from the global
        UserRole. `LEAD` manages the team; `MEMBER` is a regular member.
      enum:
        - LEAD
        - MEMBER
    AdminTeamMember:
      type: object
      description: A team member joined with their user identity.
      properties:
        userId:
          type: string
          format: uuid
        displayName:
          type: string
        email:
          type: string
        teamRole:
          $ref: '#/components/schemas/TeamRole'
        joinedAt:
          type: string
          format: date-time
      required:
        - userId
        - displayName
        - email
        - teamRole
        - joinedAt
    AdminTeamSummary:
      type: object
      description: A team as shown in the admin team list.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        enabled:
          type: boolean
        memberCount:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - enabled
        - memberCount
        - createdAt
        - updatedAt
    AdminTeamDetail:
      type: object
      description: Full team detail including its members.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        enabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        members:
          type: array
          items:
            $ref: '#/components/schemas/AdminTeamMember'
      required:
        - id
        - name
        - enabled
        - createdAt
        - updatedAt
        - members
    AdminTeamListResponse:
      type: object
      description: A page of teams for the admin list.
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AdminTeamSummary'
        total:
          type: integer
          format: int64
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
      required:
        - items
        - total
        - page
        - size
    AdminTeamCreateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type: string
          maxLength: 1000
          nullable: true
      required:
        - name
    AdminTeamUpdateRequest:
      type: object
      description: Partial update; only provided fields change.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
          nullable: true
        description:
          type: string
          maxLength: 1000
          nullable: true
        enabled:
          type: boolean
          nullable: true
    AdminTeamMemberRequest:
      type: object
      description: Add a user to a team with a team role.
      properties:
        userId:
          type: string
          format: uuid
        teamRole:
          $ref: '#/components/schemas/TeamRole'
      required:
        - userId
        - teamRole
    AdminTeamMemberRoleUpdateRequest:
      type: object
      properties:
        teamRole:
          $ref: '#/components/schemas/TeamRole'
      required:
        - teamRole
    RegisterRequest:
      type: object
      description: Self-registration details for a new local account.
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 64
        email:
          type: string
          format: email
          maxLength: 320
        password:
          type: string
          minLength: 8
          maxLength: 200
        displayName:
          type: string
          maxLength: 255
      required:
        - username
        - email
        - password
    RegisterResponse:
      type: object
      description: Uniform, non-revealing acknowledgement of a registration request.
      properties:
        verificationRequired:
          type: boolean
          description: Whether the user must verify their email before logging in.
        message:
          type: string
      required:
        - verificationRequired
        - message
    VerifyEmailResponse:
      type: object
      properties:
        verified:
          type: boolean
        message:
          type: string
      required:
        - verified
        - message
    ForgotPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 320
      required:
        - email
    ResetPasswordRequest:
      type: object
      properties:
        token:
          type: string
        newPassword:
          type: string
          minLength: 8
          maxLength: 200
      required:
        - token
        - newPassword
    OidcProviderTypeDto:
      type: string
      description: Kind of external identity provider.
      enum:
        - OIDC
        - GITHUB
        - GOOGLE
        - FACEBOOK
        - OAUTH2
    OidcProviderDto:
      type: object
      description: A configured identity provider. The client secret is never returned.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        providerType:
          $ref: '#/components/schemas/OidcProviderTypeDto'
        enabled:
          type: boolean
        clientId:
          type: string
        hasClientSecret:
          type: boolean
          description: Whether a client secret is stored (the value itself is never exposed).
        issuerUri:
          type: string
        scope:
          type: string
        authorizationUri:
          type: string
        tokenUri:
          type: string
        userInfoUri:
          type: string
        jwkSetUri:
          type: string
        userNameAttribute:
          type: string
        emailAttribute:
          type: string
        displayNameAttribute:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - providerType
        - enabled
        - clientId
        - hasClientSecret
        - scope
        - createdAt
    OidcProviderListResponse:
      type: object
      properties:
        providers:
          type: array
          items:
            $ref: '#/components/schemas/OidcProviderDto'
      required:
        - providers
    OidcProviderCreateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        providerType:
          $ref: '#/components/schemas/OidcProviderTypeDto'
        clientId:
          type: string
          minLength: 1
          maxLength: 255
        clientSecret:
          type: string
          maxLength: 1024
        issuerUri:
          type: string
          format: uri
          maxLength: 512
        scope:
          type: string
        authorizationUri:
          type: string
          format: uri
          maxLength: 512
        tokenUri:
          type: string
          format: uri
          maxLength: 512
        userInfoUri:
          type: string
          format: uri
          maxLength: 512
        jwkSetUri:
          type: string
          format: uri
          maxLength: 512
        userNameAttribute:
          type: string
        emailAttribute:
          type: string
        displayNameAttribute:
          type: string
      required:
        - name
        - providerType
        - clientId
        - clientSecret
    OidcProviderUpdateRequest:
      type: object
      description: Partial update; only provided fields change. A blank clientSecret keeps the stored one.
      properties:
        enabled:
          type: boolean
        name:
          type: string
          maxLength: 100
        clientId:
          type: string
          maxLength: 255
        clientSecret:
          type: string
          maxLength: 1024
        issuerUri:
          type: string
          format: uri
          maxLength: 512
        scope:
          type: string
        authorizationUri:
          type: string
          format: uri
          maxLength: 512
        tokenUri:
          type: string
          format: uri
          maxLength: 512
        userInfoUri:
          type: string
          format: uri
          maxLength: 512
        jwkSetUri:
          type: string
          format: uri
          maxLength: 512
        userNameAttribute:
          type: string
        emailAttribute:
          type: string
        displayNameAttribute:
          type: string
    OidcDiscoveryRequest:
      type: object
      properties:
        issuerUri:
          type: string
          format: uri
          maxLength: 512
      required:
        - issuerUri
    OidcDiscoveryResponse:
      type: object
      properties:
        success:
          type: boolean
        authorizationUri:
          type: string
        tokenUri:
          type: string
        userInfoUri:
          type: string
        jwkSetUri:
          type: string
        error:
          type: string
      required:
        - success
    ErrorResponse:
      type: object
      description: |
        Standard error envelope returned for non-2xx responses across the API.
        Carries a stable machine-readable `code` and a human-readable `message`;
        sensitive internals are never leaked (java/security rule).
      properties:
        code:
          type: string
          description: Stable, machine-readable error code (e.g. `NOT_FOUND`).
        message:
          type: string
          description: Human-readable, non-sensitive error description.
        timestamp:
          type: string
          format: date-time
          description: Server timestamp (RFC 3339) when the error was produced.
        fieldErrors:
          type: array
          description: >-
            Per-field validation failures, present when `code` is
            `VALIDATION_ERROR`. Lets the client flag each offending field
            individually; absent or empty for non-validation errors.
          items:
            $ref: '#/components/schemas/FieldError'
      required:
        - code
        - message
        - timestamp
    FieldError:
      type: object
      description: One field-level validation failure within an `ErrorResponse`.
      properties:
        field:
          type: string
          description: The offending field or setting key (e.g. `smtp.port`).
        message:
          type: string
          description: >-
            Human-readable, non-sensitive reason (e.g. `must be at most 65535`).
      required:
        - field
        - message
    DocumentResponse:
      type: object
      description: A review document's metadata.
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          maxLength: 500
        ownerId:
          type: string
          format: uuid
        workflowState:
          type: string
          description: The review workflow state (state machine lands with #246).
        latestVersionNumber:
          type: integer
          description: The highest existing version number; 0 when none exist.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - ownerId
        - workflowState
        - latestVersionNumber
        - createdAt
        - updatedAt
    DocumentVersionListResponse:
      type: object
      properties:
        versions:
          type: array
          items:
            $ref: '#/components/schemas/DocumentVersionSummary'
      required:
        - versions
    DocumentVersionSummary:
      type: object
      description: One immutable version of a document.
      properties:
        versionNumber:
          type: integer
        contentType:
          type: string
        sizeBytes:
          type: integer
          format: int64
        contentHash:
          type: string
          description: SHA-256 of the original binary (hex); also the download ETag.
        extractionStatus:
          $ref: '#/components/schemas/ExtractionStatus'
        createdBy:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
      required:
        - versionNumber
        - contentType
        - sizeBytes
        - contentHash
        - extractionStatus
        - createdBy
        - createdAt
    ExtractionStatus:
      type: string
      description: >-
        Lifecycle of a version's canonical representation: PENDING until the
        async extraction job runs, then READY or FAILED (ADR-0032/0033).
      enum:
        - PENDING
        - READY
        - FAILED
    RenderedDocumentResponse:
      type: object
      description: >-
        The canonical, server-extracted representation of one document version
        (ADR-0032). Property names mirror the stored representation exactly.
      properties:
        surfaces:
          type: array
          description: The ordered renderable planes (one per PDF page).
          items:
            $ref: '#/components/schemas/RenderedSurface'
      required:
        - surfaces
    RenderedSurface:
      type: object
      description: >-
        One renderable plane. width/height are the intrinsic size in source
        units (PDF points); all boxes are fractions of them.
      properties:
        index:
          type: integer
          description: Zero-based surface index within the document.
        width:
          type: number
          format: double
        height:
          type: number
          format: double
        textSpans:
          type: array
          description: Ordered text runs; empty when the surface has no text layer.
          items:
            $ref: '#/components/schemas/RenderedTextSpan'
      required:
        - index
        - width
        - height
        - textSpans
    RenderedTextSpan:
      type: object
      description: >-
        One extracted text run with its character-offset range within the
        surface's canonical text (spans joined by a single newline) and its
        normalized glyph bounding box.
      properties:
        text:
          type: string
        startOffset:
          type: integer
          description: Inclusive start within the surface's canonical text.
        endOffset:
          type: integer
          description: Exclusive end (startOffset + text length).
        box:
          $ref: '#/components/schemas/NormalizedBox'
      required:
        - text
        - startOffset
        - endOffset
        - box
    NormalizedBox:
      type: object
      description: >-
        An axis-aligned rectangle normalized to 0..1 of its surface; x/y is the
        top-left corner, origin at the surface's top-left.
      properties:
        x:
          type: number
          format: double
          minimum: 0
          maximum: 1
        y:
          type: number
          format: double
          minimum: 0
          maximum: 1
        width:
          type: number
          format: double
          minimum: 0
          maximum: 1
        height:
          type: number
          format: double
          minimum: 0
          maximum: 1
      required:
        - x
        - y
        - width
        - height
    RegionAnchor:
      type: object
      description: |
        The universal geometric layer of an anchor (ADR-0009): a normalized
        rectangle on one surface. Always present — for an image it is the only
        layer.
      required:
        - surfaceIndex
        - box
      properties:
        surfaceIndex:
          type: integer
          minimum: 0
          description: Zero-based surface (page) index.
        box:
          $ref: '#/components/schemas/NormalizedBox'
    TextQuoteAnchor:
      type: object
      description: |
        The text-quote layer (ADR-0009), present when the surface has a text
        layer: the exact quoted text plus a little surrounding context, robust to
        reflow across versions.
      required:
        - quote
      properties:
        quote:
          type: string
          minLength: 1
          description: The exact quoted text.
        prefix:
          type: string
          description: A short slice of text immediately before the quote.
        suffix:
          type: string
          description: A short slice of text immediately after the quote.
    TextPositionAnchor:
      type: object
      description: |
        The text-position layer (ADR-0009): character offsets into the surface's
        canonical text. Fast but brittle — a tiebreaker only.
      required:
        - start
        - end
      properties:
        start:
          type: integer
          minimum: 0
          description: Inclusive start offset.
        end:
          type: integer
          minimum: 0
          description: Exclusive end offset.
    Anchor:
      type: object
      description: |
        A multi-layer annotation anchor (ADR-0009). `region` is always present;
        `textQuote` and `textPosition` are added when the surface has a text layer.
      required:
        - region
      properties:
        region:
          $ref: '#/components/schemas/RegionAnchor'
        textQuote:
          $ref: '#/components/schemas/TextQuoteAnchor'
        textPosition:
          $ref: '#/components/schemas/TextPositionAnchor'
    AnnotationStatus:
      type: string
      description: The owner-decided lifecycle of an annotation (ADR-0011).
      enum:
        - OPEN
        - ACCEPTED
        - REJECTED
    PlacementStatus:
      type: string
      description: |
        Where an annotation sits on a specific version (ADR-0009): PLACED when a
        human drew it or re-anchoring resolved it uniquely; MOVED when re-anchored
        with a change to review; ORPHANED when no confident match exists; PENDING
        while the async re-anchoring job runs; FAILED on an internal error.
      enum:
        - PENDING
        - PLACED
        - MOVED
        - ORPHANED
        - FAILED
    AnnotationCreateRequest:
      type: object
      description: Create an annotation anchored to a region of a version.
      required:
        - versionNumber
        - anchor
      properties:
        versionNumber:
          type: integer
          minimum: 1
          description: The 1-based version the annotation is drawn on.
        anchor:
          $ref: '#/components/schemas/Anchor'
        comment:
          type: string
          minLength: 1
          maxLength: 20000
          description: An optional first comment seeding the discussion thread.
    AnnotationView:
      type: object
      description: |
        An annotation with, when a version was requested, its placement on that
        version and the size of its comment thread.
      required:
        - id
        - documentId
        - authorId
        - status
        - commentCount
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        documentId:
          type: string
          format: uuid
        authorId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/AnnotationStatus'
        anchor:
          $ref: '#/components/schemas/Anchor'
        placementStatus:
          $ref: '#/components/schemas/PlacementStatus'
        commentCount:
          type: integer
          description: Number of comments in the thread.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AnnotationListResponse:
      type: object
      required:
        - annotations
      properties:
        annotations:
          type: array
          items:
            $ref: '#/components/schemas/AnnotationView'
    AnnotationDecision:
      type: string
      description: An owner/author decision on an annotation (ADR-0011).
      enum:
        - ACCEPTED
        - REJECTED
    AnnotationDecisionRequest:
      type: object
      required:
        - decision
      properties:
        decision:
          $ref: '#/components/schemas/AnnotationDecision'
    CommentCreateRequest:
      type: object
      required:
        - body
      properties:
        body:
          type: string
          minLength: 1
          maxLength: 20000
    CommentView:
      type: object
      required:
        - id
        - annotationId
        - authorId
        - body
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        annotationId:
          type: string
          format: uuid
        authorId:
          type: string
          format: uuid
        body:
          type: string
        createdAt:
          type: string
          format: date-time
    CommentListResponse:
      type: object
      required:
        - comments
      properties:
        comments:
          type: array
          items:
            $ref: '#/components/schemas/CommentView'
