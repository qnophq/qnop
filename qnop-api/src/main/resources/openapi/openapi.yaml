# SPDX-License-Identifier: AGPL-3.0-only
#
# qnop REST API contract — single source of truth (ADR-0015, ADR-0021).
# qnop-api-model generates DTOs from the `components/schemas`; qnop-api-endpoint
# generates Spring MVC interfaces from the `paths`. URL versioning is /api/v1
# (realized by a controller path prefix in qnop-app, see ApiPathConfig).
openapi: 3.1.0
info:
  title: qnop API
  version: v1
  description: |
    **qnop** ("Qualified Notes on Papers") is an enterprise document-review system.
    This is the published, versioned REST contract consumed by the qnop frontend
    and by third-party integrators. It carries `/api/v1` URL versioning and a
    deprecation policy (ADR-0015).
  license:
    name: AGPL-3.0-only
    url: https://www.gnu.org/licenses/agpl-3.0.html
servers:
  - url: /api/v1
    description: Versioned API root
tags:
  - name: ServerConfig
    description: |
      Public, unauthenticated server configuration the frontend needs before a
      user is authenticated (edition flag, branding, enabled login providers,
      upload limits, supported document formats).
  - name: AdminSettings
    description: |
      Superadmin-only administration of the global application settings
      (issue #16). Sensitive values are masked as `***`.
  - name: Auth
    description: |
      Authentication: local username/email + password login, refresh-token
      rotation, logout, and password change (issue #17). Access tokens are
      short-lived JWTs sent as `Authorization: Bearer`; the rotating refresh
      token lives in an HttpOnly, SameSite=Strict cookie scoped to `/api/v1/auth`.
  - name: UserSettings
    description: |
      The authenticated user's own per-user settings (issue #22).
paths:
  /config:
    get:
      tags:
        - ServerConfig
      summary: Get public server configuration
      description: |
        Returns non-sensitive, operator-configurable server settings the client
        needs before authentication — the running edition, branding, the enabled
        OIDC login providers, the upload size limit, and the supported document
        formats.

        This endpoint is **public** (no authentication). The response is
        intentionally small and stable: new top-level keys may be added, existing
        ones are never removed.
      operationId: getServerConfig
      security: []
      responses:
        '200':
          description: Current public server configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerConfigResponse'
              example:
                version: "0.1.0-SNAPSHOT"
                edition: COMMUNITY
                general:
                  siteName: qnop
                  defaultTimezone: UTC
                auth:
                  oidcProviders: []
                  selfRegistrationEnabled: false
                upload:
                  maxDocumentSizeMb: 50
                supportedFormats:
                  - PDF
                  - DOCX
                  - MD
  /admin/settings:
    get:
      tags:
        - AdminSettings
      summary: List application settings
      description: |
        Returns all global application settings with their current values
        (sensitive values masked as `***`), declared types, and descriptions.
        Superadmin only.
      operationId: getAdminSettings
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current application settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSettingsResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags:
        - AdminSettings
      summary: Update application settings
      description: |
        Applies a partial set of setting changes (`key` → raw value). Sending
        `***` for a sensitive key leaves the stored secret unchanged. Returns the
        full, updated settings. Superadmin only.
      operationId: updateAdminSettings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminSettingsUpdateRequest'
      responses:
        '200':
          description: Updated application settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSettingsResponse'
        '400':
          description: Unknown key or type-invalid value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/email/test:
    post:
      tags:
        - AdminEmail
      summary: Send a test email
      description: |
        Sends a fixed test message to the given recipient using the current SMTP
        settings, to verify mail delivery. Superadmin only. Never returns a 5xx
        for a delivery problem — the outcome is reported in the body `status`.
      operationId: sendTestEmail
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendTestEmailRequest'
      responses:
        '200':
          description: Send attempt completed (see `status` for the outcome)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendTestEmailResponse'
        '400':
          description: Invalid recipient
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/email/templates:
    get:
      tags:
        - AdminEmail
      summary: List mail templates
      description: |
        Returns the effective content of every known mail template at the
        configured default locale, marking whether each comes from a stored
        override (`DATABASE`) or the built-in default (`DEFAULT`). Superadmin only.
      operationId: listMailTemplates
      security:
        - bearerAuth: []
      responses:
        '200':
          description: All mail templates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MailTemplateListResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/email/templates/{key}:
    get:
      tags:
        - AdminEmail
      summary: Get a mail template
      operationId: getMailTemplate
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MailTemplateKeyParam'
      responses:
        '200':
          description: The effective template content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MailTemplateResponse'
        '404':
          description: Unknown template key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - AdminEmail
      summary: Create or update a mail template override
      operationId: updateMailTemplate
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MailTemplateKeyParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMailTemplateRequest'
      responses:
        '200':
          description: The saved template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MailTemplateResponse'
        '400':
          description: Invalid template content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown template key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - AdminEmail
      summary: Reset a mail template to its default
      description: Removes the stored override, reverting to the built-in default.
      operationId: resetMailTemplate
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MailTemplateKeyParam'
      responses:
        '204':
          description: Override removed (or none existed)
        '404':
          description: Unknown template key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/email/templates/{key}/preview:
    post:
      tags:
        - AdminEmail
      summary: Preview a mail template
      description: |
        Renders the template with the supplied variables (or representative sample
        data when none are given), without sending. Superadmin only.
      operationId: previewMailTemplate
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MailTemplateKeyParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreviewMailTemplateRequest'
      responses:
        '200':
          description: The rendered preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MailTemplatePreviewResponse'
        '400':
          description: Render error (e.g. a referenced variable is missing)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown template key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/login:
    post:
      tags:
        - Auth
      summary: Authenticate with username/email and password
      description: |
        Verifies local credentials and, on success, returns a short-lived access
        token in the body and sets the rotating refresh token as an HttpOnly
        `qnop_refresh` cookie. Public (no bearer required).
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated — access token in body, refresh token in cookie.
          headers:
            Set-Cookie:
              description: HttpOnly refresh-token cookie (`qnop_refresh`).
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Rotate the refresh token and issue a new access token
      description: |
        Rotates the presented `qnop_refresh` cookie (single-use; replay of a
        revoked token revokes the whole family) and returns a new access token,
        setting a fresh refresh cookie. CSRF-protected (double-submit token).
      operationId: refresh
      security: []
      parameters:
        - name: qnop_refresh
          in: cookie
          required: false
          description: The HttpOnly refresh-token cookie.
          schema:
            type: string
      responses:
        '200':
          description: Rotated — new access token in body, new refresh token in cookie.
          headers:
            Set-Cookie:
              description: Fresh HttpOnly refresh-token cookie (`qnop_refresh`).
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Missing, unknown, expired, or reused refresh token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/logout:
    post:
      tags:
        - Auth
      summary: Log out — revoke the refresh-token family and clear the cookie
      description: |
        Revokes the refresh-token family behind the presented cookie and clears
        it. Idempotent. CSRF-protected (double-submit token).
      operationId: logout
      security: []
      parameters:
        - name: qnop_refresh
          in: cookie
          required: false
          description: The HttpOnly refresh-token cookie.
          schema:
            type: string
      responses:
        '204':
          description: Logged out (cookie cleared).
          headers:
            Set-Cookie:
              description: Clearing cookie for `qnop_refresh`.
              schema:
                type: string
  /auth/change-password:
    post:
      tags:
        - Auth
      summary: Change the authenticated user's password
      description: |
        Verifies the current password, stores the new one, and invalidates all
        existing tokens for the user (every active session must re-authenticate).
        Requires a valid access token.
      operationId: changePassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          description: Password changed; existing tokens invalidated.
        '400':
          description: New password does not meet policy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing/invalid access token or wrong current password.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/me/settings:
    get:
      tags:
        - UserSettings
      summary: Get the current user's settings
      description: |
        Returns the authenticated user's settings with their values, types and
        descriptions (registry defaults where unset). Requires a user (JWT)
        principal; API-key principals are rejected.
      operationId: getCurrentUserSettings
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The current user's settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Principal is not a user (e.g. an API key)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags:
        - UserSettings
      summary: Update the current user's settings
      description: |
        Applies a partial set of changes (`key` to value) for the authenticated
        user and returns the full, updated settings.
      operationId: updateCurrentUserSettings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserSettingsUpdateRequest'
      responses:
        '200':
          description: Updated user settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsResponse'
        '400':
          description: Unknown key or type-invalid value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Principal is not a user (e.g. an API key)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT access token issued by the qnop auth subsystem (epic #7). Sent as
        `Authorization: Bearer <token>` on authenticated endpoints. The auth flow
        itself is introduced in a later issue; the scheme is declared here so the
        contract is complete from the first endpoint.
  parameters:
    MailTemplateKeyParam:
      name: key
      in: path
      required: true
      description: The template storage key (e.g. `auth.password_reset`).
      schema:
        type: string
  schemas:
    Edition:
      type: string
      description: |
        The running qnop edition, determined by the classpath (ADR-0003): the
        presence of the commercial JARs. `COMMUNITY` is the AGPL build.
      enum:
        - COMMUNITY
        - ENTERPRISE
    SupportedFormat:
      type: string
      description: A document format qnop can ingest and review.
      enum:
        - PDF
        - DOCX
        - MD
    OidcProviderLoginInfo:
      type: object
      description: |
        Public login information for one enabled OIDC provider. Only non-sensitive
        fields appear here — never client secrets or issuer URIs.
      properties:
        id:
          type: string
          description: Stable provider id used to build the login URL.
        name:
          type: string
          description: Human-readable provider name rendered on the login button.
        loginUrl:
          type: string
          description: Relative URL the frontend redirects to in order to start login.
      required:
        - id
        - name
        - loginUrl
    ServerConfigGeneral:
      type: object
      description: General, application-wide public configuration.
      properties:
        siteName:
          type: string
          description: |
            Operator-branded display name shown in the browser tab, top bar, and
            footer. DB-backed via application settings (issue #16); the frontend
            falls back to `qnop` when empty.
        defaultTimezone:
          type: string
          description: |
            Server default timezone (IANA id, e.g. `UTC`, `Europe/Berlin`) used as
            the display fallback for users without a personal preference.
      required:
        - siteName
        - defaultTimezone
    ServerConfigAuth:
      type: object
      description: |
        Public authentication configuration used by the login page to render the
        local form and any enabled OIDC provider buttons.
      properties:
        oidcProviders:
          type: array
          description: |
            OIDC providers currently enabled in the database. Empty when none is
            active. One "Login with <name>" button is rendered per entry (issue #21).
          items:
            $ref: '#/components/schemas/OidcProviderLoginInfo'
        selfRegistrationEnabled:
          type: boolean
          description: |
            Whether the operator has enabled public self-registration (issue #20).
            The backend enforces the gate independently; flipping this client-side
            cannot bypass the controller check.
      required:
        - oidcProviders
        - selfRegistrationEnabled
    ServerConfigUpload:
      type: object
      description: Upload-related public configuration.
      properties:
        maxDocumentSizeMb:
          type: integer
          format: int32
          description: |
            Maximum allowed document size in megabytes. Uploads exceeding this are
            rejected with HTTP 413. Operator-configurable.
      required:
        - maxDocumentSizeMb
    ServerConfigResponse:
      type: object
      description: |
        Public, non-sensitive server configuration. Intentionally small and
        stable — new top-level keys may be added, existing ones are not removed.
      properties:
        version:
          type: string
          description: |
            Server version string (e.g. "0.1.0-SNAPSHOT"). Sourced from build
            metadata at startup; "unknown" when build info is unavailable.
        edition:
          $ref: '#/components/schemas/Edition'
        general:
          $ref: '#/components/schemas/ServerConfigGeneral'
        auth:
          $ref: '#/components/schemas/ServerConfigAuth'
        upload:
          $ref: '#/components/schemas/ServerConfigUpload'
        supportedFormats:
          type: array
          description: Document formats this server can ingest and review.
          items:
            $ref: '#/components/schemas/SupportedFormat'
      required:
        - version
        - edition
        - general
        - auth
        - upload
        - supportedFormats
    SettingValueType:
      type: string
      description: The declared type of an application setting value.
      enum:
        - STRING
        - INTEGER
        - BOOLEAN
        - ENUM
        - PASSWORD
    AdminSetting:
      type: object
      description: One application setting with its current (possibly masked) value.
      properties:
        key:
          type: string
          description: Stable dotted setting key (e.g. `smtp.host`).
        value:
          type: string
          description: Current value; sensitive values are masked as `***`.
        type:
          $ref: '#/components/schemas/SettingValueType'
        description:
          type: string
          description: Human-readable description of the setting.
        sensitive:
          type: boolean
          description: Whether the value is a secret (masked here, encrypted at rest).
      required:
        - key
        - type
        - description
        - sensitive
    AdminSettingsResponse:
      type: object
      description: The full set of global application settings.
      properties:
        settings:
          type: array
          items:
            $ref: '#/components/schemas/AdminSetting'
      required:
        - settings
    AdminSettingsUpdateRequest:
      type: object
      description: |
        Partial map of setting key to new raw value. Omitted keys are left
        unchanged; `***` for a sensitive key keeps the stored secret.
      properties:
        values:
          type: object
          additionalProperties:
            type: string
          description: Map of setting key to new value.
      required:
        - values
    LoginRequest:
      type: object
      description: Local-login credentials (issue #17).
      properties:
        usernameOrEmail:
          type: string
          description: The internal user's username or email address.
        password:
          type: string
          format: password
          description: The user's plaintext password (verified against the BCrypt hash).
      required:
        - usernameOrEmail
        - password
    ChangePasswordRequest:
      type: object
      description: Password-change payload for the authenticated user (issue #17).
      properties:
        currentPassword:
          type: string
          format: password
          description: The user's current password, re-verified before the change.
        newPassword:
          type: string
          format: password
          minLength: 12
          description: The replacement password. Must meet the minimum-length policy.
      required:
        - currentPassword
        - newPassword
    TokenResponse:
      type: object
      description: |
        A freshly issued access token (issue #17). The refresh token is delivered
        out-of-band as an HttpOnly cookie and never appears in this body.
      properties:
        accessToken:
          type: string
          description: Signed JWT access token; send it in the Authorization header as a Bearer token.
        tokenType:
          type: string
          description: Always `Bearer`.
        expiresInSeconds:
          type: integer
          format: int64
          description: Access-token lifetime in seconds from issuance.
      required:
        - accessToken
        - tokenType
        - expiresInSeconds
    SendTestEmailRequest:
      type: object
      description: Request to send a test email.
      properties:
        recipient:
          type: string
          format: email
          description: Address the test message is sent to.
      required:
        - recipient
    SendStatus:
      type: string
      description: Outcome of a mail send attempt.
      enum:
        - SENT
        - SKIPPED
        - FAILED
    SendTestEmailResponse:
      type: object
      description: Outcome of a test-email send (never a transport-level error to the client).
      properties:
        status:
          $ref: '#/components/schemas/SendStatus'
        detail:
          type: string
          description: Human-readable detail (e.g. "SMTP is not configured").
      required:
        - status
        - detail
    MailTemplateSource:
      type: string
      description: Where the effective template content originates.
      enum:
        - DATABASE
        - DEFAULT
    MailTemplateResponse:
      type: object
      description: The effective content of one mail template.
      properties:
        key:
          type: string
          description: Stable template storage key (e.g. `auth.password_reset`).
        locale:
          type: string
        subject:
          type: string
        bodyPlain:
          type: string
        bodyHtml:
          type: string
          description: Optional HTML alternative; absent when the template is plain-text only.
        source:
          $ref: '#/components/schemas/MailTemplateSource'
        updatedAt:
          type: string
          format: date-time
          description: When a stored override was last saved; absent for built-in defaults.
        updatedBy:
          type: string
          description: Id of the admin who last saved the override; absent for built-in defaults.
      required:
        - key
        - locale
        - subject
        - bodyPlain
        - source
    MailTemplateListResponse:
      type: object
      properties:
        templates:
          type: array
          items:
            $ref: '#/components/schemas/MailTemplateResponse'
      required:
        - templates
    UpdateMailTemplateRequest:
      type: object
      description: Create-or-update a per-locale template override.
      properties:
        locale:
          type: string
        subject:
          type: string
        bodyPlain:
          type: string
        bodyHtml:
          type: string
          description: Optional HTML alternative.
      required:
        - locale
        - subject
        - bodyPlain
    PreviewMailTemplateRequest:
      type: object
      description: Render a template without sending.
      properties:
        locale:
          type: string
          description: Locale to render; falls back to the default language when omitted.
        variables:
          type: object
          additionalProperties:
            type: string
          description: Template variables; representative sample data is used when omitted.
    MailTemplatePreviewResponse:
      type: object
      properties:
        subject:
          type: string
        bodyPlain:
          type: string
        bodyHtml:
          type: string
      required:
        - subject
        - bodyPlain
    UserSettingItem:
      type: object
      description: One user setting with its current value.
      properties:
        key:
          type: string
          description: Stable setting key (e.g. `theme`).
        value:
          type: string
          description: Current value (registry default where the user has not set one).
        type:
          $ref: '#/components/schemas/SettingValueType'
        description:
          type: string
          description: Human-readable description of the setting.
      required:
        - key
        - type
        - description
    UserSettingsResponse:
      type: object
      description: The authenticated user's settings.
      properties:
        settings:
          type: array
          items:
            $ref: '#/components/schemas/UserSettingItem'
      required:
        - settings
    UserSettingsUpdateRequest:
      type: object
      description: Partial map of user setting key to new value.
      properties:
        values:
          type: object
          additionalProperties:
            type: string
          description: Map of setting key to new value.
      required:
        - values
    ErrorResponse:
      type: object
      description: |
        Standard error envelope returned for non-2xx responses across the API.
        Carries a stable machine-readable `code` and a human-readable `message`;
        sensitive internals are never leaked (java/security rule).
      properties:
        code:
          type: string
          description: Stable, machine-readable error code (e.g. `NOT_FOUND`).
        message:
          type: string
          description: Human-readable, non-sensitive error description.
        timestamp:
          type: string
          format: date-time
          description: Server timestamp (RFC 3339) when the error was produced.
      required:
        - code
        - message
        - timestamp
