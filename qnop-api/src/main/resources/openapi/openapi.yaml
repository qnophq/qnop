# SPDX-License-Identifier: AGPL-3.0-only
#
# qnop REST API contract — single source of truth (ADR-0015, ADR-0021).
# qnop-api-model generates DTOs from the `components/schemas`; qnop-api-endpoint
# generates Spring MVC interfaces from the `paths`. URL versioning is /api/v1
# (realized by a controller path prefix in qnop-app, see ApiPathConfig).
openapi: 3.1.0
info:
  title: qnop API
  version: v1
  description: |
    **qnop** ("Qualified Notes on Papers") is an enterprise document-review system.
    This is the published, versioned REST contract consumed by the qnop frontend
    and by third-party integrators. It carries `/api/v1` URL versioning and a
    deprecation policy (ADR-0015).
  license:
    name: AGPL-3.0-only
    url: https://www.gnu.org/licenses/agpl-3.0.html
servers:
  - url: /api/v1
    description: Versioned API root
tags:
  - name: ServerConfig
    description: |
      Public, unauthenticated server configuration the frontend needs before a
      user is authenticated (edition flag, branding, enabled login providers,
      upload limits, supported document formats).
  - name: AdminSettings
    description: |
      Superadmin-only administration of the global application settings
      (issue #16). Sensitive values are masked as `***`.
  - name: Auth
    description: |
      Authentication: local username/email + password login, refresh-token
      rotation, logout, and password change (issue #17). Access tokens are
      short-lived JWTs sent as `Authorization: Bearer`; the rotating refresh
      token lives in an HttpOnly, SameSite=Strict cookie scoped to `/api/v1/auth`.
  - name: UserSettings
    description: |
      The authenticated user's own per-user settings (issue #22).
  - name: Users
    description: |
      The authenticated user's own profile — identity, global role and account
      source — used by the SPA to render the shell and gate role-based UI (#99).
  - name: AdminUsers
    description: |
      Admin-only user management (issue #104): list/search with pagination,
      create (set an initial password or send an invitation), edit display name,
      global role and enabled state, and trigger a password-setup/reset link.
      A self-lockout guard prevents an admin from disabling or demoting their own
      account or the last remaining admin.
  - name: AdminTeams
    description: |
      Admin-only team management (issue #105): list/search teams with pagination,
      create / edit / delete teams, and manage memberships with a per-team role
      (LEAD / MEMBER). Teams group reviewers for the review workflow.
  - name: AdminOidcProviders
    description: |
      Superadmin-only management of DB-configured OIDC/OAuth2 login providers,
      including issuer-endpoint discovery (issue #21).
  - name: AdminEmail
    description: |
      Superadmin-only mail configuration — SMTP connection test, mail-template
      overrides and preview (issue #19).
  - name: AuthRegistration
    description: |
      Public self-registration and email-verification endpoints (issue #20).
  - name: AuthPasswordReset
    description: |
      Public self-service password-reset request and confirmation flow (issue #20).
  - name: ReviewWorkflow
    description: |
      The review workflow of a document (issue #246, ADR-0011): reading the
      current state with its reachable transitions, and requesting a transition
      through the single state-machine choke-point. State-changing calls are
      owner-only; the `IN_REVIEW ⇄ CHANGES_REQUESTED` pair however is derived
      from the open-annotation count (issue #405) and never requested
      explicitly. The state is an open string: the Community edition ships
      `DRAFT`, `IN_REVIEW`, `CHANGES_REQUESTED`, `FINALIZED` and `CANCELLED`,
      but an enterprise-extended state machine may add further states.
  - name: Documents
    description: |
      Document metadata, versions, and the canonical rendered representation of
      the review core (issue #245, ADR-0032). Visible only to the owner, the
      review participants, and admins. The multipart upload and the
      original-binary download are deliberately outside this contract (ADR-0028).
      The root listing and the participant management (issue #292, ADR-0011)
      power the reviews overview: a participant is a reviewer — a user or a
      whole team — while the owner stays structural on the document.
  - name: Principals
    description: |
      A lightweight directory of assignable principals — enabled users and
      teams — for picking review participants (issue #292). Available to every
      authenticated user by deliberate Community decision; it exposes display
      names only (no emails, no roles).
  - name: Annotations
    description: |
      Annotations, their comment threads, and per-version placements (issue #247,
      ADR-0009/0011). A participant creates an anchored annotation on a version;
      the document owner or the annotation's author accepts or rejects it, feeding
      the review workflow. Visible only to the document's participants and admins —
      a non-participant sees 404, as for documents (anti-enumeration).
paths:
  /config:
    get:
      tags:
        - ServerConfig
      summary: Get public server configuration
      description: |
        Returns non-sensitive, operator-configurable server settings the client
        needs before authentication — the running edition, branding, the enabled
        OIDC login providers, the upload size limit, and the supported document
        formats.

        This endpoint is **public** (no authentication). The response is
        intentionally small and stable: new top-level keys may be added, existing
        ones are never removed.
      operationId: getServerConfig
      security: []
      responses:
        '200':
          description: Current public server configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerConfigResponse'
              example:
                version: "0.1.0-SNAPSHOT"
                edition: COMMUNITY
                general:
                  siteName: qnop
                  defaultTimezone: UTC
                auth:
                  oidcProviders: []
                  selfRegistrationEnabled: false
                upload:
                  maxDocumentSizeMb: 50
                supportedFormats:
                  - PDF
                  - DOCX
                  - MD
  /admin/settings:
    get:
      tags:
        - AdminSettings
      summary: List application settings
      description: |
        Returns all global application settings with their current values
        (sensitive values masked as `***`), declared types, and descriptions.
        Superadmin only.
      operationId: getAdminSettings
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current application settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSettingsResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags:
        - AdminSettings
      summary: Update application settings
      description: |
        Applies a partial set of setting changes (`key` → raw value). Sending
        `***` for a sensitive key leaves the stored secret unchanged. Returns the
        full, updated settings. Superadmin only.
      operationId: updateAdminSettings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminSettingsUpdateRequest'
      responses:
        '200':
          description: Updated application settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSettingsResponse'
        '400':
          description: Unknown key or type-invalid value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/oidc-providers:
    get:
      tags:
        - AdminOidcProviders
      summary: List OIDC/OAuth2 providers
      operationId: listOidcProviders
      security:
        - bearerAuth: []
      responses:
        '200':
          description: All configured providers (client secrets never included)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OidcProviderListResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - AdminOidcProviders
      summary: Create an OIDC/OAuth2 provider
      description: Creates a disabled provider; the operator enables it after verifying the config.
      operationId: createOidcProvider
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OidcProviderCreateRequest'
      responses:
        '201':
          description: The created provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OidcProviderDto'
        '400':
          description: Invalid input or a blocked/invalid URI
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — a provider with that name already exists (code `NAME_TAKEN`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/oidc-providers/discover:
    post:
      tags:
        - AdminOidcProviders
      summary: Discover endpoints for an OIDC issuer
      description: |
        Probes an issuer URI's `.well-known/openid-configuration` and returns the
        discovered endpoints. The issuer URI passes the SSRF guard first. Returns
        a body with `success=false` (not a 5xx) when the issuer is not discoverable.
      operationId: discoverOidcEndpoints
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OidcDiscoveryRequest'
      responses:
        '200':
          description: Discovery outcome
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OidcDiscoveryResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/oidc-providers/{providerId}:
    get:
      tags:
        - AdminOidcProviders
      summary: Get an OIDC/OAuth2 provider
      operationId: getOidcProvider
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OidcProviderIdParam'
      responses:
        '200':
          description: The provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OidcProviderDto'
        '404':
          description: Unknown provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags:
        - AdminOidcProviders
      summary: Update an OIDC/OAuth2 provider
      description: Partial update; only provided fields change. A blank client secret keeps the stored one.
      operationId: updateOidcProvider
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OidcProviderIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OidcProviderUpdateRequest'
      responses:
        '200':
          description: The updated provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OidcProviderDto'
        '400':
          description: Invalid input or a blocked/invalid URI
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - AdminOidcProviders
      summary: Delete an OIDC/OAuth2 provider
      operationId: deleteOidcProvider
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OidcProviderIdParam'
      responses:
        '204':
          description: Provider deleted
        '404':
          description: Unknown provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/email/test:
    post:
      tags:
        - AdminEmail
      summary: Send a test email
      description: |
        Sends a fixed test message to the given recipient using the current SMTP
        settings, to verify mail delivery. Superadmin only. Never returns a 5xx
        for a delivery problem — the outcome is reported in the body `status`.
      operationId: sendTestEmail
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendTestEmailRequest'
      responses:
        '200':
          description: Send attempt completed (see `status` for the outcome)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendTestEmailResponse'
        '400':
          description: Invalid recipient
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/email/templates:
    get:
      tags:
        - AdminEmail
      summary: List mail templates
      description: |
        Returns the effective content of every known mail template at the
        configured default locale, marking whether each comes from a stored
        override (`DATABASE`) or the built-in default (`DEFAULT`). Superadmin only.
      operationId: listMailTemplates
      security:
        - bearerAuth: []
      responses:
        '200':
          description: All mail templates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MailTemplateListResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/email/templates/{key}:
    get:
      tags:
        - AdminEmail
      summary: Get a mail template
      operationId: getMailTemplate
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MailTemplateKeyParam'
      responses:
        '200':
          description: The effective template content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MailTemplateResponse'
        '404':
          description: Unknown template key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - AdminEmail
      summary: Create or update a mail template override
      operationId: updateMailTemplate
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MailTemplateKeyParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMailTemplateRequest'
      responses:
        '200':
          description: The saved template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MailTemplateResponse'
        '400':
          description: Invalid template content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown template key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - AdminEmail
      summary: Reset a mail template to its default
      description: Removes the stored override, reverting to the built-in default.
      operationId: resetMailTemplate
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MailTemplateKeyParam'
      responses:
        '204':
          description: Override removed (or none existed)
        '404':
          description: Unknown template key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/email/templates/{key}/preview:
    post:
      tags:
        - AdminEmail
      summary: Preview a mail template
      description: |
        Renders the template with the supplied variables (or representative sample
        data when none are given), without sending. Superadmin only.
      operationId: previewMailTemplate
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MailTemplateKeyParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreviewMailTemplateRequest'
      responses:
        '200':
          description: The rendered preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MailTemplatePreviewResponse'
        '400':
          description: Render error (e.g. a referenced variable is missing)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown template key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not a superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/users:
    get:
      tags:
        - AdminUsers
      summary: List and search users
      description: |
        Returns a page of users (internal and external), most-recent first.
        Optional `q` matches display name, email or username (case-insensitive);
        optional `role` filters by global role.
      operationId: listUsers
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: false
          description: Case-insensitive search over display name, email and username.
          schema:
            type: string
            maxLength: 200
        - name: role
          in: query
          required: false
          description: Filter by global role.
          schema:
            $ref: '#/components/schemas/UserRole'
        - name: enabled
          in: query
          required: false
          description: Filter by account status; omit for all.
          schema:
            type: boolean
        - name: sort
          in: query
          required: false
          description: |
            Sort as `field,direction`. Allowed fields: displayName, email,
            username, role, createdAt, lastLoginAt; direction asc|desc.
          schema:
            type: string
            default: displayName,asc
        - name: page
          in: query
          required: false
          description: Zero-based page index.
          schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          description: Page size.
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: A page of users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags:
        - AdminUsers
      summary: Create or invite a user
      description: |
        Creates an internal account. If `initialPassword` is provided the account
        is enabled immediately and must change its password on first login. If it
        is omitted, the account is created without a password and an invitation
        link (set-your-password) is emailed to the address.
      operationId: createUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserCreateRequest'
      responses:
        '201':
          description: The created user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserDetail'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: A user with that username or email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/users/{userId}:
    get:
      tags:
        - AdminUsers
      summary: Get a user
      operationId: getUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '200':
          description: The user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserDetail'
        '404':
          description: Unknown user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    patch:
      tags:
        - AdminUsers
      summary: Update a user
      description: |
        Partial update of display name, global role and enabled state. The
        self-lockout guard rejects (409) an attempt to disable or demote your own
        account or the last remaining admin.
      operationId: updateUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserUpdateRequest'
      responses:
        '200':
          description: The updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserDetail'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Self-lockout or last-admin guard violated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    delete:
      tags:
        - AdminUsers
      summary: Delete a user
      description: |
        Permanently deletes the user and, by cascade, their tokens, settings,
        OIDC identity and team memberships. The self-lockout guard rejects (409)
        deleting your own account or the last enabled admin.
      operationId: deleteUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '204':
          description: User deleted
        '404':
          description: Unknown user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Self-lockout or last-admin guard violated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/users/{userId}/password-reset:
    post:
      tags:
        - AdminUsers
      summary: Reset a user's password (admin)
      description: |
        Revokes the user's active sessions immediately, issues a single-use
        password-reset token and emails the set-your-password link. Works for any
        internal account (e.g. to (re)send an invitation or to help a locked-out
        user). External (OIDC) accounts have no local password and are rejected
        with 409. When email could not be sent, the response carries `resetUrl`
        so the operator can deliver it out of band.
      operationId: sendUserPasswordReset
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '200':
          description: The reset was triggered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminPasswordResetResponse'
        '404':
          description: Unknown user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: The account has no local password (external/OIDC)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/users/{userId}/password:
    post:
      tags:
        - AdminUsers
      summary: Generate a new password for a user (admin)
      description: |
        Sets a freshly generated strong password on the user, marks it for change
        on first login, and revokes the user's active sessions immediately. The
        generated password is returned **once** for the admin to hand over — it is
        never stored in clear text and cannot be retrieved again. External (OIDC)
        accounts have no local password and are rejected with 409. An admin may
        target their own account; doing so ends their sessions (the response still
        carries the new password to sign back in with).
      operationId: generateUserPassword
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '200':
          description: The password was generated and set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminGeneratedPasswordResponse'
        '404':
          description: Unknown user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: The account has no local password (external/OIDC)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/teams:
    get:
      tags:
        - AdminTeams
      summary: List and search teams
      description: Returns a page of teams ordered by name, with a member count each.
      operationId: listTeams
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: false
          description: Case-insensitive search over team name and description.
          schema:
            type: string
            maxLength: 200
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: A page of teams
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminTeamListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags:
        - AdminTeams
      summary: Create a team
      operationId: createTeam
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminTeamCreateRequest'
      responses:
        '201':
          description: The created team
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminTeamSummary'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: A team with that name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/teams/{teamId}:
    get:
      tags:
        - AdminTeams
      summary: Get a team with its members
      operationId: getTeam
