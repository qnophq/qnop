  /auth/register:
    post:
      tags:
        - AuthRegistration
      summary: Register a local account
      description: |
        Self-registration of a local user. Public; gated by the
        `auth.self_registration_enabled` setting. Anti-enumeration: the response is
        **uniform** whether or not the username/email already exists (no account is
        created or re-mailed for a duplicate); when registration is disabled the
        endpoint reports a **disguised 404** so its availability is not revealed.
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Uniform registration acknowledgement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Registration is not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many registration attempts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/verify-email:
    get:
      tags:
        - AuthRegistration
      summary: Verify a registered email address
      description: Consumes a single-use verification token and activates the account. Public.
      operationId: verifyEmail
      security: []
      parameters:
        - name: token
          in: query
          required: true
          description: The raw verification token from the emailed link.
          schema:
            type: string
      responses:
        '200':
          description: Verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyEmailResponse'
        '400':
          description: Unknown, expired, or already-used token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/forgot-password:
    post:
      tags:
        - AuthPasswordReset
      summary: Request a password-reset email
      description: |
        Starts the self-service reset flow. Public. Always returns **204** with
        constant-time behaviour regardless of whether the address maps to a local
        account, so it cannot be used to enumerate users.
      operationId: forgotPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '204':
          description: Request accepted (no content; outcome intentionally not disclosed)
        '429':
          description: Too many reset requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/reset-password:
    post:
      tags:
        - AuthPasswordReset
      summary: Complete a password reset
      description: Consumes a single-use reset token and sets the new password. Public.
      operationId: resetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '204':
          description: Password updated
        '400':
          description: Unknown/expired/used token or invalid password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/login:
    post:
      tags:
        - Auth
      summary: Authenticate with username/email and password
      description: |
        Verifies local credentials and, on success, returns a short-lived access
        token in the body and sets the rotating refresh token as an HttpOnly
        `qnop_refresh` cookie. Public (no bearer required).
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated — access token in body, refresh token in cookie.
          headers:
            Set-Cookie:
              description: HttpOnly refresh-token cookie (`qnop_refresh`).
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Rotate the refresh token and issue a new access token
      description: |
        Rotates the presented `qnop_refresh` cookie (single-use; replay of a
        revoked token revokes the whole family) and returns a new access token,
        setting a fresh refresh cookie. CSRF-protected (double-submit token).
      operationId: refresh
      security: []
      parameters:
        - name: qnop_refresh
          in: cookie
          required: false
          description: The HttpOnly refresh-token cookie.
          schema:
            type: string
      responses:
        '200':
          description: Rotated — new access token in body, new refresh token in cookie.
          headers:
            Set-Cookie:
              description: Fresh HttpOnly refresh-token cookie (`qnop_refresh`).
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Missing, unknown, expired, or reused refresh token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/logout:
    post:
      tags:
        - Auth
      summary: Log out — revoke the refresh-token family and clear the cookie
      description: |
        Revokes the refresh-token family behind the presented cookie and clears
        it. Idempotent. CSRF-protected (double-submit token).
      operationId: logout
      security: []
      parameters:
        - name: qnop_refresh
          in: cookie
          required: false
          description: The HttpOnly refresh-token cookie.
          schema:
            type: string
      responses:
        '204':
          description: Logged out (cookie cleared).
          headers:
            Set-Cookie:
              description: Clearing cookie for `qnop_refresh`.
              schema:
                type: string
  /auth/change-password:
    post:
      tags:
        - Auth
      summary: Change the authenticated user's password
      description: |
        Verifies the current password, stores the new one, and invalidates all
        existing tokens for the user (every active session must re-authenticate).
        Requires a valid access token.
      operationId: changePassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          description: Password changed; existing tokens invalidated.
        '400':
          description: New password does not meet policy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing/invalid access token or wrong current password.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: |
            The account authenticates via an external provider (OIDC) and has no local
            password to change (code `EXTERNAL_ACCOUNT`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/me:
    get:
      tags:
        - Users
      summary: Get the current user's profile
      description: |
        Returns the authenticated user's identity, global role and account source.
        The SPA calls this right after login to render the shell and gate
        role-based UI. Requires a user (JWT) principal; non-user principals are
        rejected with 403.
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
