    OidcDiscoveryResponse:
      type: object
      properties:
        success:
          type: boolean
        authorizationUri:
          type: string
        tokenUri:
          type: string
        userInfoUri:
          type: string
        jwkSetUri:
          type: string
        error:
          type: string
      required:
        - success
    ErrorResponse:
      type: object
      description: |
        Standard error envelope returned for non-2xx responses across the API.
        Carries a stable machine-readable `code` and a human-readable `message`;
        sensitive internals are never leaked (java/security rule).
      properties:
        code:
          type: string
          description: Stable, machine-readable error code (e.g. `NOT_FOUND`).
        message:
          type: string
          description: Human-readable, non-sensitive error description.
        timestamp:
          type: string
          format: date-time
          description: Server timestamp (RFC 3339) when the error was produced.
        fieldErrors:
          type: array
          description: >-
            Per-field validation failures, present when `code` is
            `VALIDATION_ERROR`. Lets the client flag each offending field
            individually; absent or empty for non-validation errors.
          items:
            $ref: '#/components/schemas/FieldError'
      required:
        - code
        - message
        - timestamp
    FieldError:
      type: object
      description: One field-level validation failure within an `ErrorResponse`.
      properties:
        field:
          type: string
          description: The offending field or setting key (e.g. `smtp.port`).
        message:
          type: string
          description: >-
            Human-readable, non-sensitive reason (e.g. `must be at most 65535`).
      required:
        - field
        - message
    DashboardReply:
      type: object
      description: >-
        One reply by someone else in a thread the caller started or joined
        (issue #454), newest first. `annotationExcerpt` is the thread's opening
        line for context; `authorDisplayName` is resolved server-side,
        honouring per-review anonymity (issue #413).
      required:
        - commentId
        - annotationId
        - documentId
        - documentTitle
        - body
        - createdAt
      properties:
        commentId:
          type: string
          format: uuid
        annotationId:
          type: string
          format: uuid
        documentId:
          type: string
          format: uuid
        documentTitle:
          type: string
        documentSlug:
          type: string
          nullable: true
        authorId:
          type: string
          format: uuid
          nullable: true
          description: >-
            The author's REAL user id — null when the review anonymises this
            author towards the caller (issue #413); the client links and loads
            avatars only when present.
        authorAvatarUrl:
          type: string
          nullable: true
          description: The author's avatar URL, when identifiable and uploaded.
        authorDisplayName:
          type: string
          nullable: true
        body:
          type: string
          description: The reply, excerpted for the card.
        annotationExcerpt:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    DashboardActivity:
      type: object
      description: >-
        One feed entry from the audit trail of the caller's reviews (issue
        #454) — the caller's own actions are excluded.
      required:
        - type
        - documentId
        - documentTitle
        - createdAt
      properties:
        type:
          type: string
          description: >-
            The audit event type — annotation.created, annotation.resolved,
            annotation.reopened, workflow.transition or
            document.due_date.changed.
        documentId:
          type: string
          format: uuid
        documentTitle:
          type: string
        documentSlug:
          type: string
          nullable: true
        actorId:
          type: string
          format: uuid
          nullable: true
          description: The actor's REAL user id — null when anonymised (issue #413).
        actorAvatarUrl:
          type: string
          nullable: true
          description: The actor's avatar URL, when identifiable and uploaded.
        actorDisplayName:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    DashboardStats:
      type: object
      required:
        - resolvedThisWeek
      properties:
        resolvedThisWeek:
          type: integer
          description: Annotations resolved across the caller's reviews in the last 7 days.
    DashboardResponse:
      type: object
      required:
        - replies
        - activity
        - stats
      properties:
        replies:
          type: array
          items:
            $ref: '#/components/schemas/DashboardReply'
        activity:
          type: array
          items:
            $ref: '#/components/schemas/DashboardActivity'
        stats:
          $ref: '#/components/schemas/DashboardStats'
    DocumentSummary:
      type: object
      description: One document in the caller's reviews overview (issue #292).
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          maxLength: 500
        slug:
          type: string
          nullable: true
          minLength: 3
          maxLength: 64
          description: >-
            Optional human-readable identifier chosen at creation (issue #411):
            kebab-case, unique ignoring case, immutable. Null when none was set.
        anonymous:
          type: boolean
          description: >-
            Whether foreign authors are anonymised in this review (issue #413):
            when true the API ships no resolvable identity for non-self, non-owner
            authors and the UI renders stable "Participant N" pseudonyms. Chosen at
            creation and immutable. Defaults to false.
        threadParticipation:
          $ref: '#/components/schemas/ThreadParticipation'
        ownerId:
          type: string
          format: uuid
        workflowState:
          type: string
          description: The review workflow state (open string set, ADR-0011).
        latestVersionNumber:
          type: integer
          description: The highest existing version number; 0 when none exist.
        annotationCount:
          type: integer
          format: int32
          description: All annotations on the document, regardless of status.
        openAnnotationCount:
          type: integer
          format: int32
          description: Annotations still in status OPEN.
        participants:
          type: array
          description: The reviewers (users or teams), oldest first.
          items:
            $ref: '#/components/schemas/ParticipantView'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        dueAt:
          type: string
          format: date-time
          nullable: true
          description: >-
            Optional, informational completion deadline (issue #295). Absent or
            null when none is set. No workflow-guard semantics — an overdue open
            review is only visually flagged.
      required:
        - id
        - title
        - ownerId
        - workflowState
        - latestVersionNumber
        - annotationCount
        - openAnnotationCount
        - participants
        - createdAt
        - updatedAt
    DocumentListResponse:
      type: object
      description: A page of the caller's documents.
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DocumentSummary'
        total:
          type: integer
          format: int64
          description: Total number of documents matching the query.
        page:
          type: integer
          format: int32
          description: Zero-based page index.
        size:
          type: integer
          format: int32
          description: Page size.
      required:
        - items
        - total
        - page
        - size
    ParticipantKind:
      type: string
      description: What kind of principal a participant is.
      enum:
        - USER
        - TEAM
    ThreadParticipation:
      type: string
      description: >-
        Who, besides an annotation's author and the review owner, may see and
        write in a thread (issue #413), chosen at creation and immutable:
        `PRIVATE` hides foreign threads entirely, `READ_ONLY` shows them but
        accepts comments only from the author and owner, `OPEN` (the default) is
        fully participable.
      enum:
        - PRIVATE
        - READ_ONLY
        - OPEN
    ParticipantView:
      type: object
      description: A review participant — a user or a team acting as reviewer (ADR-0011).
      properties:
        id:
          type: string
          format: uuid
          description: The participant row's id (used for removal).
        kind:
          $ref: '#/components/schemas/ParticipantKind'
        principalId:
          type: string
          format: uuid
          description: The user's or team's id.
        displayName:
          type: string
          description: The user's display name or the team's name.
      required:
        - id
        - kind
        - principalId
        - displayName
    ParticipantListResponse:
      type: object
      description: The document's review participants.
      properties:
        participants:
          type: array
          items:
            $ref: '#/components/schemas/ParticipantView'
      required:
        - participants
    ParticipantCreateRequest:
      type: object
      description: Add a reviewer — exactly one of `userId` or `teamId`.
      properties:
        userId:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
    PrincipalView:
      type: object
      description: An assignable principal — an enabled user or team.
      properties:
        id:
          type: string
          format: uuid
        kind:
          $ref: '#/components/schemas/ParticipantKind'
        displayName:
          type: string
        avatarUrl:
          type: string
          nullable: true
          description: |
            URL of the user's profile picture (with a cache-busting `?v=` token);
            null for teams and for users without one — the UI then renders the
            initials avatar (or the team glyph).
      required:
        - id
        - kind
        - displayName
    PrincipalListResponse:
      type: object
      description: Principals matching a directory search.
      properties:
        principals:
          type: array
          items:
            $ref: '#/components/schemas/PrincipalView'
      required:
        - principals
    DocumentResponse:
      type: object
      description: A review document's metadata.
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          maxLength: 500
        slug:
          type: string
          nullable: true
          minLength: 3
          maxLength: 64
          description: >-
            Optional human-readable identifier chosen at creation (issue #411):
            kebab-case, unique ignoring case, immutable. Null when none was set.
        anonymous:
          type: boolean
          description: >-
            Whether foreign authors are anonymised in this review (issue #413):
            when true the API ships no resolvable identity for non-self, non-owner
            authors and the UI renders stable "Participant N" pseudonyms. Chosen at
            creation and immutable. Defaults to false.
        threadParticipation:
          $ref: '#/components/schemas/ThreadParticipation'
        ownerId:
          type: string
          format: uuid
        workflowState:
          type: string
          description: The review workflow state (state machine lands with #246).
        latestVersionNumber:
          type: integer
          description: The highest existing version number; 0 when none exist.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        dueAt:
          type: string
          format: date-time
          nullable: true
          description: >-
            Optional, informational completion deadline (issue #295). Absent or
            null when none is set. No workflow-guard semantics — an overdue open
            review is only visually flagged.
      required:
        - id
        - title
        - ownerId
        - workflowState
        - latestVersionNumber
        - createdAt
        - updatedAt
    DocumentUpdateRequest:
      type: object
      description: >-
        Owner-only patch of a document's mutable metadata (issue #295). Every
        supplied field replaces the stored value; an explicit `null` clears it.
      properties:
        dueAt:
          type: string
          format: date-time
          nullable: true
          description: >-
            The completion deadline to set, or `null` to clear it. When creating
            it must be in the future; on edit any value (including the past) is
            accepted so an owner can correct it after the fact.
    DocumentVersionListResponse:
      type: object
      properties:
        versions:
          type: array
          items:
            $ref: '#/components/schemas/DocumentVersionSummary'
      required:
        - versions
    DocumentVersionSummary:
      type: object
      description: One immutable version of a document.
      properties:
        versionNumber:
          type: integer
        contentType:
          type: string
        sizeBytes:
          type: integer
          format: int64
        contentHash:
          type: string
          description: SHA-256 of the original binary (hex); also the download ETag.
        extractionStatus:
          $ref: '#/components/schemas/ExtractionStatus'
        createdBy:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
      required:
        - versionNumber
        - contentType
        - sizeBytes
        - contentHash
        - extractionStatus
        - createdBy
        - createdAt
    ExtractionStatus:
      type: string
      description: >-
        Lifecycle of a version's canonical representation: PENDING until the
        async extraction job runs, then READY or FAILED (ADR-0032/0033).
      enum:
        - PENDING
        - READY
        - FAILED
    RenderedDocumentResponse:
      type: object
      description: >-
        The canonical, server-extracted representation of one document version
        (ADR-0032). Property names mirror the stored representation exactly.
      properties:
        surfaces:
          type: array
          description: The ordered renderable planes (one per PDF page).
          items:
            $ref: '#/components/schemas/RenderedSurface'
      required:
        - surfaces
    RenderedSurface:
      type: object
      description: >-
        One renderable plane. width/height are the intrinsic size in source
        units (PDF points); all boxes are fractions of them.
      properties:
        index:
          type: integer
          description: Zero-based surface index within the document.
        width:
          type: number
          format: double
        height:
          type: number
          format: double
        textSpans:
          type: array
          description: Ordered text runs; empty when the surface has no text layer.
          items:
            $ref: '#/components/schemas/RenderedTextSpan'
      required:
        - index
        - width
        - height
        - textSpans
    RenderedTextSpan:
      type: object
      description: >-
        One extracted text run with its character-offset range within the
        surface's canonical text (spans joined by a single newline) and its
        normalized glyph bounding box.
      properties:
        text:
          type: string
        startOffset:
          type: integer
          description: Inclusive start within the surface's canonical text.
        endOffset:
          type: integer
          description: Exclusive end (startOffset + text length).
        box:
          $ref: '#/components/schemas/NormalizedBox'
        charAdvances:
          type: array
          items:
            type: number
            format: double
          description: >-
            Glyph-true sub-line geometry (issue #290): the normalized x of
            each character's right edge on the surface, in the same coordinate
            space as `box`. Character i spans from `i == 0 ? box.x :
            charAdvances[i-1]` to `charAdvances[i]`. Values are non-decreasing
            and the array length equals the text length. Absent for
            representations extracted before this field existed or when
            per-character geometry cannot be attributed — clients then
            distribute the characters uniformly across the box.
      required:
        - text
        - startOffset
        - endOffset
        - box
    NormalizedBox:
      type: object
      description: >-
        An axis-aligned rectangle normalized to 0..1 of its surface; x/y is the
        top-left corner, origin at the surface's top-left.
      properties:
        x:
          type: number
          format: double
          minimum: 0
          maximum: 1
        y:
          type: number
          format: double
          minimum: 0
          maximum: 1
        width:
          type: number
          format: double
          minimum: 0
          maximum: 1
        height:
          type: number
          format: double
          minimum: 0
          maximum: 1
      required:
        - x
        - y
        - width
        - height
    RegionAnchor:
      type: object
      description: |
        The universal geometric layer of an anchor (ADR-0009): a normalized
        rectangle on one surface. Always present — for an image it is the only
        layer.
      required:
        - surfaceIndex
        - box
      properties:
        surfaceIndex:
          type: integer
          minimum: 0
          description: Zero-based surface (page) index.
        box:
          $ref: '#/components/schemas/NormalizedBox'
    TextQuoteAnchor:
      type: object
      description: |
        The text-quote layer (ADR-0009), present when the surface has a text
        layer: the exact quoted text plus a little surrounding context, robust to
        reflow across versions.
      required:
        - quote
      properties:
        quote:
          type: string
          minLength: 1
          description: The exact quoted text.
        prefix:
          type: string
          description: A short slice of text immediately before the quote.
        suffix:
          type: string
          description: A short slice of text immediately after the quote.
    TextPositionAnchor:
      type: object
      description: |
        The text-position layer (ADR-0009): character offsets into the surface's
        canonical text. Fast but brittle — a tiebreaker only.
      required:
        - start
        - end
      properties:
        start:
          type: integer
          minimum: 0
          description: Inclusive start offset.
        end:
          type: integer
          minimum: 0
          description: Exclusive end offset.
    Anchor:
      type: object
      description: |
        A multi-layer annotation anchor (ADR-0009). `region` is always present;
        `textQuote` and `textPosition` are added when the surface has a text layer.
      required:
        - region
      properties:
        region:
          $ref: '#/components/schemas/RegionAnchor'
        textQuote:
          $ref: '#/components/schemas/TextQuoteAnchor'
        textPosition:
          $ref: '#/components/schemas/TextPositionAnchor'
    AnnotationStatus:
      type: string
      description: |
        The lifecycle of an annotation (ADR-0011 as amended by issue #405):
        raised by a reviewer, resolved by that same author once the concern is
        settled.
      enum:
        - OPEN
        - RESOLVED
    PlacementStatus:
      type: string
      description: |
        Where an annotation sits on a specific version (ADR-0009): PLACED when a
        human drew it or re-anchoring resolved it uniquely; MOVED when re-anchored
        with a change to review; ORPHANED when no confident match exists; PENDING
        while the async re-anchoring job runs; FAILED on an internal error.
      enum:
        - PENDING
        - PLACED
        - MOVED
        - ORPHANED
        - FAILED
    VisitResponse:
      type: object
      description: The caller's previous visit of the review (issue #307).
      properties:
        previousSeenAt:
          type: string
          format: date-time
          description: Absent on the first visit — nothing reads as new then.
    AnnotationType:
      type: string
      description: >-
        The optional kind of point an annotation raises (issue #392). Purely
        descriptive — it drives the tasks view's visual language and filtering,
        never the workflow.
      enum:
        - CHANGE
        - PROPOSAL
        - CONFLICT
        - QUESTION
        - RISK
    AnnotationPriority:
      type: string
      description: >-
        The optional urgency of an annotation (issue #392). Purely descriptive,
        never workflow-relevant.
      enum:
        - HIGH
        - MEDIUM
        - LOW
    AnnotationCreateRequest:
      type: object
      description: >-
        Create an annotation. With an anchor it is located on a region of the
        version and re-anchors across versions (ADR-0009); without an anchor it
        is document-scoped (issue #395) — a general remark valid on every
        version, never placed and never orphaned.
      required:
        - versionNumber
        - comment
      properties:
        versionNumber:
          type: integer
          minimum: 1
          description: >-
            The 1-based version the annotation is authored on. For a located
            annotation it is the version the region is drawn on; a document-scoped
            annotation carries no placement on it.
        anchor:
          $ref: '#/components/schemas/Anchor'
        comment:
          type: string
          minLength: 1
          maxLength: 20000
          description: >-
            The first comment seeding the discussion thread. Required — an
            annotation without text must not exist (issue #301); blank-only
            comments are rejected.
        type:
          $ref: '#/components/schemas/AnnotationType'
        priority:
          $ref: '#/components/schemas/AnnotationPriority'
    AnnotationClassificationRequest:
      type: object
      description: >-
        Replaces an annotation's classification wholesale (issue #392): the
        request body becomes the new classification, so an absent field clears
        that facet. Send both fields to keep both.
      properties:
        type:
          $ref: '#/components/schemas/AnnotationType'
        priority:
          $ref: '#/components/schemas/AnnotationPriority'
    ReactionGroup:
      type: object
      description: >-
        One grouped emoji reaction on an annotation or comment (issue #410):
        the chip's emoji, how many participants reacted with it, whether the
        caller is among them, and the reactors' display names (resolved
        server-side, honouring per-review anonymity, issue #413) in reaction
        order.
      required:
        - emoji
        - count
        - reactedByMe
        - reactors
      properties:
        emoji:
          type: string
        count:
          type: integer
        reactedByMe:
          type: boolean
        reactors:
          type: array
          items:
            type: string
    AnnotationView:
      type: object
      description: |
        An annotation with, when a version was requested, its placement on that
        version, the size of its comment thread and its reaction chips.
      required:
        - id
        - documentId
        - authorId
        - status
        - commentCount
        - reactions
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        documentId:
          type: string
          format: uuid
        authorId:
          type: string
          format: uuid
          description: >-
            The author's id. In an anonymous review (issue #413) this is a stable
            per-document pseudonym token for non-self, non-owner authors — never
            the real user id — so authorship cannot be correlated to the roster.
        authorDisplayName:
          type: string
          nullable: true
          description: >-
            The author's name, resolved server-side (issue #413). The real display
            name in a normal review (including authors who participate via a team);
            a stable "Participant N" pseudonym for foreign authors in an anonymous
            review. Null only for a since-removed user.
        status:
          $ref: '#/components/schemas/AnnotationStatus'
        type:
          $ref: '#/components/schemas/AnnotationType'
        priority:
          $ref: '#/components/schemas/AnnotationPriority'
        anchor:
          $ref: '#/components/schemas/Anchor'
        placementStatus:
          $ref: '#/components/schemas/PlacementStatus'
        firstComment:
          type: string
          description: >-
            Excerpt (first 300 characters) of the thread's opening comment —
            the annotation's de-facto title (issue #393).
        latestCommentFromOthersAt:
          type: string
          format: date-time
          description: >-
            Newest comment time by authors other than the caller (issue #307)
            — compared against the previous visit for the unseen markers.
            Absent when the thread holds only the caller's own comments.
        commentCount:
          type: integer
          description: Number of comments in the thread.
        reactions:
          type: array
          description: The annotation's grouped emoji reactions (issue #410).
          items:
            $ref: '#/components/schemas/ReactionGroup'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AnnotationListResponse:
      type: object
      required:
        - annotations
      properties:
        annotations:
          type: array
          items:
            $ref: '#/components/schemas/AnnotationView'
    AnnotationResolveRequest:
      type: object
      description: |
        Optional closing note for a resolution (issue #405) — appended to the
        annotation's thread as a regular comment authored by the resolver.
      properties:
        note:
          type: string
          maxLength: 20000
    CommentCreateRequest:
      type: object
      required:
        - body
      properties:
        body:
          type: string
          minLength: 1
          maxLength: 20000
    CommentView:
      type: object
      required:
        - id
        - annotationId
        - authorId
        - body
        - reactions
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        annotationId:
          type: string
          format: uuid
        authorId:
          type: string
          format: uuid
          description: >-
            The author's id — a stable per-document pseudonym token for foreign
            authors in an anonymous review (issue #413), never the real user id.
        authorDisplayName:
          type: string
          nullable: true
          description: >-
            The author's name, resolved server-side (issue #413): the real display
            name in a normal review, a stable "Participant N" pseudonym for foreign
            authors in an anonymous review. Null only for a since-removed user.
        body:
          type: string
        reactions:
          type: array
          description: The comment's grouped emoji reactions (issue #410).
          items:
            $ref: '#/components/schemas/ReactionGroup'
        createdAt:
          type: string
          format: date-time
    CommentListResponse:
      type: object
      required:
        - comments
      properties:
        comments:
          type: array
          items:
            $ref: '#/components/schemas/CommentView'
    DiffChangeType:
      type: string
      description: The kind of a change, in the `from → to` direction (ADR-0034).
      enum:
        - INSERTED
        - DELETED
        - CHANGED
    DiffLocation:
      type: object
      description: >-
        One highlighted rectangle of a change — the box of the affected text on
        a surface, cut to the changed characters within its run.
      required:
        - surfaceIndex
        - box
      properties:
        surfaceIndex:
          type: integer
          minimum: 0
          description: Zero-based surface (page) index.
        box:
          $ref: '#/components/schemas/NormalizedBox'
    DiffChange:
      type: object
      description: |
        One contiguous change. `fromText`/`fromLocations` describe the affected
        content of the baseline version (empty for INSERTED); `toText`/
        `toLocations` the newer version's (empty for DELETED).
      required:
        - type
        - fromText
        - fromLocations
        - toText
        - toLocations
      properties:
        type:
          $ref: '#/components/schemas/DiffChangeType'
        fromText:
          type: string
          description: The affected text in the baseline version ('' for INSERTED).
        fromLocations:
          type: array
          description: Boxes of the affected text in the baseline version.
          items:
            $ref: '#/components/schemas/DiffLocation'
        toText:
          type: string
          description: The affected text in the newer version ('' for DELETED).
        toLocations:
          type: array
          description: Boxes of the affected text in the newer version.
          items:
            $ref: '#/components/schemas/DiffLocation'
    VersionDiffResponse:
      type: object
      description: The located changes between two immutable versions (ADR-0034).
      required:
        - fromVersion
        - toVersion
        - changes
      properties:
        fromVersion:
          type: integer
          description: The 1-based baseline version number.
        toVersion:
          type: integer
          description: The 1-based newer version number.
        changes:
          type: array
          description: All changes in document order; empty when the texts are identical.
          items:
            $ref: '#/components/schemas/DiffChange'
