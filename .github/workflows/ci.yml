# SPDX-License-Identifier: AGPL-3.0-only
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (build + ArchUnit + Spotless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
      # `build` runs spotlessCheck (formatting + SPDX header) and the ArchUnit
      # conformance tests via the `check` task.
      - run: ./gradlew build --stacktrace

  qnop-ui:
    name: Frontend (lint + format + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qnop-ui
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          # action runs from the repo root; read the pnpm version from qnop-ui/
          package_json_file: qnop-ui/package.json
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: qnop-ui/pnpm-lock.yaml
      # The typescript-axios client is generated from the backend openapi.yaml
      # by openapi-generator-cli, which runs the generator JAR — hence a JDK.
      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: temurin
          java-version: '21'
      - run: pnpm install --frozen-lockfile
      # Generate the API client up front so lint/test/build see it (build also
      # regenerates it via its own script; this keeps test:run self-sufficient).
      - run: pnpm generate:api
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm test:run
      - run: pnpm build

  license-headers:
    name: License headers (SPDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # ADR-0007: every Java / Kotlin-DSL source file must declare an SPDX
      # identifier. A full dependency-license scanner is added in a later phase
      # (tracked in ADR-0007) once real dependencies exist.
      - name: Verify SPDX identifiers
        run: |
          missing=0
          while IFS= read -r f; do
            if ! grep -q "SPDX-License-Identifier" "$f"; then
              echo "::error file=$f::missing SPDX-License-Identifier"
              missing=1
            fi
          done < <(find . -type f \( -name '*.java' -o -name '*.kts' \) \
                   -not -path './**/build/*' -not -path './.gradle/*')
          exit $missing
