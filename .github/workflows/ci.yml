# SPDX-License-Identifier: AGPL-3.0-only
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (build + ArchUnit + Spotless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
      # `build` runs spotlessCheck (formatting + SPDX header) and the ArchUnit
      # conformance tests via the `check` task.
      - run: ./gradlew build --stacktrace

  qnop-ui:
    name: Frontend (lint + format + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qnop-ui
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          # action runs from the repo root; read the pnpm version from qnop-ui/
          package_json_file: qnop-ui/package.json
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: qnop-ui/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm build

  license-headers:
    name: License headers (SPDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # ADR-0007: every Java / Kotlin-DSL source file must declare an SPDX
      # identifier. A full dependency-license scanner is added in a later phase
      # (tracked in ADR-0007) once real dependencies exist.
      - name: Verify SPDX identifiers
        run: |
          missing=0
          while IFS= read -r f; do
            if ! grep -q "SPDX-License-Identifier" "$f"; then
              echo "::error file=$f::missing SPDX-License-Identifier"
              missing=1
            fi
          done < <(find . -type f \( -name '*.java' -o -name '*.kts' \) \
                   -not -path './**/build/*' -not -path './.gradle/*')
          exit $missing
