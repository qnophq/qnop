# SPDX-License-Identifier: AGPL-3.0-only
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (build + ArchUnit + Spotless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
      # `build` runs spotlessCheck (formatting + SPDX header) and the ArchUnit
      # conformance tests via the `check` task.
      - run: ./gradlew build --stacktrace

  backend-audit:
    name: Backend dependency audit (OWASP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
      # Per-PR backend CVE gate (#195): OWASP Dependency-Check fails on CVSS >= 7.
      # It needs a (free) NVD API key to hit the NVD feed without heavy rate-limiting,
      # so the step is a no-op until the NVD_API_KEY repository secret is set — then it
      # becomes an active gate. NVD_API_KEY is read from the env (never the CLI).
      - name: OWASP Dependency-Check (aggregate)
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          if [ -z "$NVD_API_KEY" ]; then
            echo "::notice::NVD_API_KEY secret not set — skipping the OWASP backend audit. Request a free key at https://nvd.nist.gov/developers/request-an-api-key and add it as the NVD_API_KEY secret to enable the per-PR backend CVE gate."
            exit 0
          fi
          ./gradlew dependencyCheckAggregate --stacktrace

  license-scan:
    name: Backend dependency licenses (ADR-0007)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
      # ADR-0007 / issue #498: the dependency-license gate promised once real
      # dependencies landed. `checkLicense` fails on any shipped (runtimeClasspath)
      # dependency whose license is outside the permissive allowlist in
      # config/allowed-licenses.json (Apache-2.0/MIT/BSD/MPL-2.0 + reviewed per-module
      # exceptions). The jk1 plugin resolves cross-module configurations at execution
      # time, which is incompatible with the repo's configuration cache and parallel
      # execution — so both are disabled for this task only; other jobs are unaffected.
      - name: Check dependency licenses
        run: ./gradlew checkLicense --no-configuration-cache --no-parallel --stacktrace

  qnop-ui:
    name: Frontend (lint + format + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qnop-ui
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          # action runs from the repo root; read the pnpm version from qnop-ui/
          package_json_file: qnop-ui/package.json
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: qnop-ui/pnpm-lock.yaml
      # The typescript-axios client is generated from the backend openapi.yaml
      # by openapi-generator-cli, which runs the generator JAR — hence a JDK.
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: '21'
      - run: pnpm install --frozen-lockfile
      # Per-PR vulnerability gate (#195): fail on a high/critical advisory in the
      # frontend dependency tree, independent of Renovate's scheduled runs.
      - run: pnpm audit --audit-level high
      # Generate the API client up front so lint/test/build see it (build also
      # regenerates it via its own script; this keeps test:run self-sufficient).
      - run: pnpm generate:api
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm test:run
      - run: pnpm build

  smoke:
    name: Smoke (docker-compose deploy + testdata)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # Build the backend image and bring up PostgreSQL + the server, then run
      # the smoke script: wait for /actuator/health, seed testdata/db/seed.sql
      # into the running database, and exercise the base API over HTTP (#207).
      - name: Build and start the test-deployment stack
        run: docker compose -f docker-compose.smoke.yml up -d --build
      - name: Run smoke tests
        run: bash scripts/smoke-test.sh
      # OIDC login smoke test (#225): a sidecar that shares the app's network
      # namespace drives the full authorization-code flow against the bundled
      # Keycloak. Runs after the basic smoke (which seeds the database).
      - name: Run OIDC login smoke test
        run: docker compose -f docker-compose.smoke.yml run --rm smoke-oidc
      - name: Dump container logs on failure
        if: failure()
        run: docker compose -f docker-compose.smoke.yml logs --no-color
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.smoke.yml down -v

  # Every green CI run on main publishes the current state as a snapshot
  # container image (ADR-0040): the moving `main` tag plus an immutable
  # `sha-*` tag on ghcr.io/qnophq/qnop-ce. `latest` and semver tags remain
  # reserved for tag-driven releases (release.yml). Same build recipe as the
  # release: boot jar with the embedded SPA, copied into the runtime image.
  snapshot-image:
    name: Snapshot image (main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend, qnop-ui, smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          package_json_file: qnop-ui/package.json
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: qnop-ui/pnpm-lock.yaml
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
      - name: Build boot jar with embedded SPA
        run: |
          ./gradlew --no-daemon -x test :qnop-app:bootJar -PembedUi
          JAR="$(ls qnop-app/build/libs/*.jar | grep -v -- '-plain' | grep -v -- '-sources')"
          # The image build context contains exactly one file: the jar.
          mkdir -p deploy/context
          cp "$JAR" deploy/context/app.jar
          unzip -l deploy/context/app.jar | grep -q 'BOOT-INF/classes/static/index.html' \
            || { echo "::error::SPA bundle missing from the boot jar"; exit 1; }
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: |
            ghcr.io/qnophq/qnop-ce
          tags: |
            type=ref,event=branch
            type=sha
          flavor: |
            latest=false
          labels: |
            org.opencontainers.image.title=qnop-ce
            org.opencontainers.image.description=Qualified Notes on Papers — enterprise document review (Community edition, API + embedded web UI). Snapshot build of main.
            org.opencontainers.image.source=https://github.com/qnophq/qnop
            org.opencontainers.image.licenses=AGPL-3.0-only
      - name: Build and push image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: deploy/context
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  license-headers:
    name: License headers (SPDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # ADR-0007: every Java / Kotlin-DSL source file must declare an SPDX
      # identifier. A full dependency-license scanner is added in a later phase
      # (tracked in ADR-0007) once real dependencies exist.
      - name: Verify SPDX identifiers
        run: |
          missing=0
          while IFS= read -r f; do
            if ! grep -q "SPDX-License-Identifier" "$f"; then
              echo "::error file=$f::missing SPDX-License-Identifier"
              missing=1
            fi
          done < <(find . -type f \( -name '*.java' -o -name '*.kts' \) \
                   -not -path './**/build/*' -not -path './.gradle/*')
          exit $missing
