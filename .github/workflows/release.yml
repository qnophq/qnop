# SPDX-License-Identifier: AGPL-3.0-only
#
# Tag-triggered release (ADR-0040): builds the boot jar WITH the embedded
# qnop-ui SPA, publishes a multi-arch image to GHCR, and creates the GitHub
# Release with generated notes. Tests deliberately do not run here — ci.yml
# gates every commit on main; a tag releases exactly what main already proved.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build, publish image, create release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Validate tag against VERSION
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" == *-SNAPSHOT ]]; then
            echo "::error::SNAPSHOT versions must not be released: $VERSION"
            exit 1
          fi
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          if [[ "$FILE_VERSION" != "$VERSION" ]]; then
            echo "::error::Tag v${VERSION} does not match VERSION file (${FILE_VERSION}) — tag the commit prepare-release.yml created"
            exit 1
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 21

      - name: Set up pnpm
        uses: pnpm/action-setup@41ea72cf2eb6e0f26571f65a67f8bc2ada6d9139 # v4.2.0
        with:
          package_json_file: qnop-ui/package.json

      - name: Set up Node 24
        uses: actions/setup-node@f9d3ae3d38e7dda401ce2aa11a67b40df4e5faaa # v6.0.1
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: qnop-ui/pnpm-lock.yaml

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6.1.1

      - name: Build boot jar with embedded SPA
        run: |
          ./gradlew --no-daemon -x test :qnop-app:bootJar -PembedUi
          JAR="$(ls qnop-app/build/libs/*.jar | grep -v -- '-plain' | grep -v -- '-sources')"
          # The image build context contains exactly one file: the jar.
          mkdir -p deploy/context
          cp "$JAR" deploy/context/app.jar
          unzip -l deploy/context/app.jar | grep -q 'BOOT-INF/classes/static/index.html' \
            || { echo "::error::SPA bundle missing from the boot jar"; exit 1; }
          ls -lh deploy/context/app.jar

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      # Docker Hub is opt-in until the org is set up: with the two secrets
      # configured, the image is published to docker.io/qnophq/qnop-ce alongside
      # GHCR (plugwerk-style dual push); without them the release stays
      # GHCR-only and says so instead of failing.
      - name: Check Docker Hub credentials
        id: dockerhub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "image=docker.io/qnophq/qnop-ce" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "image=" >> "$GITHUB_OUTPUT"
            echo "::notice::DOCKERHUB_USERNAME/DOCKERHUB_TOKEN secrets not set — publishing to GHCR only. Configure them to also publish docker.io/qnophq/qnop-ce."
          fi

      - name: Log in to Docker Hub
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          # metadata-action ignores the empty entry when Docker Hub is off.
          images: |
            ghcr.io/qnophq/qnop-ce
            ${{ steps.dockerhub.outputs.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          flavor: |
            latest=auto
          labels: |
            org.opencontainers.image.title=qnop-ce
            org.opencontainers.image.description=Qualified Notes on Papers — enterprise document review (Community edition, API + embedded web UI).
            org.opencontainers.image.source=https://github.com/qnophq/qnop
            org.opencontainers.image.licenses=AGPL-3.0-only

      - name: Build and push image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: deploy/context
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sync Docker Hub README
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: qnophq/qnop-ce
          short-description: Qualified Notes on Papers — enterprise document review (Community edition)
          readme-filepath: ./deploy/dockerhub-readme.md

      - name: Create GitHub Release
        # Exactly one creator of the GitHub Release: this step (plugwerk
        # learned that the hard way — see the comment in its release.yml).
        # The tag name reaches the shell via $GITHUB_REF_NAME (env), never via
        # inline expression interpolation.
        run: |
          TAG="$GITHUB_REF_NAME"
          echo "📦 Creating GitHub Release $TAG..."
          gh release create "$TAG" --title "$TAG" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach boot jar to the release
        run: |
          TAG="$GITHUB_REF_NAME"
          VERSION="${GITHUB_REF_NAME#v}"
          cp deploy/context/app.jar "qnop-${VERSION}.jar"
          gh release upload "$TAG" "qnop-${VERSION}.jar" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
