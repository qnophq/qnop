#
# Base application config for the qnop Community server (ADR-0020).
# The datasource reads the same POSTGRES_* variables that docker-compose uses
# (see .env.example), so a single .env drives both the DB container and the app.
# Defaults target the local docker-compose Postgres; production overrides via the
# environment (POSTGRES_* or the standard SPRING_DATASOURCE_* keys).
spring:
  application:
    name: qnop
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:qnop}
    username: ${POSTGRES_USER:qnop}
    password: ${POSTGRES_PASSWORD:qnop}
  jpa:
    # Liquibase owns the schema; Hibernate never alters it.
    hibernate:
      ddl-auto: none
    open-in-view: false
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
