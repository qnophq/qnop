# Base application config for the qnop Community server (ADR-0020).
# All qnop environment variables are QNOP_-prefixed (see .env.example);
# docker-compose maps the same QNOP_DB_* onto the image-mandated POSTGRES_*, so a
# single .env drives both the DB container and the app. Defaults target the local
# docker-compose Postgres; production may override with the standard
# SPRING_DATASOURCE_* keys.
spring:
  application:
    name: qnop
  datasource:
    url: jdbc:postgresql://${QNOP_DB_HOST:localhost}:${QNOP_DB_PORT:5432}/${QNOP_DB_NAME:qnop}
    username: ${QNOP_DB_USERNAME:qnop}
    password: ${QNOP_DB_PASSWORD:qnop}
  jpa:
    # Liquibase owns the schema; Hibernate never alters it.
    hibernate:
      ddl-auto: none
    open-in-view: false
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml

# qnop application secrets. No defaults: a missing/insecure key fails the context
# fast (see EncryptionConfig). Set via env QNOP_AUTH_* in real deployments.
qnop:
  auth:
    encryption-key: ${QNOP_AUTH_ENCRYPTION_KEY:}
    encryption-salt: ${QNOP_AUTH_ENCRYPTION_SALT:}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
