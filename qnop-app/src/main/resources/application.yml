#
# Base application config for the qnop Community server (ADR-0020).
# All qnop environment variables are QNOP_-prefixed (see .env.example);
# docker-compose maps the same QNOP_DB_* onto the image-mandated POSTGRES_*, so a
# single .env drives both the DB container and the app. Defaults target the local
# docker-compose Postgres; production may override with the standard
# SPRING_DATASOURCE_* keys.
spring:
  application:
    name: qnop
  jackson:
    datatype:
      datetime:
        # Timestamp L10n policy (issue #465, ADR-0039): every java.time value serializes as an
        # ISO-8601 string with an explicit offset (Instant → ...Z), never epoch millis. This is
        # the Jackson 3 default, pinned here so a future dependency bump cannot silently flip it.
        # In Jackson 3 WRITE_DATES_AS_TIMESTAMPS is a DateTimeFeature (not SerializationFeature),
        # bound by Spring Boot 4 under spring.jackson.datatype.datetime; the key must be the exact
        # enum constant (relaxed kebab-case binding does not apply to tools.jackson enum keys).
        WRITE_DATES_AS_TIMESTAMPS: false
  datasource:
    url: jdbc:postgresql://${QNOP_DB_HOST:localhost}:${QNOP_DB_PORT:5432}/${QNOP_DB_NAME:qnop}
    username: ${QNOP_DB_USERNAME:qnop}
    password: ${QNOP_DB_PASSWORD:qnop}
  jpa:
    # Liquibase owns the schema; Hibernate never alters it.
    hibernate:
      ddl-auto: none
    open-in-view: false
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
  servlet:
    multipart:
      # Headroom over the largest service-level cap — the document upload setting
      # (upload.max_file_size_mb, default 25 MB; issue #245) — so the size checks in
      # AvatarService/BrandingService/DocumentIngestService return a clean 413 before
      # the container rejects the request. Operators raising the document setting past
      # this ceiling must raise QNOP_UPLOAD_MULTIPART_LIMIT_MB with it. Multipart
      # uploads stream to a temp file, not the heap, so a generous ceiling is safe.
      max-file-size: ${QNOP_UPLOAD_MULTIPART_LIMIT_MB:55}MB
      max-request-size: ${QNOP_UPLOAD_MULTIPART_LIMIT_MB:55}MB
  mvc:
    async:
      # Cap async request handling so a stalled async dispatch cannot pin request
      # resources indefinitely (issue #342).
      request-timeout: ${QNOP_HTTP_REQUEST_TIMEOUT:30s}

# Inbound request timeouts (issue #342): bound how long the connector waits on a
# slow/stalled client so a worker thread is never held open forever.
server:
  tomcat:
    connection-timeout: ${QNOP_HTTP_CONNECTION_TIMEOUT:20s}
    # Reap idle keep-alive connections rather than holding a thread per socket.
    keep-alive-timeout: ${QNOP_HTTP_KEEP_ALIVE_TIMEOUT:20s}

management:
  endpoints:
    web:
      exposure:
        # health is public (probes); prometheus is admin-only (SecurityConfiguration), scraped by
        # an ops Prometheus with an admin token (issue #348, ADR-0013).
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      # Anonymous callers (k8s probes) see only UP/DOWN; the job-queue counts and staleness
      # details are revealed only to an authenticated admin.
      show-details: when_authorized

# Security & crypto foundation (issue #10, ADR-0022). Secrets come from the
# QNOP_AUTH_* environment namespace — no secure default is baked in; the
# placeholder below trips @ValidSecret so a deployment that forgot to set real
# values refuses to start. CORS origins gate SPA / front-end access.
qnop:
  auth:
    jwt-secret: ${QNOP_AUTH_JWT_SECRET:CHANGE_ME}
    encryption-key: ${QNOP_AUTH_ENCRYPTION_KEY:CHANGE_ME}
    encryption-salt: ${QNOP_AUTH_ENCRYPTION_SALT:CHANGE_ME}
    # OIDC discovery against a private/loopback issuer (e.g. a local Keycloak on
    # http://localhost) is blocked by default as an SSRF guard (issue #21). The
    # local-dev .env turns this on so the bundled Keycloak works out of the box.
    # NEVER enable in production.
    oidc:
      allow-private-discovery-uris: ${QNOP_AUTH_OIDC_ALLOW_PRIVATE_DISCOVERY_URIS:false}
      # Post-OIDC-login redirect base (issue #178). Blank → same-origin relative redirects
      # (SPA served from the API origin). Set to the SPA's absolute origin when hosted
      # separately. Independent of CORS allowed-origins.
      frontend-base-url: ${QNOP_AUTH_OIDC_FRONTEND_BASE_URL:}
  cors:
    allowed-origins: ${QNOP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  # Outbound HTTP timeouts (issue #342). `outbound-*` bound the GitHub email fetch
  # (OIDC login) and, as JDK HttpURLConnection defaults, the OIDC issuer discovery
  # and JWK-set fetches; `smtp-*` bound the outgoing-mail transport. All are
  # durations (e.g. 5s, 500ms, PT2S) and overridable via the QNOP_HTTP_CLIENT_* env.
  http-client:
    outbound-connect-timeout: ${QNOP_HTTP_CLIENT_OUTBOUND_CONNECT_TIMEOUT:5s}
    outbound-read-timeout: ${QNOP_HTTP_CLIENT_OUTBOUND_READ_TIMEOUT:15s}
    smtp-connect-timeout: ${QNOP_HTTP_CLIENT_SMTP_CONNECT_TIMEOUT:10s}
    smtp-read-timeout: ${QNOP_HTTP_CLIENT_SMTP_READ_TIMEOUT:30s}
    smtp-write-timeout: ${QNOP_HTTP_CLIENT_SMTP_WRITE_TIMEOUT:30s}
  # Re-anchoring cascade tunables (ADR-0009, issue #320). Advanced; the conservative
  # defaults live in ReanchoringProperties. Override per key via QNOP_REANCHORING_*:
  #   *_SIMILARITY_THRESHOLD (0.75), *_AMBIGUITY_MARGIN (0.05), *_CONTEXT_LENGTH (32),
  #   *_MAX_CANDIDATES (64), *_QUOTE_WEIGHT (0.7), *_CONTEXT_WEIGHT (0.3)
  # Object storage for binary documents (issue #243, ADR-0005). Defaults target the
  # docker-compose MinIO; leave `endpoint` blank to target real AWS S3 (SaaS). The
  # access/secret keys are storage credentials, not crypto secrets, so short local
  # MinIO values are fine. `auto-create-bucket` is on for local dev / an empty MinIO;
  # real S3 buckets are pre-provisioned, so set it false in production.
  s3:
    endpoint: ${QNOP_S3_ENDPOINT:}
    region: ${QNOP_S3_REGION:us-east-1}
    bucket: ${QNOP_S3_BUCKET:qnop-documents}
    access-key: ${QNOP_S3_ACCESS_KEY:qnop}
    secret-key: ${QNOP_S3_SECRET_KEY:qnop_secret}
    path-style-access: ${QNOP_S3_PATH_STYLE_ACCESS:true}
    auto-create-bucket: ${QNOP_S3_AUTO_CREATE_BUCKET:false}
    reaper-grace-period: ${QNOP_S3_REAPER_GRACE_PERIOD:PT1H}
    reaper-cron: ${QNOP_S3_REAPER_CRON:0 30 3 * * *}
