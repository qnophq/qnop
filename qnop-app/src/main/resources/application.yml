#
# Base application config for the qnop Community server (ADR-0020).
# All qnop environment variables are QNOP_-prefixed (see .env.example);
# docker-compose maps the same QNOP_DB_* onto the image-mandated POSTGRES_*, so a
# single .env drives both the DB container and the app. Defaults target the local
# docker-compose Postgres; production may override with the standard
# SPRING_DATASOURCE_* keys.
spring:
  application:
    name: qnop
  datasource:
    url: jdbc:postgresql://${QNOP_DB_HOST:localhost}:${QNOP_DB_PORT:5432}/${QNOP_DB_NAME:qnop}
    username: ${QNOP_DB_USERNAME:qnop}
    password: ${QNOP_DB_PASSWORD:qnop}
  jpa:
    # Liquibase owns the schema; Hibernate never alters it.
    hibernate:
      ddl-auto: none
    open-in-view: false
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
  servlet:
    multipart:
      # Headroom over the 1 MiB avatar cap (AvatarLimits) so the service-level
      # size check returns a clean 413 before the container rejects the request.
      max-file-size: 2MB
      max-request-size: 4MB

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

# Security & crypto foundation (issue #10, ADR-0022). Secrets come from the
# QNOP_AUTH_* environment namespace — no secure default is baked in; the
# placeholder below trips @ValidSecret so a deployment that forgot to set real
# values refuses to start. CORS origins gate SPA / front-end access.
qnop:
  auth:
    jwt-secret: ${QNOP_AUTH_JWT_SECRET:CHANGE_ME}
    encryption-key: ${QNOP_AUTH_ENCRYPTION_KEY:CHANGE_ME}
    encryption-salt: ${QNOP_AUTH_ENCRYPTION_SALT:CHANGE_ME}
    # OIDC discovery against a private/loopback issuer (e.g. a local Keycloak on
    # http://localhost) is blocked by default as an SSRF guard (issue #21). The
    # local-dev .env turns this on so the bundled Keycloak works out of the box.
    # NEVER enable in production.
    oidc:
      allow-private-discovery-uris: ${QNOP_AUTH_OIDC_ALLOW_PRIVATE_DISCOVERY_URIS:false}
      # Post-OIDC-login redirect base (issue #178). Blank → same-origin relative redirects
      # (SPA served from the API origin). Set to the SPA's absolute origin when hosted
      # separately. Independent of CORS allowed-origins.
      frontend-base-url: ${QNOP_AUTH_OIDC_FRONTEND_BASE_URL:}
  cors:
    allowed-origins: ${QNOP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  # Object storage for binary documents (issue #243, ADR-0005). Defaults target the
  # docker-compose MinIO; leave `endpoint` blank to target real AWS S3 (SaaS). The
  # access/secret keys are storage credentials, not crypto secrets, so short local
  # MinIO values are fine. `auto-create-bucket` is on for local dev / an empty MinIO;
  # real S3 buckets are pre-provisioned, so set it false in production.
  s3:
    endpoint: ${QNOP_S3_ENDPOINT:}
    region: ${QNOP_S3_REGION:us-east-1}
    bucket: ${QNOP_S3_BUCKET:qnop-documents}
    access-key: ${QNOP_S3_ACCESS_KEY:qnop}
    secret-key: ${QNOP_S3_SECRET_KEY:qnop_secret}
    path-style-access: ${QNOP_S3_PATH_STYLE_ACCESS:true}
    auto-create-bucket: ${QNOP_S3_AUTO_CREATE_BUCKET:false}
    reaper-grace-period: ${QNOP_S3_REAPER_GRACE_PERIOD:PT1H}
    reaper-cron: ${QNOP_S3_REAPER_CRON:0 30 3 * * *}
