# SPDX-License-Identifier: AGPL-3.0-only
#
# Test-deployment stack for the CI smoke tests (issues #207, #225, #308): a
# standalone PostgreSQL, a MinIO object store, the qnop server built from the repo
# Dockerfile, and a Keycloak identity provider for the OIDC login smoke test. This
# is NOT a production or local-dev stack — the QNOP_AUTH_* values below are
# throwaway test secrets that intentionally match the encryption key/salt used to
# produce testdata/db/seed.sql, so the seeded rows (e.g. the OIDC client secret)
# stay decryptable. MinIO backs the document-ingest smoke (#308): the server writes
# uploads there, the scheduled extraction job reads them back, and the smoke asserts
# the rendered representation and byte-identical original.
#
# Usage:  docker compose -f docker-compose.smoke.yml up -d --build
#         bash scripts/smoke-test.sh
#         docker compose -f docker-compose.smoke.yml run --rm smoke-oidc
#         docker compose -f docker-compose.smoke.yml down -v

services:
  postgres:
    image: postgres:18@sha256:22c89fe0d0f507606260237fd55e51f6137f58b2d5bcf6152242b96d9fe8f9a4
    environment:
      POSTGRES_USER: qnop
      POSTGRES_PASSWORD: qnop
      POSTGRES_DB: qnop
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U qnop -d qnop']
      interval: 5s
      timeout: 5s
      retries: 20

  # Object storage for binary documents (issue #243, ADR-0005). The app writes
  # uploads here and the extraction job reads them back; `auto-create-bucket` on
  # the app side provisions the bucket on first use, so no init job is needed.
  minio:
    image: minio/minio:latest@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: server /data
    environment:
      MINIO_ROOT_USER: qnop
      MINIO_ROOT_PASSWORD: qnop_secret
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      QNOP_DB_HOST: postgres
      QNOP_DB_PORT: '5432'
      QNOP_DB_NAME: qnop
      QNOP_DB_USERNAME: qnop
      QNOP_DB_PASSWORD: qnop
      # Object storage (issue #308): point at the MinIO service and let the app
      # create the bucket on first use — the deployed ingest → extraction → serve
      # path runs against real S3-compatible storage in the smoke.
      QNOP_S3_ENDPOINT: http://minio:9000
      QNOP_S3_BUCKET: qnop-documents
      QNOP_S3_ACCESS_KEY: qnop
      QNOP_S3_SECRET_KEY: qnop_secret
      QNOP_S3_PATH_STYLE_ACCESS: 'true'
      QNOP_S3_AUTO_CREATE_BUCKET: 'true'
      # Test-only secrets — must match testdata/db/seed.sql's encryption inputs.
      QNOP_AUTH_JWT_SECRET: integration-test-jwt-secret-0123456789
      QNOP_AUTH_ENCRYPTION_KEY: integration-test-encryption-key-0123456789
      QNOP_AUTH_ENCRYPTION_SALT: 0123456789abcdef0123456789abcdef
      QNOP_CORS_ALLOWED_ORIGINS: http://localhost:5173
      # Post-OIDC-login redirect base (issue #178): a dedicated, CORS-independent
      # setting. The smoke simulates an SPA on a separate origin, and smoke-oidc.sh
      # asserts the redirect targets it; without this the default is blank, which
      # redirects to the API root (http://localhost:8080/) and fails the check.
      QNOP_AUTH_OIDC_FRONTEND_BASE_URL: http://localhost:5173
      # The Keycloak issuer is a private/container host; the SSRF guard blocks
      # discovery against it unless explicitly allowed (test deployment only).
      QNOP_AUTH_OIDC_ALLOW_PRIVATE_DISCOVERY_URIS: 'true'
      # The smoke deployment serves plain HTTP, so the refresh cookie must not be
      # Secure-only (otherwise it could not be replayed over http in a test).
      QNOP_AUTH_COOKIE_SECURE: 'false'
    ports:
      - '8080:8080'

  # Local OIDC provider for the login smoke test (issue #225). Imports the same
  # realm shipped for local dev (realm `qnop`, confidential client `qnop-local`,
  # users alice/bob). No host port is published — the app reaches it on the
  # compose network as http://keycloak:8080 and the smoke-oidc sidecar shares the
  # app's network namespace, so both use that single issuer hostname.
  keycloak:
    image: quay.io/keycloak/keycloak:26.6@sha256:0aae0de7fca85525f727d3354df17896092de8bb26ae4c12d89c77e5df8cbce4
    command: ['start-dev', '--import-realm']
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: 'true'
    volumes:
      - ./docker/keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200'",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # OIDC login smoke runner (issue #225). Runs on demand:
  #   docker compose -f docker-compose.smoke.yml run --rm smoke-oidc
  # It shares the app's network namespace so `localhost:8080` is the app (an
  # already-whitelisted redirect host in the realm) and `keycloak:8080` resolves
  # the same way the app sees it — keeping the OIDC issuer consistent across the
  # back-channel (app↔Keycloak) and front-channel (curl↔Keycloak) without editing
  # the dev realm. Requires the database to have been seeded first (smoke-test.sh).
  smoke-oidc:
    # Tag-only (no digest): a throwaway test runner; Renovate pins the digest.
    image: alpine:3.24@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b
    profiles: ['oidc']
    network_mode: 'service:app'
    depends_on:
      app:
        condition: service_started
      keycloak:
        condition: service_healthy
    volumes:
      - .:/work:ro
    working_dir: /work
    entrypoint:
      ['sh', '-c', 'apk add --no-cache bash curl jq >/dev/null && exec bash scripts/smoke-oidc.sh']
