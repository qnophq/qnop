#
# Liquibase master changelog (ADR-0020). Liquibase owns the schema; JPA runs
# with ddl-auto=none. Real schema changesets land under
# db/changelog/migrations/ and are wired in here as they are added (issue #11+).
databaseChangeLog:
  - changeSet:
      id: 0000-baseline
      author: qnop
      comment: Baseline tag for a fresh database; no schema objects yet.
      changes:
        - tagDatabase:
            tag: baseline
  - include:
      file: migrations/0001-identity-schema.yaml
      relativeToChangelogFile: true
  - include:
      file: migrations/0002-settings-schema.yaml
      relativeToChangelogFile: true
  - include:
      file: migrations/0003-mail-template-schema.yaml
      relativeToChangelogFile: true
  - include:
      file: migrations/0004-token-schema.yaml
      relativeToChangelogFile: true
  - include:
      file: migrations/0005-application-asset-schema.yaml
      relativeToChangelogFile: true
  - include:
      file: migrations/0006-shedlock-schema.yaml
      relativeToChangelogFile: true
  - include:
      file: migrations/0007-review-hardening.yaml
      relativeToChangelogFile: true
  - include:
      file: migrations/0008-team-schema.yaml
      relativeToChangelogFile: true
  - include:
      file: migrations/0009-user-avatar-schema.yaml
      relativeToChangelogFile: true
  - include:
      file: migrations/0010-job-queue-schema.yaml
      relativeToChangelogFile: true
  - include:
      file: migrations/0011-document-review-schema.yaml
      relativeToChangelogFile: true
  - include:
      file: migrations/0012-storage-object-schema.yaml
      relativeToChangelogFile: true
  - include:
      file: migrations/0013-version-diff-schema.yaml
      relativeToChangelogFile: true
  - include:
      file: migrations/0014-document-attachment-schema.yaml
      relativeToChangelogFile: true
  - include:
      file: migrations/0015-reaction-schema.yaml
      relativeToChangelogFile: true
  - include:
      file: migrations/0016-audit-scope-schema.yaml
      relativeToChangelogFile: true
  - include:
      file: migrations/0017-scheduler-job-schema.yaml
      relativeToChangelogFile: true
  - include:
      file: migrations/0018-free-reattach-setting.yaml
      relativeToChangelogFile: true
  - include:
      file: migrations/0019-finalize-with-open-setting.yaml
      relativeToChangelogFile: true
  - include:
      file: migrations/0020-annotation-dismissed-status.yaml
      relativeToChangelogFile: true
  # Enterprise schema seam (issue #254, ADR-0039): a separately-licensed module
  # (ADR-0002) contributes its changelogs under db/changelog/enterprise/ on its
  # OWN classpath entry; without enterprise JARs this is a no-op. Enterprise
  # changesets are namespaced e####-<feature>-*.yaml (author qnop-enterprise),
  # never colliding with community ####-* ids, and run AFTER all community
  # migrations in filename order.
  - includeAll:
      path: classpath*:db/changelog/enterprise/
      errorIfMissingOrEmpty: false
