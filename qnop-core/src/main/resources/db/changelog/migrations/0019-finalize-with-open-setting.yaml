# Seed row for the finalize-with-open-annotations switch (issue #568).
# Additive changeset (post-1.0.0 rule); the registry (ApplicationSettingKey)
# stays authoritative per ADR-0025 and this row mirrors its default.
databaseChangeLog:
  - changeSet:
      id: 0019-finalize-with-open-setting
      author: qnop
      comment: Adds the review.finalize_with_open_annotations application setting (issue #568), default off.
      changes:
        - insert:
            tableName: application_setting
            columns:
              - column: { name: setting_key, value: "review.finalize_with_open_annotations" }
              - column: { name: setting_value, value: "false" }
              - column: { name: setting_desc, value: "Let the review be finalized while annotations are still open; they are closed automatically with a standard comment." }
              - column: { name: value_type, value: "BOOLEAN" }
