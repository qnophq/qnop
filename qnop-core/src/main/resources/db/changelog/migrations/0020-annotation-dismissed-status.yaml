# Widens the annotation-status closed set for the DISMISSED terminal status
# (issue #408, ADR-0011 amendment). Additive changeset (post-1.0.0 rule); a
# Postgres CHECK cannot be altered in place, so drop-and-re-add is the
# convention for closed-set columns. No data is touched — no existing row can
# hold the new value.
databaseChangeLog:
  - changeSet:
      id: 0020-annotation-dismissed-status
      author: qnop
      comment: Allows DISMISSED in the annotation status closed set (issue #408).
      changes:
        - sql:
            sql: |
              ALTER TABLE annotation DROP CONSTRAINT ck_annotation_status;
              ALTER TABLE annotation ADD CONSTRAINT ck_annotation_status
                CHECK (status IN ('OPEN', 'RESOLVED', 'DISMISSED'));
