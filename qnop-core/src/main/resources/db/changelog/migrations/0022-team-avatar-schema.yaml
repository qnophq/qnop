#
# Team-avatar schema (issue #509): team_avatar, one row per team — the team
# counterpart of user_avatar (issue #117, ADR-0031). Avatar bytes live in
# Postgres bytea behind the shared AvatarStorage port, not object storage
# (ADR-0031/0024: small, bounded, one-per-team). Postgres-only CHECK and the
# cascading FK live here in Liquibase, NOT in JPA annotations (ADR-0020); JPA
# runs ddl-auto=none, so the entity column mapping must match exactly.
databaseChangeLog:
  - changeSet:
      id: 0022-team-avatar
      author: qnop
      comment: Per-team profile avatar; one row per team, current-asset (not history).
      changes:
        - createTable:
            tableName: team_avatar
            columns:
              - column:
                  name: team_id
                  type: UUID
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: content_type
                  type: VARCHAR(64)
                  constraints: { nullable: false }
              - column:
                  name: content
                  type: BYTEA
                  constraints: { nullable: false }
              - column:
                  name: sha256
                  type: VARCHAR(64)
                  constraints: { nullable: false }
              - column:
                  name: size_bytes
                  type: BIGINT
                  constraints: { nullable: false }
              - column: { name: width, type: INT }
              - column: { name: height, type: INT }
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints: { nullable: false }
              # Best-effort audit breadcrumb (who set the picture); no FK, so the
              # admin/lead who set it can still be deleted.
              - column: { name: updated_by, type: UUID }
        # Deleting a team removes its avatar atomically — no orphan-reaper concern
        # (ADR-0031), exactly the user_avatar rationale.
        - addForeignKeyConstraint:
            baseTableName: team_avatar
            baseColumnNames: team_id
            referencedTableName: team
            referencedColumnNames: id
            constraintName: fk_team_avatar_team
            onDelete: CASCADE
        - sql:
            comment: Postgres-only CHECK constraint on the content_type domain.
            splitStatements: true
            sql: |
              ALTER TABLE team_avatar ADD CONSTRAINT ck_team_avatar_content_type
                CHECK (content_type IN ('image/png', 'image/jpeg', 'image/webp'));
