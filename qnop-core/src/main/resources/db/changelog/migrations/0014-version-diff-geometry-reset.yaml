#
# One-time cache flush (issue #369): diff geometry became word-accurate — the
# engine now cuts each run's box to the changed characters instead of returning
# the whole run. Cached payloads carry the old run-granular boxes; versions are
# immutable, so dropping the rows is safe — every pair is simply recomputed
# (and re-cached) with the new geometry on its next request.
databaseChangeLog:
  - changeSet:
      id: 0014-version-diff-geometry-reset
      author: qnop
      comment: Flush diff cache — geometry became word-accurate (issue #369).
      changes:
        - delete:
            tableName: version_diff
