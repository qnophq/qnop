# SPDX-License-Identifier: AGPL-3.0-only
#
# Deployer-facing compose for qnop (ADR-0040): the released image from GHCR
# plus PostgreSQL and MinIO. This is a single-host starting point — see
# docs/DEPLOYMENT.md for the full environment contract, TLS/reverse-proxy
# guidance and upgrade notes.
#
# Pin the version:            QNOP_VERSION=0.1.0 docker compose up -d
# REQUIRED before first run:  QNOP_AUTH_JWT_SECRET, QNOP_AUTH_ENCRYPTION_KEY,
#                             QNOP_AUTH_ENCRYPTION_SALT (>= 32 chars each, e.g.
#                             `openssl rand -base64 48`) — the server fails
#                             fast on the CHANGE_ME defaults (ADR-0022).

services:
  qnop:
    image: ghcr.io/qnophq/qnop:${QNOP_VERSION:-latest}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      QNOP_DB_HOST: postgres
      QNOP_DB_PORT: 5432
      QNOP_DB_NAME: ${QNOP_DB_NAME:-qnop}
      QNOP_DB_USERNAME: ${QNOP_DB_USERNAME:-qnop}
      QNOP_DB_PASSWORD: ${QNOP_DB_PASSWORD:?set a real database password}
      QNOP_S3_ENDPOINT: http://minio:9000
      QNOP_S3_BUCKET: ${QNOP_S3_BUCKET:-qnop-documents}
      QNOP_S3_ACCESS_KEY: ${QNOP_S3_ACCESS_KEY:?set a real object-storage access key}
      QNOP_S3_SECRET_KEY: ${QNOP_S3_SECRET_KEY:?set a real object-storage secret key}
      QNOP_S3_PATH_STYLE_ACCESS: 'true'
      QNOP_S3_AUTO_CREATE_BUCKET: 'true'
      QNOP_AUTH_JWT_SECRET: ${QNOP_AUTH_JWT_SECRET:?generate with `openssl rand -base64 48`}
      QNOP_AUTH_ENCRYPTION_KEY: ${QNOP_AUTH_ENCRYPTION_KEY:?generate with `openssl rand -base64 48`}
      QNOP_AUTH_ENCRYPTION_SALT: ${QNOP_AUTH_ENCRYPTION_SALT:?generate with `openssl rand -base64 48`}
      # Behind a TLS-terminating reverse proxy, uncomment so X-Forwarded-*
      # headers drive scheme/host:
      # QNOP_HTTP_FORWARD_HEADERS_STRATEGY: framework
    ports:
      - '${QNOP_HTTP_PORT:-8080}:8080'
    healthcheck:
      test: ['CMD-SHELL', 'exec 3<>/dev/tcp/127.0.0.1/8080 && printf "GET /actuator/health HTTP/1.0\r\nHost: localhost\r\n\r\n" >&3 && head -1 <&3 | grep -q 200']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  postgres:
    image: postgres:18@sha256:22c89fe0d0f507606260237fd55e51f6137f58b2d5bcf6152242b96d9fe8f9a4
    environment:
      POSTGRES_USER: ${QNOP_DB_USERNAME:-qnop}
      POSTGRES_PASSWORD: ${QNOP_DB_PASSWORD:?set a real database password}
      POSTGRES_DB: ${QNOP_DB_NAME:-qnop}
    volumes:
      # postgres:18+ stores data under /var/lib/postgresql/<major>/docker —
      # mount the parent, not the legacy …/data path.
      - qnop_pgdata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${QNOP_DB_USERNAME:-qnop} -d ${QNOP_DB_NAME:-qnop}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: server /data
    environment:
      MINIO_ROOT_USER: ${QNOP_S3_ACCESS_KEY:?set a real object-storage access key}
      MINIO_ROOT_PASSWORD: ${QNOP_S3_SECRET_KEY:?set a real object-storage secret key}
    volumes:
      - qnop_miniodata:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  qnop_pgdata:
  qnop_miniodata:
