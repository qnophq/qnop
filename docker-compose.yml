# Local development infrastructure for qnop.
# SPDX-License-Identifier: AGPL-3.0-only
#
# Prepared in Phase 0; no application consumes it yet (the bootable server lands
# in Phase 1). Credentials below are LOCAL DEV ONLY — see .env.example. Never
# reuse them outside local development.
#
# Usage:  cp .env.example .env  &&  docker compose up -d

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-qnop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qnop}
      POSTGRES_DB: ${POSTGRES_DB:-qnop}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - qnop_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-qnop} -d ${POSTGRES_DB:-qnop}']
      interval: 10s
      timeout: 5s
      retries: 5

  # S3-compatible object storage for binary documents (ADR-0005). MinIO speaks
  # the S3 API; the StorageProvider adapter is therefore backend-agnostic.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-qnop}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-qnop_secret}
    ports:
      - '${S3_PORT:-9000}:9000' # S3 API
      - '${S3_CONSOLE_PORT:-9001}:9001' # web console
    volumes:
      - qnop_miniodata:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  qnop_pgdata:
  qnop_miniodata:
