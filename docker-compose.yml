# Local development infrastructure for qnop: PostgreSQL (consumed by the server,
# ADR-0020) and MinIO for object storage (ADR-0005, not yet consumed).
#
# All inputs are QNOP_-prefixed (see .env.example); compose maps them onto the
# variable names the official images mandate (POSTGRES_* / MINIO_*). Credentials
# are LOCAL DEV ONLY — never reuse them outside local development.
#
# Usage:  cp .env.example .env  &&  docker compose up -d

services:
  postgres:
    image: postgres:18@sha256:3a82e1f56c8f0f5616a11103ac3d47e632c3938698946a7ad26da0df1334744a
    environment:
      POSTGRES_USER: ${QNOP_DB_USERNAME:-qnop}
      POSTGRES_PASSWORD: ${QNOP_DB_PASSWORD:-qnop}
      POSTGRES_DB: ${QNOP_DB_NAME:-qnop}
    ports:
      - '${QNOP_DB_PORT:-5432}:5432'
    volumes:
      # postgres:18+ stores data under /var/lib/postgresql/<major>/docker and refuses any mount
      # at the legacy /var/lib/postgresql/data — mount the parent instead (issue #407).
      - qnop_pgdata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${QNOP_DB_USERNAME:-qnop} -d ${QNOP_DB_NAME:-qnop}']
      interval: 10s
      timeout: 5s
      retries: 5

  # S3-compatible object storage for binary documents (ADR-0005). MinIO speaks
  # the S3 API; the StorageProvider adapter is therefore backend-agnostic.
  minio:
    image: minio/minio:latest@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${QNOP_S3_ACCESS_KEY:-qnop}
      MINIO_ROOT_PASSWORD: ${QNOP_S3_SECRET_KEY:-qnop_secret}
    ports:
      - '${QNOP_S3_PORT:-9000}:9000' # S3 API
      - '${QNOP_S3_CONSOLE_PORT:-9001}:9001' # web console
    volumes:
      - qnop_miniodata:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

  # Keycloak — a local OIDC provider for testing the "Sign in with …" flow (#106).
  # NOT started by default; enable via the `keycloak` profile:
  #   docker compose --profile keycloak up -d
  #
  # The realm `qnop` is imported from docker/keycloak/qnop-realm.json on first
  # start. It ships:
  #   - one confidential OIDC client `qnop-local` (PKCE S256), redirect URIs
  #     http://localhost:8080|5173/login/oauth2/code/* and matching webOrigins.
  #   - two verified test users `alice` / `bob`, password `password`.
  #
  # Register this in the qnop Admin UI (Administration → OIDC providers):
  #   Provider type:  Generic OIDC
  #   Issuer URL:     http://localhost:8081/realms/qnop   (then click Discover)
  #   Client ID:      qnop-local
  #   Client secret:  local-dev-secret-do-not-use-in-prod
  #
  # Keycloak admin console: http://localhost:8081 (admin/admin). The admin
  # password, client secret, and user passwords are weak ON PURPOSE — bind to
  # 127.0.0.1 only and never expose this stack beyond localhost.
  keycloak:
    image: quay.io/keycloak/keycloak:26.6@sha256:0aae0de7fca85525f727d3354df17896092de8bb26ae4c12d89c77e5df8cbce4
    profiles: ['keycloak']
    command: ['start-dev', '--import-realm']
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${QNOP_KEYCLOAK_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${QNOP_KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: 'true'
    volumes:
      - ./docker/keycloak:/opt/keycloak/data/import:ro
      - qnop_keycloakdata:/opt/keycloak/data
    ports:
      # Bound to loopback only — this dev IdP must never be reachable off-host.
      - '127.0.0.1:${QNOP_KEYCLOAK_PORT:-8081}:8080'
    healthcheck:
      # Keycloak 26 `start-dev` serves a management endpoint on :9000 once the
      # realm is loaded — the canonical readiness probe.
      test:
        [
          'CMD-SHELL',
          "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200'",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # Mailpit — a local SMTP sink for testing outgoing mail (#146). It accepts every
  # message on :1025 instead of delivering it and serves a web inbox on :8025
  # (messages are in-memory and cleared on restart — fine for a test sink).
  # NOT started by default; enable via the `mail` profile:
  #   docker compose --profile mail up -d
  #
  # Point the qnop SMTP settings (Administration → Email / SMTP) at it:
  #   Host: localhost   Port: 1025   Encryption: None   (no username/password)
  #   From: noreply@qnop.local   Enable outgoing mail: ON
  # Then use "Send test" there and read the message at http://localhost:8025.
  # Bound to loopback only — this dev sink must never be reachable off-host.
  mailpit:
    image: axllent/mailpit:latest@sha256:b868afa176bfd6cce2323ea316cd99ccad77915e51e595748f6d786700ecf109
    profiles: ['mail']
    environment:
      # Allow unauthenticated/plaintext SMTP from the local app — dev only.
      MP_SMTP_AUTH_ALLOW_INSECURE: 'true'
    ports:
      - '127.0.0.1:${QNOP_MAILPIT_SMTP_PORT:-1025}:1025' # SMTP intake
      - '127.0.0.1:${QNOP_MAILPIT_UI_PORT:-8025}:8025' # web inbox
    healthcheck:
      test: ['CMD', '/mailpit', 'readyz']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  qnop_pgdata:
  qnop_miniodata:
  qnop_keycloakdata:
